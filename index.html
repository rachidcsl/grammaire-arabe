<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Falah Academy - Grammaire Arabe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg-main: #f8fafc; --bg-card: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
            --primary-blue: #004d99; --accent-blue: #0066cc; --border-color: #e2e8f0;
            --note-bg: #eff6ff; --slot-bg: #f1f5f9;
        }

        body.dark-mode {
            --bg-main: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9; --text-muted: #94a3b8;
            --primary-blue: #38bdf8; --accent-blue: #7dd3fc; --border-color: #334155;
            --note-bg: #1e293b; --slot-bg: #0f172a;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: background 0.3s; overflow-x: hidden; }
        .arabic { font-family: 'Lateef', serif; direction: rtl; font-size: 2.8rem; line-height: 1.1; }

        /* --- UI COMPONENTS --- */
        .drop-zone { border: 2px dashed var(--border-color); border-radius: 1.5rem; min-height: 5rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: var(--slot-bg); }
        .slot-filled { border: 2px solid var(--primary-blue); background: var(--bg-card); font-family: 'Lateef'; font-size: 2.2rem; font-weight: bold; color: var(--primary-blue); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2); }
        .slot-correct { border-color: #22c55e !important; background: #f0fdf4 !important; color: #166534 !important; }
        .slot-wrong { border-color: #ef4444 !important; background: #fef2f2 !important; color: #991b1b !important; }

        .draggable-label { background: var(--bg-card); border: 2px solid var(--primary-blue); padding: 10px 20px; border-radius: 1rem; cursor: grab; font-family: 'Lateef'; font-size: 1.8rem; }
        
        .course-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        .course-section.active { max-height: 5000px; opacity: 1; margin-top: 1rem; }
        
        #settings-drawer { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: var(--bg-card); z-index: 1000; transition: 0.4s; box-shadow: 20px 0 50px rgba(0,0,0,0.2); padding: 2rem; }
        #settings-drawer.open { left: 0; }
        #drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 900; backdrop-filter: blur(4px); }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(20px); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="transition-colors duration-500">

    <div id="drawer-overlay" onclick="UI.toggleDrawer()"></div>
    <aside id="settings-drawer" class="dark:bg-slate-900">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-black uppercase italic">Menu</h2>
            <button onclick="UI.toggleDrawer()" class="p-2 opacity-50">✕</button>
        </div>
        <div id="drawer-profile-info" class="mb-6 p-4 bg-blue-50 dark:bg-slate-800 rounded-2xl flex items-center gap-3 font-bold"></div>
        <div class="space-y-5">
            <div class="flex items-center justify-between"><span class="text-sm font-bold">Mode Sombre</span><label class="switch"><input type="checkbox" id="conf-dark" onchange="toggleDarkMode()"><span class="slider"></span></label></div>
            <div class="flex items-center justify-between"><span class="text-sm font-bold">IA Tutor</span><label class="switch"><input type="checkbox" id="conf-ai" checked onchange="Settings.update('ai', this.checked)"><span class="slider"></span></label></div>
        </div>
        <button onclick="Profiles.reset()" class="w-full mt-12 py-4 border-2 border-slate-100 text-slate-500 rounded-2xl font-black text-[10px] uppercase">Changer / Créer Profil</button>
    </aside>

    <section id="screen-profiles" class="fixed inset-0 bg-white dark:bg-slate-950 z-[500] flex flex-col items-center justify-center p-8">
        <h2 class="text-3xl font-black mb-8 text-center dark:text-white uppercase">Falah Academy</h2>
        <div id="profiles-list" class="grid grid-cols-2 gap-4 w-full max-w-sm mb-6"></div>
        <div class="flex flex-col gap-3 w-full max-w-sm">
            <button onclick="Profiles.add()" class="py-4 bg-blue-900 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest">Créer un profil</button>
            <button onclick="Profiles.skip()" class="py-3 text-slate-400 font-bold uppercase text-[9px] tracking-widest">Continuer sans profil (Invité)</button>
        </div>
    </section>

    <main id="screen-menu" class="hidden p-4 max-w-5xl mx-auto pb-24">
        <header class="flex justify-between items-center py-6">
            <button onclick="UI.toggleDrawer()" class="p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm text-xl">☰</button>
            <div class="text-center">
                <h1 id="user-welcome" class="text-xl font-black dark:text-white uppercase italic"></h1>
                <div id="points-val" class="text-[10px] font-bold text-blue-500 uppercase mt-1">💎 0 Pts</div>
            </div>
            <button onclick="UI.showHistory()" class="p-3 bg-blue-900 dark:bg-sky-500 text-white dark:text-slate-950 rounded-2xl shadow-lg">🏆</button>
        </header>
        <div id="module-container" class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3"></div>
    </main>

    <section id="screen-course" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-40 flex flex-col">
        <nav class="p-4 border-b flex justify-between items-center sticky top-0 bg-white dark:bg-slate-900 z-50">
            <button onclick="UI.show('screen-menu')" class="font-black text-blue-900 dark:text-sky-400 text-xs">← MENU</button>
            <h2 id="course-title" class="text-[10px] font-black uppercase text-slate-400"></h2>
            <button id="btn-course-action" class="bg-blue-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black">DÉFI</button>
        </nav>
        <div id="course-body" class="flex-1 overflow-y-auto p-6 md:p-12 max-w-4xl mx-auto w-full pb-32"></div>
    </section>

    <section id="screen-game" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-[60] flex flex-col">
        <nav class="p-4 border-b dark:border-slate-800 flex justify-between items-center">
            <button onclick="UI.show('screen-menu')" class="font-bold text-blue-900 dark:text-sky-400 text-sm">Quitter</button>
            <div id="game-progress-dots" class="flex gap-1.5"></div>
            <button onclick="UI.showCourseFromGame()" class="text-blue-900 dark:text-sky-400 font-black text-xs uppercase">Cours</button>
        </nav>
        <div class="flex-1 overflow-y-auto p-4 flex flex-col items-center">
            <div id="game-translation" class="w-full max-w-md p-8 bg-blue-50 dark:bg-slate-800/50 rounded-[3rem] text-center italic text-blue-900 dark:text-blue-100 mb-8 border-2 border-blue-100/20 shadow-inner"></div>
            <div id="game-phrase" class="w-full max-w-md flex flex-col gap-5 mb-12"></div>
            <div id="game-options" class="w-full max-w-md flex flex-wrap justify-center gap-2 mt-auto pb-12"></div>
        </div>
        <footer class="p-6 bg-white dark:bg-slate-900 border-t dark:border-slate-800">
            <div id="game-feedback" class="hidden mb-4 p-5 rounded-[2rem] text-white font-black text-center shadow-lg transition-all"></div>
            <button id="btn-check" onclick="Game.handleAction()" class="w-full py-6 bg-blue-900 dark:bg-sky-500 text-white dark:text-slate-900 rounded-[2.5rem] font-black uppercase tracking-[0.3em] shadow-xl disabled:opacity-20">VÉRIFIER</button>
        </footer>
    </section>

    <script>
        /**
         * 1. DONNÉES COMPLÈTES MODULE 1
         */
        const DATA = {
            modules: {
                'm1': { 
                    id: 'm1', title: "Le Nom (Ism)", summary: "Fondations : les 3 types de mots et les 4 propriétés du Ism.",
                    course: `
                        <h2 onclick="UI.toggleAccordion(this)">I. Les 3 types de mots</h2>
                        <div class="course-section space-y-4">
                            <p>Il existe 3 types de mots en arabe :</p>
                            <div class="p-4 bg-blue-50 dark:bg-slate-800 rounded-xl"><b>1. اسم (Ism) :</b> Mot intemporel (personne, lieu, objet, idée, adjectif...).</div>
                            <div class="p-4 bg-green-50 dark:bg-slate-800 rounded-xl"><b>2. فِعْل (Fi’l) :</b> Exprime une action liée au temps (passé, présent, futur).</div>
                            <div class="p-4 bg-red-50 dark:bg-slate-800 rounded-xl"><b>3. حَرْف (Harf) :</b> N'a aucun sens sans le Ism ou le Fi’l (ex: dans, à, pour...).</div>
                        </div>

                        <h2 onclick="UI.toggleAccordion(this)">II. Propriété 1 : L'État (I'rab)</h2>
                        <div class="course-section space-y-4">
                            <p>L'état est le changement de terminaison qui définit le rôle du nom :</p>
                            <ul class="list-disc pl-5">
                                <li><b>رفع (Raf') :</b> Le sujet qui fait l'action.</li>
                                <li><b>نَصْب (Nasb) :</b> Détail sur l'action (quoi, où, quand...).</li>
                                <li><b>جر (Jarr) :</b> Après "de/du" ou une préposition.</li>
                            </ul>
                            <p class="text-sm italic">Note: Les noms diptotes (Ghayr Munsarif) ne prennent pas de Kasra. Les noms invariables (Mabni) ne changent jamais de forme.</p>
                        </div>

                        <h2 onclick="UI.toggleAccordion(this)">III. Propriété 2 : Le Genre</h2>
                        <div class="course-section space-y-4">
                            <p>Un Ism est <b>Mudhakkar</b> (masculin) par défaut.</p>
                            <p>Il est <b>Mu’annath</b> (féminin) s'il appartient à :</p>
                            <ol class="list-decimal pl-5">
                                <li><b>Féminin Réel :</b> Nature féminine biologique.</li>
                                <li><b>Féminin de Signe :</b> Terminaison en ة, اء, ou ى.</li>
                                <li><b>Féminin par décision :</b> Vents, enfer, pays/villes, ou parties paires du corps.</li>
                            </ol>
                        </div>
                    `,
                    exercises: [ 
                        { phrase: ["رَبٌّ"], correct: ["رَفْعٌ"], opts: ["رَفْعٌ", "نَصْبٌ", "جَرٌّ"], translation: "Un Seigneur", rule: "La damma finale indique l'état Raf'." },
                        { phrase: ["عَذَابٍ"], correct: ["جَرٌّ"], opts: ["رَفْعٌ", "جَرٌّ"], translation: "Un châtiment", rule: "La kasra finale indique l'état Jarr." },
                        { phrase: ["هَذَا"], correct: ["مَبْنِيٌّ"], opts: ["رَفْعٌ", "مَبْنِيٌّ"], translation: "Ceci", rule: "Hadha est un pronom démonstratif, il est invariable (Mabni)." }
                    ]
                }
            }
        };

        /**
         * 2. MOTEUR DE PROFILS FLEXIBLE
         */
        const Profiles = {
            current: null,
            getAll() { return JSON.parse(localStorage.getItem('falah_profiles') || '[]'); },
            saveAll(p) { localStorage.setItem('falah_profiles', JSON.stringify(p)); },

            init() {
                const profiles = this.getAll();
                const last = localStorage.getItem('falah_last_profile');
                if (last && profiles.find(p => p.id === last)) this.select(last);
                else { this.renderList(); UI.show('screen-profiles'); }
            },

            add() {
                const name = prompt("Nom du profil :");
                if (!name) return;
                const profiles = this.getAll();
                const newP = { id: 'p' + Date.now(), name, emoji: '👤' };
                profiles.push(newP);
                this.saveAll(profiles);
                this.renderList();
            },

            skip() { this.current = { id: 'guest', name: 'Invité', emoji: '🔓' }; this.finalizeSelection(); },

            select(id) { 
                const profiles = this.getAll();
                this.current = profiles.find(p => p.id === id) || { id:'guest', name:'Invité', emoji:'🔓' };
                this.finalizeSelection();
            },

            finalizeSelection() {
                localStorage.setItem('falah_last_profile', this.current.id);
                document.getElementById('screen-profiles').classList.add('hidden');
                UI.show('screen-menu');
            },

            delete(id, e) {
                e.stopPropagation();
                if (!confirm("Supprimer ce profil ?")) return;
