<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Falah Academy Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .hidden { display: none !important; }

        :root {
            --bg-main: #ffffff; --bg-card: #ffffff; --text-main: #0f172a; --text-muted: #64748b;
            --primary-blue: #004d99; --accent-blue: #0066cc; --border-color: #f1f5f9;
            --note-bg: #f8fafc; --table-header: #004d99; --slot-bg: #f8fafc;
        }

        body.dark-mode {
            --bg-main: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9; --text-muted: #94a3b8;
            --primary-blue: #38bdf8; --accent-blue: #7dd3fc; --border-color: #334155;
            --note-bg: #1e293b; --table-header: #075985; --slot-bg: #0f172a;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: background 0.3s ease; overflow-x: hidden; touch-action: none; }

        .arabic { font-family: 'Lateef', serif; direction: rtl; font-size: 2.8rem; font-weight: 700; color: var(--text-main); }
        h1 { color: var(--primary-blue); font-weight: 900; }

        /* Zones de jeu */
        .drop-zone { border: 2px dashed var(--border-color); border-radius: 15px; height: 5.5rem; display: flex; align-items: center; justify-content: center; background: var(--slot-bg); transition: 0.2s; text-transform: uppercase; color: var(--text-muted); font-weight: 800; font-size: 0.7rem; }
        .drop-zone.active-target { border-color: var(--accent-blue); background-color: var(--note-bg); border-style: solid; transform: scale(1.02); }
        .slot-filled { border: 3px solid var(--primary-blue); background: var(--note-bg); color: var(--primary-blue); font-family: 'Lateef'; font-size: 2.2rem; font-weight: 700; border-radius: 15px; }
        .slot-correct { border-color: #22c55e !important; background: #f0fdf4 !important; color: #166534 !important; }
        .slot-wrong { border-color: #ef4444 !important; background: #fef2f2 !important; color: #991b1b !important; }
        
        .draggable-label { font-family: 'Lateef', serif; font-size: 2rem; font-weight: 700; background: var(--bg-card); border: 2px solid var(--primary-blue); border-radius: 20px; padding: 10px 24px; cursor: grab; user-select: none; display: inline-flex; align-items: center; justify-content: center; min-height: 4.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: var(--text-main); }
        .drag-ghost { position: fixed; pointer-events: none; z-index: 9999; opacity: 0.95; transform: translate(-50%, -50%); background: var(--bg-card); border: 3px solid var(--primary-blue); border-radius: 20px; padding: 10px 24px; font-family: 'Lateef'; font-size: 2.2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3); color: var(--text-main); }

        /* Accordéon Cours */
        #course-body h2 { font-size: 1.5rem; color: var(--accent-blue); border-left: 8px solid var(--accent-blue); padding: 12px; margin-top: 2rem; background: var(--note-bg); cursor: pointer; border-radius: 0 10px 10px 0; font-weight: 900; position: relative; }
        .course-section { display: none; padding: 1.5rem 0.5rem; border-bottom: 1px solid var(--border-color); }
        .course-section.active { display: block; }
        
        #settings-drawer { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: var(--bg-card); z-index: 1000; transition: 0.4s; padding: 2rem; box-shadow: 10px 0 50px rgba(0,0,0,0.1); }
        #settings-drawer.open { left: 0; }
        #drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 900; backdrop-filter: blur(2px); }
        mark.search-highlight { background: #fef08a; color: #854d0e; padding: 0 2px; border-radius: 4px; font-weight: bold; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="dark-mode">

    <div id="drawer-overlay" onclick="UI.toggleDrawer()"></div>

    <div id="update-toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[2000] w-[90%] max-w-sm bg-blue-900 text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between animate-bounce">
        <div class="text-xs font-bold">Mise à jour disponible !</div>
        <button onclick="window.location.reload()" class="bg-white text-blue-900 px-3 py-1 rounded-lg text-[10px] font-black uppercase">Appliquer</button>
    </div>
    
    <aside id="settings-drawer" class="dark:bg-slate-900">

    <main id="screen-menu" class="min-h-screen p-4 max-w-5xl mx-auto overflow-y-auto pb-24">

            <svg width="45" height="55" viewBox="0 0 437 275" fill="none" class="shrink-0">
                <path d="M131 0C120 1 113 15 115 25C117 35 125 40 135 40C145 40 152 32 153 23C150 30 142 32 133 28C123 22 126 6 131 0Z" fill="#B7A12E" />
                <path d="M129.5 48 Q 105 78, 73 97 V189 H189 V97 Q 155 78, 129.5 48 Z" fill="#1F9E75" />
                <text x="5" y="242" font-family="Arial Black" font-size="50" font-weight="900" fill="#B7A12E" textLength="427">FALAH-E-DARAINE</text>

            <div class="text-center flex-1">

        </header>
        <div id="module-container" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 mt-4"></div>
    </main>

    <section id="screen-search" class="hidden fixed inset-0 bg-white dark:bg-slate-950 z-[200] flex flex-col p-6 overflow-y-auto">
        <header class="flex items-center gap-4 mb-8">
            <button onclick="UI.show('screen-menu')" class="text-2xl font-bold">←</button>
            <input type="text" id="search-input" oninput="Search.query(this.value)" placeholder="Arabe, français, tag..." class="flex-1 p-5 rounded-3xl bg-slate-50 dark:bg-slate-800 outline-none border">
        </header>
        <div id="search-results" class="flex flex-col gap-4"></div>
    </section>

    <section id="screen-course" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-40 flex flex-col overflow-y-auto">
        <nav class="p-4 border-b flex justify-between items-center sticky top-0 bg-white/95 dark:bg-slate-900/95 z-50">
            <button onclick="UI.show('screen-menu')" class="font-black text-blue-900 dark:text-sky-400 text-xs uppercase">← Retour</button>
            <h2 id="course-title-header" class="text-[10px] font-black uppercase text-slate-400"></h2>
            <button id="btn-course-action" class="bg-blue-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase shadow-lg">Défi</button>
        </nav>
        <div class="p-6 md:p-12 max-w-6xl mx-auto w-full pb-32">
            <h1 id="course-title-main" class="text-3xl font-black mb-10 pb-4 border-b-8 border-blue-50 dark:border-slate-800 text-center uppercase tracking-tighter"></h1>
            <div id="course-body"></div>
        </div>
    </section>

    <section id="screen-game" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-50 flex flex-col overflow-hidden">
        <nav class="p-4 border-b dark:border-slate-800 flex justify-between items-center bg-white dark:bg-slate-900">
            <button onclick="UI.show('screen-menu')" class="font-bold text-blue-900 dark:text-sky-400 text-sm uppercase">Quitter</button>
            <div id="game-progress-dots" class="flex gap-1.5"></div>
            <button onclick="SmartTutor.toggle()" class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-xl shadow-lg">🤖</button>
        </nav>
        
        <div class="flex-1 p-4 flex flex-col items-center overflow-y-auto">
            <div id="ai-chat" class="hidden w-full max-w-md p-4 mb-4 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl border border-indigo-100 text-xs italic leading-relaxed"></div>
            <div id="game-translation" class="w-full max-w-md p-8 bg-blue-50 dark:bg-slate-800/50 rounded-[3rem] text-center italic text-blue-900 dark:text-blue-100 mb-8 border shadow-inner"></div>
            <div id="game-phrase" class="w-full max-w-md flex flex-col gap-6 mb-12"></div>
            <div id="game-options" class="w-full max-w-md flex flex-wrap justify-center gap-3 mt-auto pb-24"></div>
        </div>

        <footer class="p-6 bg-white dark:bg-slate-900 border-t shadow-xl">
            <div id="game-feedback" class="hidden mb-4 p-5 rounded-[2rem] text-white font-black text-center shadow-lg transition-all"></div>
            <button id="btn-check" onclick="Game.handleAction()" class="w-full py-6 bg-blue-900 text-white rounded-[2.5rem] font-black uppercase tracking-widest shadow-xl disabled:opacity-20 active:scale-95 transition-transform">VÉRIFIER</button>
        </footer>
    </section>

    <section id="screen-result" class="hidden fixed inset-0 bg-slate-950 z-[200] flex flex-col items-center justify-center p-8 text-white text-center">
        <div class="text-8xl mb-8 animate-bounce">🏆</div>
        <h2 class="text-3xl font-black mb-10 uppercase italic">Félicitations !</h2>
        <div class="bg-blue-900 p-16 rounded-[4rem] mb-12 w-full max-w-xs shadow-2xl">
            <div class="text-7xl font-black italic" id="result-score-val">0</div>
            <p class="text-[10px] font-bold opacity-50 mt-3 uppercase tracking-widest">Points récoltés</p>
        </div>
        <button onclick="UI.show('screen-menu')" class="w-full max-w-xs py-6 bg-sky-500 text-slate-900 rounded-full font-black uppercase tracking-widest shadow-xl">Continuer</button>
    </section>

    <script>
        /** 1. DONNÉES CENTRALISÉES (DATA) **/
        const DATA = {
            modules: {

            'm1': {
                id: 'm1', name: 'Module 1', title: "le Nom", summary: "Les fondations de l'analyse nominale et le tableau Mouslimoun",
                course: `
                    <h2 class="heading-primary">Intro – Les 3 types de mots</h2>

                    <p class="paragraph-main">En langue arabe, les mots sont classés en trois catégories distinctes :</p>

                    <div class="box-flex">
                        <div class="card-item">
                            <span class="text-lateef-2rem-blue">اِسْمٌ</span>

                        <div class="card-item">

                            </p>
                        </div>
                        <div class="card-item">

                                Mot qui n'a aucun sens complet sans être accompagné d'un 
                                <strong class="text-lateef-1-8rem">اِسْم</strong> ou d'un 
                                <strong class="text-lateef-1-8rem">فِعْل</strong>.<br>(ex: dans, à, pour, avec...)
                            </p> 
                        </div>
                    </div>

                    <p style="margin: 1.5rem 0 0; font-size: 0.95rem; line-height: 1; font-style: italic;">
                        <strong>Note :</strong> Ce module se concentre uniquement sur l'étude du 
                        <strong class="text-lateef-1-8rem">اِسْم</strong>.
                    </p>

                    <h2 class="heading-primary">
                        Les 4 propriétés du Ism</h2>
                    <p style="margin: 0.8rem 0; font-size: 0.95rem; line-height: 1; font-weight: 600;">Pour analyser correctement un
                        nom, il faut déterminer ses 4 propriétés :</p>

                    <h3 class="heading-secondary">1.
                        L'État - <span class="text-lateef-2rem">الْإِعْرَابُ</span></h3>
                    <div style="background: #e8f4f8; border-left: 4px solid #0066cc; padding: 1.2rem; margin-bottom: 1.5rem; border-radius: 0.4rem;">
                        <p style="margin: 0; font-size: 0.9rem;">C'est le changement de la terminaison du mot qui définit son rôle dans
                            la phrase.</p>
                        <ul style="list-style-type: disc; margin: 1rem 0; padding-left: 1.8rem; font-size: 0.9rem; line-height: 1;">
                            <li style="margin: 0.6rem 0;">
                                <strong class="text-lateef-2rem-blue">رَفْعٌ
                                    :</strong> Le cas du sujet (celui qui fait l'action).
                            </li>
                            <li style="margin: 0.6rem 0;">
                                <strong class="text-lateef-2rem-blue">نَصْبٌ
                                    :</strong> Le cas du détail (objet, lieu, temps, manière...).
                            </li>
                            <li style="margin: 0.6rem 0;">
                                <strong class="text-lateef-2rem-blue">جَرٌّ
                                    :</strong> Le cas après une préposition ou pour la possession.
                            </li>
                        </ul>
                    </div>



                    <h4 class="heading-secondary">Tableau des terminaisons</h4>
                    <div style="overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 1rem 0; border-radius: 8px;">
                        <table style="direction: rtl; width: auto; min-width: 100%; border-collapse: collapse; table-layout: auto; font-family: 'Inter', sans-serif; border: 1px solid #cbd5e1;">
                            <thead>
                                <tr style="background: #e8f4f8;">
                                    <th style="text-align: center; font-weight: 700; font-size: 0.75rem; text-transform: uppercase;">
                                        Type de mot</th>
                                    <th class="text-lateef-1-8rem">
                                        رَفْعٌ</th>
                                    <th class="text-lateef-1-8rem">
                                        نَصْبٌ</th>
                                    <th class="text-lateef-1-8rem">
                                        جَرٌّ</th>
                                </tr>
                            </thead>
                            <tbody style="font-size: 0.85rem;">
                                <tr>
                                    <td style="padding: 0.6rem; border: 1px solid #cbd5e1; text-align: center; background: white;">
                                        <span class="text-lateef-1-8rem" style="display: block; line-height: 1;">مُنْصَرِفٌ</span>
                                        <em style="font-size: 0.75rem; color: #64748b;">Variable</em>
                                    </td>
                                    <td class="text-lateef-1-8rem" style="padding: 0.6rem; border: 1px solid #cbd5e1; background: white;">
                                        ـٌ / ال ـُ</td>
                                    <td class="text-lateef-1-8rem" style="padding: 0.6rem; border: 1px solid #cbd5e1; background: white;">
                                        ـً / ال ـَ</td>
                                    <td class="text-lateef-1-8rem" style="padding: 0.6rem; border: 1px solid #cbd5e1; background: white;">
                                        ـٍ / ال ـِ</td>
                                </tr>
                                <tr style="background: #f8fafc;">
                                    <td style="padding: 0.6rem; border: 1px solid #cbd5e1; text-align: center; background: #f0f9ff;">
                                        <span class="text-lateef-1-8rem" style="display: block; line-height: 1;">غَيْرُ مُنْصَرِفٍ</span>
                                        <em style="font-size: 0.75rem; color: #64748b;">Diptote</em>
                                    </td>
                                    <td class="text-lateef-1-8rem" style="padding: 0.6rem; border: 1px solid #cbd5e1; text-align: center; background: #f0f9ff;">
                                        ـُ</td>
                                    <td class="text-lateef-1-8rem" style="padding: 0.6rem; border: 1px solid #cbd5e1; text-align: center; background: #f0f9ff;">
                                        ـَ</td>
                                    <td class="text-lateef-1-8rem" style="padding: 0.6rem; border: 1px solid #cbd5e1; text-align: center; background: #f0f9ff;">
                                        ـَ</td>
                                </tr>
                                <tr>
                                    <td style="padding: 0.6rem; border: 1px solid #cbd5e1; text-align: center; background: white;">
                                        <span class="text-lateef-1-8rem" style="display: block; line-height: 1;">مَبْنِيٌّ</span>

                    <div style="background: #fff3e0; border-left: 4px solid #ff9800; padding: 1.2rem; margin: 1.5rem 0; border-radius: 0.4rem;">

                    <h3 class="heading-secondary">2.
                        Le Genre - <strong class="text-lateef-2rem">الْجِنْسُ</strong>
                    </h3>
                    <div style="background: #e8f4f8; border-left: 4px solid #0066cc; padding: 1.2rem; margin-bottom: 1.5rem; border-radius: 0.4rem;">

                    <div style="background: #fff305; background: linear-gradient(135deg, #fff305 0%, #ffeb3b 100%); border-left: 4px solid #fbc02d; padding: 1.2rem; margin: 1.5rem 0; border-radius: 0.4rem; opacity: 0.95;">

                        <p style="margin: 0; font-size: 0.9rem;">Un mot est <strong>masculin par défaut</strong>, sauf s'il appartient à l'une des catégories du féminin.</p>
                    </div>
                    <div style="background: #fff3e0; border-left: 4px solid #ff9800; padding: 1.2rem; margin: 1.5rem 0; border-radius: 0.4rem;">
                        <strong style="color: #e67e22; font-size: 1rem; display: block; margin-bottom: 0.8rem;">Les 3 catégories du Féminin :</strong>

                            <li style="margin: 0.3rem;">
                                <strong style="color: #555;">Féminin Réel :</strong> Biologiquement 
                                <strong class="text-lateef-1-8rem-blue">أُمٌّ</strong> (mère).
                            </li>
                            <li style="margin: 0.3rem; margin-top: 1rem;">
                                <strong style="color: #555;">Féminin de Signe :</strong> Termine par un marqueur spécifique
                                <ul style="list-style-type: disc; margin: 0.3rem; padding-left: 1.2rem; font-size: 0.9rem; line-height: 1;">

                                        (<strong class="text-lateef-1-8rem-blue">ة</strong>) :

                                qui suit, qui est mis à l'état <em class="text-lateef-1-6rem">جَرٌّ</em>.</li>

                        <p style="margin: 0.8rem 0; font-size: 0.9rem; line-height: 1.2;"><em>Ex :</em>

                    <p style="direction: rtl; margin: 0.9rem 0; font-size: 0.9rem; font-weight: 600; text-align: center; padding: 0.9rem; background: #f5f5f5; border-radius: 0.4rem;">Moubtada + <strong class="text-lateef-1-8rem-blue">ضَمِيرٌ مُنْفَصِلٌ</strong> + <strong class="text-lateef-1-8rem-blue">الـ</strong> avec Khabar</p>
                    <div style="background: #f5f5f5; border: 1px solid #ddd; padding: 1rem; border-radius: 0.4rem; margin: 1.2rem 0;">
                        <p style="text-align: center; margin: 0; font-size: 0.9rem;"><strong class="text-lateef-1-8rem-blue">مُحَمَّدٌ هُوَ الرَّسُولُ</strong><br><em style="color: #555;">Muhammad, c'est lui le messager.</em></p>
                    </div>

                    <h3 class="heading-secondary">Méthode 5 : <strong class="text-lateef-1-6rem-blue">لَامُ الِابْتِدَاءِ</strong></h3>
                    <p style="margin: 0.8rem 0; font-size: 0.95rem; line-height: 1.6;">On ajoute la lettre <strong>La</strong> (<strong class="text-lateef-1-6rem-blue">لَـ</strong>) devant le Moubtada pour insister (Vraiment/Certes).</p>
                    <div style="background: #f5f5f5; border: 1px solid #ddd; padding: 1rem; border-radius: 0.4rem; margin: 1.2rem 0;">
                        <p style="text-align: center; margin: 0; font-size: 0.95rem;"><strong class="text-lateef-1-6rem-blue">لَمُحَمَّدٌ رَسُولٌ</strong><br><em style="color: #555;">Muhammad est vraiment un messager.</em></p>
                    </div>

                    <div style="background: #fff3e0; border-left: 4px solid #ff9800; padding: 1.2rem; margin: 1.5rem 0; border-radius: 0.4rem;">
                        <strong style="color: #e67e22; font-size: 0.9rem; display: block; margin-bottom: 0.8rem;">Le Lam glissant (اللَّامُ الْمُزَحْلَقَةُ) :</strong>
                        <p style="margin: 0 0 0.8rem 0; font-size: 0.9rem;">Si on utilise <strong><span class="text-lateef-1-8rem-blue">إِنَّ</span></strong> (Inna) au début de la phrase, le "Lam" ne peut pas rester sur le Moubtada. Il "glisse" et s'accroche au <strong>Khabar</strong>.</p>
                        <p style="margin: 0; font-size: 0.9rem;">Ex. : <span class="text-lateef-1-8rem-blue">إِنَّ مُحَمَّدًا لَرَسُولٌ</span> (Certes, Muhammad est vraiment un messager)</p>
                    </div>

                    <h3 class="heading-secondary">Méthode 6 : <strong class="text-lateef-1-6rem-blue">التَّقْدِيمُ وَالتَّأْخِيرُ</strong></h3>
                    <p style="margin: 0.8rem 0; font-size: 0.95rem; line-height: 1.6;">On inverse l'ordre standard : le Khabar passe devant le Moubtada.</p>
                    <div style="background: #fff3e0; border-left: 4px solid #ff9800; padding: 1.2rem; margin: 1.5rem 0; border-radius: 0.4rem;">
                        <strong style="color: #e67e22; font-size: 0.9rem; display: block; margin-bottom: 0.8rem;">Conditions :</strong>
                        <ul style="margin: 0; padding-left: 1.8rem; font-size: 0.9rem; line-height: 1.7;">
                            <li>Le Moubtada devient <strong>Indéfini (Nakirah)</strong></li>
                            <li>Le verbe "être" est souvent remplacé par le sens "il y a" ou "avoir"</li>
                        </ul>
                    </div>
                    <div style="text-align: center; background: #f5f5f5; border: 1px solid #ddd; padding: 1.2rem; border-radius: 0.4rem; margin: 1.5rem 0;">
                        <p style="margin: 0 0 0.8rem 0; font-size: 0.95rem;"><span class="text-lateef-2rem-blue">فِي الْمَسْجِدِ مُسْلِمٌ</span><br><em style="color: #555;">Dans la mosquée, il y a un musulman.</em></p>
                        <p style="margin: 0; font-size: 0.95rem;"><span class="text-lateef-2rem-blue">لَهُ بَيْتٌ</span><br><em style="color: #555;">À lui appartient une maison / Il a une maison.</em></p>
                    </div>

                    <h2 class="heading-primary">2. Kana et ses soeurs (<strong class="text-lateef-1-6rem-blue">كَانَ وَأَخَوَاتُهَا</strong>)</h2>
                    <div style="background: #e8f4f8; border-left: 4px solid #0066cc; padding: 1.2rem; margin: 1.5rem 0; border-radius: 0.4rem;">
                        <p style="margin: 0; font-size: 0.95rem; line-height: 1.1;">Ce sont des verbes qui entrent dans la phrase nominale et changent l'état du Khabar. On les appelle <strong class="text-lateef-2rem-blue">أَفْعَالٌ نَاقِصَةٌ</strong> (Af'al Naqisa) ou verbes "incomplets/déficients" car ils décrivent un état et non une action complète.</p>

                    <p style="margin: 0.8rem 0; font-size: 0.95rem; line-height: 1.6;">Lorsqu'on ajoute <em>Kana</em> :</p>
                    <ul style="list-style-type: disc; margin: 0.5rem 0; padding-left: 1.8rem; font-size: 0.95rem; line-height: 1.7;">

                        <li>Le <strong>Khabar</strong> devient <strong style="color: #c0392b;">Nasb</strong> (devient <em>Khabar Kana</em>)</li>
                    </ul>
                    <p style="margin: 1rem 0; font-size: 0.95rem; font-weight: 600; text-align: center; padding: 1rem; background: #f5f5f5; border-radius: 0.4rem;"><span class="text-lateef-2rem">كَانَ</span> + <span class="text-lateef-2rem-blue">اِسْمٌ مَرْفُوعٌ</span> + <span class="text-lateef-2rem-red">خَبَرٌ مَنْصُوبٌ</span></p>

                        <h2 class="heading-primary">5.
                            <strong class="text-lateef-1-6rem">L'Interjection - Le Nidâ - النِّدَاء </strong></h2>
                        <div style="background: #e8f4f8; border-left: 4px solid #0066cc; padding: 0.4rem; margin-bottom: 1.5rem; border-radius: 0.4rem;">
                            <p style="margin: 0.8rem 0; font-size: 0.9rem; line-height: 1.2;">La particule <strong class="text-lateef-1-6rem-blue">يَا</strong> (<em>harf n-nidâ</em>) est utilisée pour interpeler une personne ou un groupe.

                                <li><strong>Masculin (<span class="text-lateef-2rem">مُذَكَّر</span>) :</strong> On ajoute <span class="text-lateef-2rem-red">أَيُّهَا</span> devant le nom.

                                        <li>يَا<span style="color: #ef4444;"> أَيُّهَا</span> الرَّسُولُ </li>
                                        <li>يَا<span style="color: #ef4444;"> أَيُّهَا</span> النَّاسُ </li>
                                        <li>يَا<span style="color: #ef4444;"> أَيُّهَا</span> الكَافِرُونَ </li>
                                    </ul>
                                </li>

                                    <ul class="text-lateef-2rem" style="list-style-type: disc; margin: 1rem 0; padding-left: 1.8rem;">

                            <p style="margin: 0.5rem 0; font-size: 0.9rem; line-height: 1.2;">Règle : Le prénom devient "mabnî" (invariable dans cette position) sur la damma (<span class="text-lateef-2rem">ضَمَّةٌ</span>).</p>

                document.getElementById('module-container').innerHTML = Object.entries(DATA.modules).map(([id, m]) => `
                    <div class="bg-white dark:bg-slate-800 p-8 rounded-[3rem] shadow-sm flex flex-col border border-slate-50 dark:border-slate-700">
                        <h3 class="font-black text-lg mb-6 dark:text-white leading-tight uppercase tracking-tighter">${m.title}</h3>
                        <div class="flex gap-3 mt-auto">
                            <button onclick="UI.showCourse('${id}')" class="flex-1 py-4 bg-slate-50 dark:bg-slate-700 rounded-2xl font-bold text-[10px] uppercase">Cours</button>
                            <button onclick="Game.start('${id}')" class="flex-1 py-4 bg-blue-900 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg">Défi</button>
                        </div>
                    </div>`).join('');
            },
            showCourse(id, q = null) {
                const m = DATA.modules[id];
                // Correction des IDs cibles
                document.getElementById('course-title-header').innerText = m.title;
                document.getElementById('course-title-main').innerText = m.title;
                
                let c = m.course; 
                if(q) c = Search.highlight(c, q);
                
                document.getElementById('course-body').innerHTML = c;
                document.getElementById('btn-course-action').onclick = () => Game.start(id);
                this.show('screen-course');
            },
            toggleSec(el) {
                el.nextElementSibling.classList.toggle('active');
            }
        };

        /** 4. MOTEUR DE JEU (GHOST DRAG) **/
        const Game = {
            modId: null, exercises: [], currentIdx: 0, userAnswers: [], score: 0, state: 'playing',
            draggedVal: null, ghost: null,
            start(id) { this.modId = id; this.exercises = DATA.modules[id].exercises; this.currentIdx = 0; this.score = 0; this.loadExercise(); UI.show('screen-game'); },
            loadExercise() {
                const ex = this.exercises[this.currentIdx];
                this.userAnswers = new Array(ex.phrase.length).fill(null);
                this.state = 'playing';
                document.getElementById('game-progress-dots').innerHTML = this.exercises.map((_, i) => `<div class="w-2 h-2 rounded-full ${i <= this.currentIdx ? 'bg-blue-900 dark:bg-sky-400' : 'bg-slate-200 dark:bg-slate-700'}"></div>`).join('');
                document.getElementById('game-translation').innerText = ex.translation;
                document.getElementById('game-phrase').innerHTML = ex.phrase.map((w, i) => `
                    <div class="flex items-center gap-3 w-full">
                        <div class="arabic flex-1 bg-white dark:bg-slate-800 p-4 rounded-3xl border shadow-sm text-center" style="background-color: var(--bg-card); color: var(--text-main); font-size: 1.8rem;">${w}</div>
                        <div id="slot-${i}" class="drop-zone flex-1">Placer</div>
                    </div>`).join('');
                const optCont = document.getElementById('game-options'); optCont.innerHTML = '';
                ex.opts.forEach(o => {
                    const btn = document.createElement('div'); btn.className = "draggable-label dark:bg-slate-800 dark:border-slate-700 dark:text-white"; btn.innerText = o;
                    btn.onmousedown = (e) => this.startDrag(e, o); btn.ontouchstart = (e) => this.startDrag(e, o);
                    optCont.appendChild(btn);
                });
                document.getElementById('game-feedback').classList.add('hidden');
                document.getElementById('btn-check').innerText = "VÉRIFIER"; document.getElementById('btn-check').disabled = true;
            },
            startDrag(e, val) {
                if (this.state !== 'playing') return;
                this.draggedVal = val;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                this.ghost = document.createElement('div'); this.ghost.className = 'drag-ghost'; this.ghost.innerText = val;
                document.body.appendChild(this.ghost); this.moveGhost(clientX, clientY);
                const onMove = (ev) => {
                    const x = ev.touches ? ev.touches[0].clientX : ev.clientX;
                    const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
                    this.moveGhost(x, y);
                    document.querySelectorAll('.drop-zone').forEach(z => z.style.borderColor = '');
                    const target = document.elementFromPoint(x, y);
                    if (target && target.classList.contains('drop-zone')) target.style.borderColor = '#0066cc';
                };
                const onEnd = (ev) => {
                    const x = ev.changedTouches ? ev.changedTouches[0].clientX : ev.clientX;
                    const y = ev.changedTouches ? ev.changedTouches[0].clientY : ev.clientY;
                    const target = document.elementFromPoint(x, y);
                    if (target && target.classList.contains('drop-zone')) {
                        const idx = parseInt(target.id.split('-')[1]);
                        this.userAnswers[idx] = this.draggedVal;
                        target.innerText = this.draggedVal; target.className = "drop-zone flex-1 slot-filled";
                        document.getElementById('btn-check').disabled = this.userAnswers.includes(null);
                    }
                    if(this.ghost) this.ghost.remove();
                    window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onEnd);
                    window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onEnd);
                };
                window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onEnd);
            },
            moveGhost(x, y) { if (this.ghost) { this.ghost.style.left = x + 'px'; this.ghost.style.top = y + 'px'; } },
            handleAction() {
                if(this.state === 'playing') {
                    const win = this.userAnswers.every((a, i) => a === this.exercises[this.currentIdx].correct[i]);
                    this.state = 'checked';
                    const fb = document.getElementById('game-feedback'); fb.classList.remove('hidden');
                    fb.innerText = win ? "✨ EXCELLENT !" : "❌ RÉESSAYE !";
                    fb.className = `mb-4 p-5 rounded-3xl font-black block shadow-lg ${win?'bg-green-600':'bg-red-600'}`;
                    this.userAnswers.forEach((a, i) => document.getElementById(`slot-${i}`).classList.add(a === this.exercises[this.currentIdx].correct[i] ? 'slot-correct' : 'slot-wrong'));
                    if(win) { this.score++; confetti({ particleCount: 30, origin:{y:0.8}}); }
                    document.getElementById('btn-check').innerText = "CONTINUER";
                } else {
                    if(++this.currentIdx < this.exercises.length) this.loadExercise(); 
                    else { AppState.savePoints(this.score * 10); UI.show('screen-result'); document.getElementById('result-score-val').innerText = `+${this.score * 10}`; }
                }
            }
        };

        const Search = {
            query(q) {
                const res = document.getElementById('search-results');
                if (!q || q.length < 2) { res.innerHTML = ''; return; }
                const val = q.toLowerCase().trim();
                const matches = Object.values(DATA.modules).filter(m => m.title.toLowerCase().includes(val) || (m.tags && m.tags.some(t => t.includes(val))));
                res.innerHTML = matches.map(m => `<div onclick="UI.showCourse('${m.id}', '${val}')" class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-lg border-l-8 border-blue-500 cursor-pointer font-bold dark:text-white"><span class="text-[8px] font-black text-blue-500 uppercase">Module</span><p>${this.highlight(m.title, val)}</p></div>`).join('');
            },
            highlight(text, q) { const regex = new RegExp(`(${q})`, 'gi'); return text.replace(regex, '<mark class="search-highlight">$1</mark>'); }
        };

        const SmartTutor = { toggle() { document.getElementById('ai-chat').classList.toggle('hidden'); document.getElementById('ai-chat').innerText = "🤖 Astuce : Analyse les voyelles finales pour trouver l'état du nom !"; } };

        function applyDarkModeStyles() {
            const isDark = document.body.classList.contains('dark-mode');
            document.querySelectorAll('[style]').forEach(el => {
                let s = el.getAttribute('style');
                if (isDark && s) s = s.replace(/#0066cc/g, 'var(--accent-blue)').replace(/#004d99/g, 'var(--primary-blue)').replace(/#f5f5f5/g, 'var(--bg-card)').replace(/#e6f7ff/g, 'var(--note-bg)');
                if(s) el.setAttribute('style', s);
            });
        }

        // --- SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.onupdatefound = () => {
                        const newWorker = reg.installing;
                        newWorker.onstatechange = () => { if (newWorker.state === 'installed' && navigator.serviceWorker.controller) document.getElementById('update-toast').classList.remove('hidden'); };
                    };
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => { 
            if (localStorage.getItem('theme') !== 'light') document.body.classList.add('dark-mode'); 
            UI.show('screen-menu'); 
        });
    </script>
</body>
</html>
