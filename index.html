<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Grammaire Arabe - Falah-e-Daraine</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f9;
            color: #1e293b;
            line-height: 1.6;
        }

        .arabic {
            font-family: 'Lateef', serif;
            direction: rtl;
            font-size: 2rem;
            font-weight: 700;
            color: #000;
        }

        .arabic-table {
            font-family: 'Lateef', serif;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        h1 {
            color: var(--primary-blue);
            border-bottom: 4px solid var(--primary-blue);
            text-align: center;
            font-weight: 900;
        }

        h2 {
            font-size: 1.7rem;
            color: var(--accent-blue);
            border-left: 8px solid var(--accent-blue);
            padding-left: 15px;
            margin-top: 3rem;
            background: var(--bg-card);
            padding-top: 15px;
            padding-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h3 {
            font-size: 1.4rem;
            color: var(--primary-blue);
            margin-top: 2.5rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            font-weight: 700;
        }

        h4 {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-muted);
            margin-top: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Tableaux Haute Résolution */
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin: 25px 0;
            border: 1px solid var(--primary-blue);
            border-radius: 12px;
            background: var(--bg-card);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            color: white;
            background: var(--table-header);
            padding: 15px 10px;
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        td {
            padding: 12px 10px;
            border: 1px solid var(--border-color);
            text-align: center;
            font-size: 0.95rem;
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .bg-blue-light {
            background-color: var(--note-bg);
        }

        .bg-gray-light {
            background-color: var(--bg-main);
        }

        .bg-header-sub {
            background-color: var(--border-color);
            font-weight: 800;
            color: var(--primary-blue);
            font-size: 0.75rem;
        }

        /* Atelier Drag & Drop Mobile Pro */
        .drop-zone {
            border: 2px dashed var(--text-muted);
            background: var(--bg-card);
            color: var(--text-muted);
            border-radius: 15px;
            height: 5.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.2s;
            position: relative;
            width: 100%;
            text-transform: uppercase;
        }

        .drop-zone.drag-over {
            background-color: var(--note-bg);
            border-color: var(--accent-blue);
            border-style: solid;
            transform: scale(1.02);
        }

        .draggable-label {
            font-family: 'Lateef', serif;
            font-size: 2rem;
            font-weight: 700;
            background: var(--bg-card);
            border: 2px solid var(--primary-blue);
            border-radius: 20px;
            padding: 12px 20px;
            cursor: grab;
            user-select: none;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 4.5rem;
            touch-action: none;
            z-index: 10;
            color: var(--text-main);
        }
        
        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.95;
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            background: var(--bg-card);
            border: 3px solid var(--primary-blue);
            border-radius: 20px;
            font-family: 'Lateef', serif;
            font-size: 2rem;
            font-weight: 700;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .slot-filled {
            border: 3px solid var(--primary-blue);
            background: var(--note-bg);
            color: var(--primary-blue);
            font-weight: 700;
            border-radius: 15px;
            font-family: 'Lateef', serif;
            font-size: 2rem;
            cursor: pointer;
        }

        .slot-correct {
            border: 4px solid #22c55e;
            background: #f0fdf4;
            color: #166534;
        }

        .slot-wrong {
            border: 4px solid #ef4444;
            background: #fef2f2;
            color: #991b1b;
        }

        .btn-action {
            background-color: var(--primary-blue);
            color: white;
            padding: 22px;
            border-radius: 20px;
            font-weight: 900;
            width: 100%;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            box-shadow: 0 10px 15px -3px rgba(0, 77, 153, 0.3);
        }

        .btn-action:disabled {
            opacity: 0.3;
            box-shadow: none;
        }

        .note-box {
            background-color: var(--note-bg);
            border-left: 6px solid var(--accent-blue);
            padding: 25px;
            font-size: 1.05rem;
            margin: 25px 0;
            border-radius: 0 15px 15px 0;
            color: var(--text-main);
        }

        .warning-box {
            background-color: #fef2f2;
            border-left: 6px solid #ef4444;
            padding: 25px;
            font-size: 1.05rem;
            margin: 25px 0;
            border-radius: 0 15px 15px 0;
            font-weight: 600;
            color: #991b1b;
        }

        .term {
            font-weight: 800;
            color: var(--primary-blue);
        }

        .arabic-inline {
            font-family: 'Lateef', serif;
            font-size: 2rem;
            font-weight: 700;
            vertical-align: middle;
            color: var(--text-main);
        }

        #course-main-title {
            text-align: center !important;
            direction: rtl;
        }

        @media (min-width: 901px) {
            #game-words {
                flex-wrap: wrap-reverse !important;
                flex-direction: row !important;
            }

            #game-words > div {
                flex: 1 !important;
                width: auto !important;
            }
        }

        @media (max-width: 900px) {
            /* Responsive tables */
            div[style*="overflow-x: auto"] {
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch !important;
                overflow-y: visible !important;
                max-width: 100% !important;
                width: 100% !important;
                display: block !important;
            }

            table {
                width: 100% !important;
                table-layout: auto !important;
                border: 1px solid #cbd5e1;
                border-spacing: 0;
                border-collapse: collapse;
            }

            div[style*="overflow: hidden"] {
                overflow-x: auto !important;
                overflow-y: hidden !important;
                -webkit-overflow-scrolling: touch;
            }

            th {
                background: #004d99;
                color: white !important;
                word-wrap: break-word;
                overflow-wrap: break-word;
                border: 0.1px solid #cbd5e1 !important;
                width: auto !important;
                min-width: 0 !important;
            }

            td {
                word-wrap: break-word;
                overflow-wrap: break-word;
                border: 0.1px solid #cbd5e1 !important;
                width: auto !important;
                min-width: 0 !important;
            }

            /* Empêcher rupture des mots arabes et français */
            td.fit-ar, td.fit-lab, span[style*="font-family: 'Lateef'"] {
                word-break: keep-all !important;
                overflow-wrap: normal !important;
                white-space: nowrap !important;

            }

            /* Réduire taille titre pour petits écrans */
            h1 {
                font-size: 1.25rem !important;
            }

            span[style*="font-family: 'Lateef'"] {
                font-size: 2.5rem !important;
                word-wrap: break-word;
                overflow-wrap: break-word;
                margin: 0 !important;
                font-weight: 500 !important;
                width: 100%;
            }

            span[style*="display: block"][style*="line-height: 1"] {
                line-height: 0.8 !important;
            }

            /* Réduire padding pour plus d'espace au texte */
            td.fit-ar {
                padding: 0.05rem !important;
            }

            /* Supprimer padding colonne labels et ajuster largeurs */
            td.fit-lab {
                padding: 0 !important;
                white-space: nowrap !important;
                padding-top: 0.4rem !important;
            }
                      
            th:first-child {
                width: 12% !important;
            }
            
            th:nth-child(2),
            th:nth-child(3),
            th:nth-child(4) {
                width: 29.33% !important;
            }

            /* Fix Arabic text alignment - start from top */
            #game-words {
                flex-wrap: wrap-reverse !important;
                justify-content: center !important;
                direction: ltr !important;
            }

            #game-words > div {
                flex: none !important;
                width: calc(33.333% - 11px) !important;
                max-width: 100% !important;
            }

            #course-main-title {
                font-size: 1.25rem !important;
                text-align: center !important;
                direction: rtl;
            }

            #course-body h2 {
                font-size: 1.15rem !important;
            }
        }

        /* Styles pour accordéon des cours */
        #course-body h2, #course-body h3 {
            cursor: pointer;
            user-select: none;
            padding: 0.5rem 0 !important;
        }

        #course-body h2::before, #course-body h3::before {
            content: "▼ ";
            display: inline-block;
            margin-right: 0.5rem;
            transition: transform 0.3s ease;
        }

        #course-body h2.collapsed::before, #course-body h3.collapsed::before {
            content: "▶ ";
            transform: rotate(0deg);
        }

        .course-section {
            display: block;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            overflow: hidden;
        }

        .course-section.collapsed {
            max-height: 0;
            opacity: 0;
        }

        /* --- VARIABLES DE THÈME --- */
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary-blue: #004d99;
            --accent-blue: #0066cc;
            --border-color: #e2e8f0;
            --note-bg: #e6f7ff;
            --table-header: #004d99;
        }

        body.dark-mode {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary-blue: #075985;
            --accent-blue: #7dd3fc;
            --border-color: #334155;
            --note-bg: #1e293b;
            --table-header: #075985;
        }

        /* --- STYLES DE BASE --- */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        .arabic { font-family: 'Lateef', serif; direction: rtl; font-size: 2.2rem; }
        
        /* --- BOUTON MODE NUIT --- */
        .theme-toggle {
            margin-left: auto;
            padding: 0.5rem 0.8rem;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid var(--primary-blue);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* --- OPTIMISATION PAYSAGE (ROTATION) --- */
        @media (orientation: landscape) {
            #module-container { grid-template-columns: repeat(3, 1fr) !important; }
            .max-w-6xl { max-width: 95% !important; }
            #game-words { flex-direction: row !important; flex-wrap: wrap; gap: 15px; }
            .arabic-table { font-size: 1.8rem !important; }
            header svg { width: 100px; height: 60px; }
        }

        /* --- COMPOSANTS --- */
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 1.5rem; }
        .btn-primary { background: var(--primary-blue); color: white; }
        .note-box { background: var(--note-bg); border-left: 6px solid var(--primary-blue); border-radius: 0 1rem 1rem 0; padding: 1.5rem; }
        
        /* Tableaux */
        .table-container { overflow-x: auto; border: 1px solid var(--border-color); border-radius: 12px; background: var(--bg-card); }
        th { background-color: var(--table-header); color: white; padding: 12px; }
        td { border: 1px solid var(--border-color); padding: 10px; text-align: center; }

        /* Drag & Drop */
        .drop-zone { border: 2px dashed var(--text-muted); min-height: 4rem; border-radius: 1rem; display: flex; align-items: center; justify-content: center; }
        .draggable-label { background: var(--bg-card); border: 2px solid var(--primary-blue); padding: 8px 15px; border-radius: 1rem; cursor: grab; font-family: 'Lateef', serif; font-size: 1.8rem; }
        .draggable-label.disabled { opacity: 0.4; cursor: not-allowed; }
        .slot-correct { border-color: #22c55e !important; background: #f0fdf4 !important; color: #166534 !important; }
        .slot-wrong { border-color: #ef4444 !important; background: #fef2f2 !important; color: #991b1b !important; }

        /* --- CORRECTIONS TAILWIND EN MODE DARK --- */
        body.dark-mode .text-blue-800 { color: var(--accent-blue) !important; }
        body.dark-mode .text-blue-900 { color: var(--accent-blue) !important; }
        body.dark-mode .text-slate-500,
        body.dark-mode .text-slate-400 { color: var(--text-muted) !important; }
        body.dark-mode .bg-blue-50 { background-color: var(--note-bg) !important; }
        body.dark-mode .border-blue-50 { border-color: var(--border-color) !important; }
        body.dark-mode .border-blue-900\/10 { border-color: var(--border-color) !important; }
        body.dark-mode .bg-blue-800 { background-color: var(--primary-blue) !important; }

        /* --- CLASSES RESPONSIVES POUR TOUS LES TABLEAUX --- */
        .fit-ar {font-size: clamp(0.6rem, 3.5vw, 2rem);line-height: 1.3;font-family: 'Lateef', serif;}
        .fit-lab {font-size: clamp(0.5rem, 1.8vw, 0.8rem);line-height: 1.2;font-family: 'Inter', sans-serif;}
        /*.fit-ar { font-size: clamp(0.85rem, 4vw, 2rem); line-height: 1.4; font-family: 'Lateef', serif; }      
        .fit-lab { font-size: clamp(0.75rem, 2.2vw, 0.95rem); line-height: 1.4; font-family: 'Inter', sans-serif; }*/
        .ar-fit { font-size: clamp(0.85rem, 4vw, 2rem); line-height: 1.4; font-family: 'Lateef', serif; }
        .txt-fit { font-size: clamp(0.75rem, 2.2vw, 0.95rem); line-height: 1.4; font-family: 'Inter', sans-serif; }
        .fit-pad { padding: clamp(0.15rem, 1vw, 0.5rem); }
        .fit-pad-small { padding: clamp(0.1rem, 0.8vw, 0.4rem); }

        .sub-text {font-size: clamp(0.5rem, 1.5vw, 0.75rem); color: #666; font-family: 'Inter', sans-serif; display: block; margin-top: 2px;}


    </style>   
</head>

<body class="bg-slate-50" style="background-color: var(--bg-main); transition: background-color 0.3s ease;">
    <div id="screen-menu" class="p-6 max-w-5xl mx-auto">
        <header class="flex justify-between items-center border-b-4 border-blue-900/10 mb-10 gap-4">
            <svg width="70" height="80" viewBox="0 0 437 275" fill="none" xmlns="http://www.w3.org/2000/svg"
                class="shrink-0">
                <defs>
                    <mask id="hole">
                        <rect width="437" height="279" fill="white" />
                        <path d="M85 189 V138 H176 V189 H85 Z" fill="black" />
                    </mask>
                </defs>
                <path
                    d="M131 0C120 1 113 15 115 25C117 35 125 40 135 40C145 40 152 32 153 23C150 30 142 32 133 28C123 22 126 6 131 0Z"
                    fill="#B7A12E" />

                <path d="M129.5 48 Q 105 78, 73 97 V189 H189 V97 Q 155 78, 129.5 48 Z" fill="#1F9E75"
                    mask="url(#hole)" />
                <path d="M5 189V172.5C10 148.5 21 123.5 27.5 114V189H5Z" fill="#1F9E75" />
                <path d="M234.5 115C245 129 251 147.5 256 170.5V189H234.5V115Z" fill="#1F9E75" />

                <rect x="39" y="167" width="23" height="22" fill="#1F9E75" />
                <rect x="200" y="167" width="23" height="22" fill="#1F9E75" />

                <g fill="#B7A12E" transform="translate(0, -5)">
                    <path
                        d="M95 158 Q 115 165, 131 170 Q 147 165, 167 158 L 162 162 Q 145 168, 131 173 Q 117 168, 100 162 Z" />
                    <path
                        d="M90 160 L 131 176 L 172 160 L 168 165 L 134 179 L 158 190 L 153 193 L 131 183 L 109 193 L 104 190 L 128 179 L 94 165 Z" />
                </g>

                <text x="430" y="185" font-family="Arial, sans-serif" font-size="44" fill="#B7A12E" text-anchor="end"
                    font-weight="bold">
                    <tspan>فلا</tspan>
                    <tspan dy="11">ح</tspan>
                    <tspan dy="-11"> دارين</tspan>
                </text>
                <text x="5" y="242" font-family="Arial Black, sans-serif" font-size="50" font-weight="900"
                    fill="#B7A12E" textLength="427" lengthAdjust="spacingAndGlyphs">FALAH-E-DARAINE</text>
                <text x="5" y="274" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#117456"
                    textLength="427" lengthAdjust="spacing">La réussite dans les deux mondes</text>
            </svg>

            <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter text-blue-900 flex-1 text-center">
                Grammaire Arabe
            </h1>
            <div id="update-toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-sm bg-blue-900 text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between animate-bounce">
                <div class="text-xs font-bold">Nouvelle version disponible !</div>
                <button onclick="window.location.reload()" class="bg-white text-blue-900 px-3 py-1 rounded-lg text-[10px] font-black uppercase">Mettre à jour</button>
            </div>
            <button onclick="toggleDarkMode()" class="theme-toggle" id="theme-btn">🌙</button>
        </header>

        <div id="module-container" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
    </div>
    <div id="screen-course" class="hidden min-h-screen flex flex-col" style="background-color: var(--bg-main);">
        <div class="border-b sticky top-0 z-40 shadow-md" style="background-color: var(--bg-main); border-color: var(--border-color);">
            <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center w-full">
                <button onclick="showMenu()" class="text-blue-800 font-black p-2 flex items-center text-sm">
                    <span class="mr-2 text-2xl">←</span> MENU
                </button>
                <div class="flex items-center gap-4">
                    <button id="btn-prev-mod" class="text-blue-800 font-black text-xl p-2">❮</button>
                    <p id="course-header-title" class="text-[8px] font-black text-blue-900 uppercase tracking-widest">
                    </p>
                    <button id="btn-next-mod" class="text-blue-800 font-black text-xl p-2">❯</button>
                </div>
                <button id="btn-to-practice"
                    class="bg-blue-800 text-white text-[11px] px-6 py-2 rounded-xl font-bold uppercase shadow-lg active:scale-95 transition-all">EXERCICES</button>
            </div>
        </div>
        <div class="flex-1 p-6 md:p-12 max-w-6xl mx-auto w-full overflow-y-auto">
            <h2 id="course-main-title" class="text-4xl md:text-4xl font-black mb-10 border-b-8 border-blue-50 pb-6">Contenu du cours</h2>
            <div id="course-body" class="pb-32"></div>
        </div>
    </div>
    <div id="screen-game" class="hidden min-h-screen flex flex-col" style="background-color: var(--bg-main);">
        <div class="border-b sticky top-0 z-40 shadow-sm" style="background-color: var(--bg-main); border-color: var(--border-color);">
            <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center w-full">
                <button onclick="showMenu()" class="text-blue-800 font-black p-2 flex items-center text-sm">
                    <span class="mr-2 text-2xl">←</span> MENU
                </button>
                <div class="text-center">
                    <p id="game-mod-title" class="text-[11px] font-black text-blue-800 uppercase tracking-widest"></p>
                    <p id="game-progress" class="text-[11px] font-bold text-slate-400"></p>
                </div>
                <button onclick="showCourseFromGame()"
                    class="bg-blue-800 text-white text-[11px] px-6 py-2 rounded-xl font-bold uppercase shadow-lg active:scale-95 transition-all">COURS</button>
            </div>
        </div>

        <div class="flex-1 p-6 flex flex-col max-w-md mx-auto w-full overflow-y-auto">
            <div id="game-translation"
                class="text-center italic text-xl mb-12 p-8 rounded-[2rem] shadow-inner" style="background-color: var(--note-bg); color: var(--text-muted); border: 1px solid var(--border-color);">
            </div>
            <div id="game-words" class="flex flex-wrap justify-center gap-4 mb-20"></div>
            <p class="text-center text-[11px] font-black text-slate-400 uppercase mb-6 tracking-widest">Glissez les
                étiquettes sur les mots :</p>
            <div id="game-labels" class="flex flex-wrap justify-center gap-4 pb-24"></div>
        </div>

        <div class="border-t sticky bottom-0 z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]" style="background-color: var(--bg-main); border-color: var(--border-color);">
            <div class="max-w-6xl mx-auto p-6">
                <div id="game-feedback" class="hidden mb-4 p-6 rounded-3xl flex items-center justify-between shadow-lg">
                    <span id="game-feedback-text" class="font-black text-md tracking-wider"></span>
                    <button onclick="toggleRule()"
                        class="text-[11px] font-black bg-white/50 px-4 py-2 rounded-xl border border-current uppercase">Explication</button>
                </div>
                <div id="game-rule"

                        <h2 style="margin: 2rem 0 1rem 0; color: #0066cc; font-family: 'Poppins'; font-size: 1.25rem; font-weight: 700;">3.
                            <strong style="font-family: 'Lateef'; font-size: 1.6rem; font-weight: 700;">الْجَارُّ وَالْمَجْرُورُ</strong></h2>
                        <div style="background: #e8f4f8; border-left: 4px solid #0066cc; padding: 0.4rem; border-radius: 0.4rem;">
                            <p style="margin: 0.8rem 0; font-size: 0.9rem; line-height: 1.2;">Les prépositions qui affectent l'état du nom qui suit.</p>
                            <ul style="list-style-type: disc; margin: 1rem 0; padding-left: 1.8rem; font-size: 0.9rem; line-height: 1.2;">

                                <li style="margin: 0.5rem 0;"><strong style="font-family: 'Lateef'; font-size: 1.6rem;">الْجَارُّ</strong> : La
                                    particule (lettre ou mot).</li>
                                <li style="margin: 0.5rem 0;"><strong style="font-family: 'Lateef'; font-size: 1.6rem;">الْمَجْرُورُ</strong> : Le nom
                                    qui suit, qui est mis à l'état <em style="font-family: 'Lateef'; font-size: 1.6rem;">جَرٌّ</em>.</li>
                            </ul>         
                            <p style="margin: 0.8rem 0; font-size: 0.9rem; line-height: 1.2;"><em>Ex :</em> 
                                <strong style="font-family: 'Lateef'; font-size: 1.6rem; color: #ef4444; font-weight: 700;">فِي <span style="color: #0066cc;">الْمَسْجِدِ</span></strong> (Dans la mosquée).
                            </p>
                        </div>

                        <div style="background: #fff3e0; border-left: 4px solid #ff9800; padding: 1.2rem; margin: 1.5rem 0; border-radius: 0.4rem;">
                            <strong style="color: #e67e22; font-size: 1rem; display: block; margin-bottom: 0.8rem;">Règles de construction
                                :</strong>
                            <ol style="list-style-type: disc; margin: 0; padding-left: 1rem; font-size: 0.9rem; line-height: 1.2;">
                                <li style="margin: 0.5rem 0;">Il faut <em>connaître</em> les <strong>Harf Jarr</strong>.

                                </li>
                                <li style="margin: 0.5rem 0;">Le Harf Jarr est toujours <strong>avant</strong> le Ism.</li>
                                <li style="margin: 0.5rem 0;">Le Ism est <strong>toujours</strong> à l'état Jarr.</li>
                            </ol>

                            <p style="margin: 0.8rem 0; font-size: 0.9rem; line-height: 1.2;">Indique la possession ou l'annexion.</p>
                            <ul style="list-style-type: disc; margin: 1rem 0; padding-left: 1.8rem; font-size: 0.9rem; line-height: 1.2;">
                                <li style="margin: 0.5rem 0;"><strong style="font-family: 'Lateef'; font-size: 1.6rem;">مُضَافٌ</strong> : Le "possédé" (1er mot).</li>
                                <li style="margin: 0.5rem 0;"><strong style="font-family: 'Lateef'; font-size: 1.6rem;">مُضَافٌ إِلَيْهِ</strong> : Le "possesseur" (2ème mot).</li>
                            </ul>
                            <p style="margin: 0.8rem 0; font-size: 0.9rem; line-height: 1.2;"><em>Ex :</em> <strong
                                style="font-family: 'Lateef'; font-size: 1.6rem; color: #0066cc;">بَيْتُ مُحَمَّدٍ</strong> (La maison de Muhammad)

                                        <li style="margin: 0.3rem 0;">Jamais de « ال ».</li>
                                        <li style="margin: 0.3rem 0;">Jamais de Tanwin.</li>
                                        <li style="margin: 0.3rem 0;">Jamais de « ن » final (pour le duel et le pluriel masculin sain).</li>
                                    </ul>

                                <li style="margin: 0.6rem 0;"><strong>Le Mudaf Ilayh :</strong> Toujours à l'état <strong style="font-family: 'Lateef'; font-size: 2rem;">جَرٌّ</strong>.</li>
                            </ol>

                        <h3 style="margin: 1.5rem 0 1rem 0; color: #0066cc; font-family: 'Poppins'; font-size: 1.1rem;">

                            <p style="margin: 0.8rem 0; font-size: 0.9rem; line-height: 1.2;">Règle d'or : Tout pronom (Damir)
                            attaché à un nom (Ism) est considéré comme une Idafah.</p>
                            <ul style="list-style-type: disc; margin: 1rem 0; padding-left: 1.8rem; font-size: 0.9rem; line-height: 1.2;">
                                <li style="margin: 0.5rem 0;">Le Nom = <em>Mudaf</em></li>
                                <li style="margin: 0.5rem 0;">Le Pronom = <em>Mudaf Ilayh</em> (place de Jarr)</li>
                            </ul>
                            <p style="margin: 0.8rem 0; font-size: 0.9rem; line-height: 1.2;"><em>Ex :</em> <strong
                                style="font-family: 'Lateef'; font-size: 1.6rem; color: #0066cc;">كِتَابُ<span style="color: #ef4444;">هُ</span></strong> (Son livre)
                            </p>

                        <p style="margin: 0.5rem 0; font-size: 0.9rem; line-height: 1.2;">Dans une phrase verbale, le sujet peut apparaître sous <strong>deux formes</strong> :</p>

                        <ul style="list-style-type: disc; margin: 1rem 0; padding-left: 1.8rem; font-size: 0.9rem; line-height: 1.2;">
                            <li style="margin: 0.5rem 0;"><strong>Sujet Interne - Pronom </strong>: Le sujet est le suffixe attaché au verbe ou caché.</li>
                            <li style="margin: 0.5rem 0;"><strong>Sujet Externe - Nom </strong>: Le sujet est un nom apparent qui vient <strong>après</strong> le verbe
                                et <strong>doit être</strong> à l'état <strong style="font-family: 'Lateef'; font-size: 2rem; color: #0066cc;">رَفْعٌ</strong>.</li>
                        </ul>
                        <p style="margin: 0; font-size: 0.9rem;"><em>Ex :</em></p>
                        <ul style="list-style-type: disc; padding-left: 1.8rem; font-size: 0.9rem; line-height: 1.2;">
                            <li><strong style="font-family: 'Lateef'; font-size: 1.6rem; color: #0066cc;">كَتَبَ</strong> (Il a écrit)</li>
                            <li><strong style="font-family: 'Lateef'; font-size: 1.6rem; color: #0066cc;">كَتَبَ الْمُسْلِمُ</strong> (Le musulman a écrit)</li>
                        </ul>
                    </div>

                    <hr style="border: none; border-top: 2px solid #ddd; margin: 2rem 0;">

                    <h2 style="margin: 2rem 0 1.5rem 0; color: #0066cc; font-family: 'Poppins'; font-size: 1.3rem; font-weight: 700;">4. Les Pronoms attachés au verbe</h2>
                    <div style="background: #e8f4f8; border-left: 4px solid #0066cc; padding: 0.5rem; border-radius: 0.4rem;">
                        <p style="margin: 0.5rem 0; font-size: 0.9rem; line-height: 1.2;">Lorsqu'on attache un pronom complément (<em>Damir</em>) à la fin d'un verbe, il devient
                            <strong style="font-family: 'Lateef'; font-size: 1.6rem; color: #0066cc;">مَفْعُولٌ بِهِ</strong> (l'objet qui subit l'action).
                        </p>
                        <p style="font-size: 0.9rem;"><em>Ex :</em></p>
                        <p style="font-size: 0.9rem; line-height: 1.6; text-align: center; font-weight: 600;">
                            <strong style="font-family: 'Lateef'; font-size: 2rem; color: #0066cc;">هُ</strong> (lui) + <strong style="font-family: 'Lateef'; font-size: 2rem; color: #0066cc;">نَصَرَ</strong> (Il a aidé) = <strong style="font-family: 'Lateef'; font-size: 2rem; color: #0066cc;">نَصَرَهُ</strong> (Il l'a aidé)</p>

                    </div>
                    <div style="background: #fff3e0; border-left: 4px solid #ff9800; padding: 1.2rem; margin: 1.5rem 0; border-radius: 0.4rem;">
                        <strong style="color: #e67e22; font-size: 1rem; display: block; margin-bottom: 0.4rem;">Règles de transformation :</strong>
                        <p style="line-height: 1; color: #555; font-family: 'Poppins'; font-size: 1rem; font-weight: 600;">Le "Nun" de protection - <strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">نُونُ الْوِقَايَةِ</strong></p>
                        <p style="line-height: 1; font-size: 0.9rem;">Lorsqu'on attache le pronom "Moi" (<strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">ـي</strong>) à un verbe, on doit insérer un <strong style="font-family: 'Lateef'; font-size: 2rem; color: #0066cc; font-weight: 700;">ن</strong> entre le verbe et le pronom.</p>
                        <p style="line-height: 1; font-size: 0.9rem;">Ex : <strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">ضَرَبَ</strong> + <strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">ـي</strong> → <strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">ضَرَبَنِي</strong> (Il m'a frappé)</p>
                        <p style="margin-top: 2rem;line-height: 1; color: #555; font-family: 'Poppins'; font-size: 1rem; font-weight: 600;">Le "Waw" de saturation - <strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">الْإِشْبَاعُ</strong></p>
                        <p style="line-height: 1; font-size: 0.9rem;">Lorsque le verbe se termine par <strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">تُمْ</strong> (Vous, masc.) et qu'on y ajoute un pronom, on ajoute un <strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">و</strong> pour faire la liaison.</p>
                        <p style="line-height: 1; font-size: 0.9rem;">Ex : <strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">ضَرَبْتُمْ</strong> + <strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">هُ</strong> → <strong style="font-family: 'Lateef'; font-size: 1.8rem; color: #0066cc; font-weight: 700;">ضَرَبْتُمُوهُ</strong> (Vous l'avez frappé)</p>
                    </div>

                    <hr style="border: none; border-top: 2px solid #ddd; margin: 2rem 0;">

                    <h2 style="margin: 2rem 0 1.5rem 0; color: #0066cc; font-family: 'Poppins'; font-size: 1.3rem; font-weight: 700;">5. Structure de la phrase verbale</h2>

                    <div style="text-align: center; background: #f5f5f5; border: 1px solid #ddd; padding: 1.2rem; border-radius: 0.4rem; margin: 1.5rem 0;">

                        <p style="margin: 0.5rem 0; font-size: 0.9rem; line-height: 1.2;">La règle du sujet interne/externe vue pour le passé s'applique exactement de la même manière au présent.</p>

                        <p style="margin: 0.5rem 0; font-size: 0.9rem; line-height: 1.2;">Une phrase verbale est une phrase qui commence par un verbe conjugué. Elle peut être simple (Verbe + Sujet) ou complexe (Verbe + Sujet + Objet + Complément).</p>
                        <p style="margin: 0 0 0.8rem 0; font-size: 0.9rem; color: #0066cc; font-weight: 600;">Caractéristiques d'une phrase verbale :</p>
                        <ul style="list-style-type: disc; margin: 0; padding-left: 1.8rem; font-size: 0.95rem; line-height: 1.2;">
                            <li>Elle commence par un verbe conjugué (Présent ou Passé).</li>
                            <li>Le sujet peut être interne (Raf') ou externe (Raf' après le verbe).</li>
                            <li>Elle peut contenir un objet (Nasb) et des compléments (Raf' ou Nasb).</li>

                    <h3 style="margin: 1.5rem 0 1rem 0; color: #555; font-family: 'Poppins'; font-size: 1.05rem; font-weight: 600;">Méthode 4 : Le Pronom de Séparation (<strong style="font-family: 'Lateef'; font-size: 1.6rem; color: #0066cc;">ضَمِيرُ مُنْفَصِلٌ</strong>)</h3>

                            <li style="margin: 0.6rem 0;"><strong style="color: #0066cc;">Al-Mansoub (الْمَنْصُوبُ)</strong> : Le cas
                                subjonctif/accusatif.</li>
                            <li style="margin: 0.6rem 0;"><strong style="color: #0066cc;">Al-Majzoum (الْمَجْزُومُ)</strong> : Le cas
                                jussif/apocopé (spécifique aux verbes).</li>
                        </ol>

                        <p style="margin: 0.8rem 0; font-size: 0.95rem;">Pour le présent, la règle diffère légèrement :</p>

                        <ol style="list-style-type: decimal; margin: 1rem 0; padding-left: 1.8rem; font-size: 0.95rem; line-height: 1.8;">
                            <li style="margin: 0.6rem 0;">La <strong style="color: #0066cc;">dernière lettre</strong> ne change pas.</li>
                            <li style="margin: 0.6rem 0;">La <strong style="color: #0066cc;">1ère lettre</strong> prend
                                une <strong style="color: #0066cc;">Damma</strong>.</li>
                            <li style="margin: 0.6rem 0;">Toutes les lettres voyellées <strong style="color: #0066cc;">entre</strong> prennent une <strong
                                    style="color: #0066cc;">Fatha</strong>.</li>
                        </ol>

                                    <span style="font-family: 'Lateef'; font-size: 2rem;">يَكْتُبُ</span>

                                    <span style="font-family: 'Lateef'; font-size: 2rem;"><span style="color: #ef4444;">يُ</span>كْتَـ<span style="color: #ef4444;">بُ</span></span>

                    <div style="margin-bottom: 2rem;">
                        <h2 style="margin: 2rem 0 1.5rem 0; color: #0066cc; font-family: 'Poppins'; font-size: 1.3rem; font-weight: 700;">5.
                            L'Interjection - Le Nidâ - النِّدَاء </h2>

                        <div
                            style="background: #e8f4f8; border-left: 4px solid #0066cc; padding: 1.2rem; margin-bottom: 1.5rem; border-radius: 0.4rem;">
                            <strong style="color: #0066cc; display: block; margin-bottom: 0.8rem;">Définition :</strong>
                            <p style="margin: 0; font-size: 0.95rem;">La particule <strong>يَا</strong> (<em>harf n-nidâ</em>) est utilisée pour interpeler une personne ou un groupe.
                                <br>Elle est systématiquement suivie du <strong style="font-family: 'Lateef'; font-size: 2rem;">مُنَادَى</strong> (<em>munâdâ</em>), qui désigne l'entité interpelée.
                                <br>Il existe 3 règles spécifiques pour la déclinaison du nom après "Yâ", selon sa nature (défini, indéfini, propre, etc.).
                            </p>
                        </div>

                        <h3 style="margin: 1.5rem 0 1rem 0; color: #555; font-family: 'Poppins'; font-size: 1rem; font-weight: 600;">1. L'interpellation d'un nom commençant par <span style="font-family: 'Lateef'; font-size: 2rem; font-weight: 700;">ال</span></h3>
                        <p>Pour les noms définis par l'article, on intercale une particule spécifique entre "Yâ" et le nom :</p>
                        <ol style="list-style-type: disc; margin: 0.5rem 0; padding-left: 1.5rem; font-size: 0.95rem;">
                            <li><strong>Masculin (<span style="font-family: 'Lateef'; font-size: 2rem;">مُذَكَّر</span>) :</strong> On ajoute <span style="font-family: 'Lateef'; font-size: 2rem; color: #ef4444;">أَيُّهَا</span> devant le nom.
                                <ul style="list-style-type: square; margin: 1rem 0; padding-left: 1.8rem; font-family: 'Lateef'; font-size: 2rem;">
                                    <li>يَا<span style="color: #ef4444;"> أَيُّهَا</span> الرَّسُولُ </li>
                                    <li>يَا<span style="color: #ef4444;"> أَيُّهَا</span> النَّاسُ </li>
                                    <li>يَا<span style="color: #ef4444;"> أَيُّهَا</span> الكَافِرُونَ </li>
                                </ul>
                            </li>
                            <li><strong>Féminin (<span style="font-family: 'Lateef'; font-size: 2rem;">مُؤَنَّتْ</span>) :</strong> On ajoute <span style="font-family: 'Lateef'; font-size: 2rem; color: #ef4444;">أَيَّتُهَا</span> devant le nom.
                                <ul style="list-style-type: square; margin: 1rem 0; padding-left: 1.8rem; font-family: 'Lateef'; font-size: 2rem;">
                                    <li>يَا <span style="color: #ef4444;">أَيَّتُهَا</span> النَّفْسُ </li>
                                </ul>
                            </li>
                        </ol>

                        <h3 style="margin: 1.5rem 0 1rem 0; color: #555; font-family: 'Poppins'; font-size: 1rem; font-weight: 600;">2. Le Nom Propre (<span style="font-family: 'Lateef'; font-size: 2rem; font-weight: 700;">العلم</span>)</h3>
                        <p class="rule">Règle : Le prénom devient "mabnî" (invariable dans cette position) sur la damma (<span style="font-family: 'Lateef'; font-size: 2rem;">ضَمَّةٌ</span>).</p>
                        <ol style="margin: 0.5rem 0; padding-left: 1.5rem; font-size: 0.95rem;">
                            <li><strong>Exemples:</strong>
                                <ul style="list-style-type: square; margin: 1rem 0; padding-left: 1.8rem; font-family: 'Lateef'; font-size: 2rem;">
                                    <li><span style="color: #ef4444;"> يَا</span> زَيْدُ </li>
                                    <li><span style="color: #ef4444;"> يَا</span> شُعَيْبٌ </li>
                                </ul>
                            </li>
                        </ol>

                        <h3 style="margin: 1.5rem 0 1rem 0; color: #555; font-family: 'Poppins'; font-size: 1rem; font-weight: 600;">3. La possession (<span style="font-family: 'Lateef'; font-size: 2rem; font-weight: 700;">مضاف / مضاف إليه</span>)</h3>
                        <p class="rule">Règle : Le premier terme (mudâf) doit être à l'état de cas direct ou "nasb" (<span style="font-family: 'Lateef'; font-size: 2rem;">نصب</span>).</p>
                        <ol style="margin: 0.5rem 0; padding-left: 1.5rem; font-size: 0.95rem; white-space: nowrap;">
                            <li><strong>Exemples:</strong>
                                <ul style="list-style-type: square; margin: 1rem 0; padding-left: 1.8rem; font-family: 'Lateef'; font-size: 2rem;">
                                    <li>يَا أَهْ<span style="color: #ef4444;">لَ</span> الْكِتَابِ </li>
                                    <li>يَا بَنِ<span style="color: #ef4444;">ي</span> إِسْرَائِيلَ </li>
                                    <li>يَا رَ<span style="color: #ef4444;">بَّ</span> العَالَمِينَ </li>

                                </ul>
                            </li>
                        </ol>
                    </div>

                    <div style="margin-bottom: 2rem;">
                        <h2 style="margin: 2rem 0 1.5rem 0; color: #0066cc; font-family: 'Poppins'; font-size: 1.3rem; font-weight: 700;">6.
                            Les Mots de Liaison</h2>
                        <div
                            style="background: #e8f4f8; border-left: 4px solid #0066cc; padding: 1.2rem; margin-bottom: 1.5rem; border-radius: 0.4rem;">
                            <strong style="color: #0066cc; display: block; margin-bottom: 0.8rem;">Définition :</strong>
                            <p style="margin: 0; font-size: 0.95rem;">Ce sont les pronoms relatifs (qui, que, dont, lequel...). Ils servent

            }
        };
        let currentModId = null, currentIdx = 0, userAnswers = [], score = 0, state = 'playing';
        let dragGhost = null;
        let gameState = null; // Sauvegarde l'état du jeu
        let loadedExerciseIdx = -1; // Track quel exercice est actuellement chargé
        function initializeAccordion() {
            const courseBody = document.getElementById('course-body');
            if (!courseBody) return;
            
            // Créer les sections pour les H2
            const h2Headings = courseBody.querySelectorAll('h2');
            h2Headings.forEach(heading => {
                heading.classList.add('collapsed');
                heading.style.cursor = 'pointer';
                
                const section = document.createElement('div');
                section.className = 'course-section collapsed';
                
                let nextElement = heading.nextElementSibling;
                while (nextElement && nextElement.tagName !== 'H2') {
                    const elementToMove = nextElement;
                    nextElement = nextElement.nextElementSibling;
                    section.appendChild(elementToMove);
                }
                heading.parentElement.insertBefore(section, heading.nextElementSibling);
                
                heading.addEventListener('click', () => {
                    heading.classList.toggle('collapsed');
                    section.classList.toggle('collapsed');
                });
            });
            
            // Créer les sections pour les H3 (après que les H2 sections soient créées)
            const h3Headings = courseBody.querySelectorAll('h3');
            h3Headings.forEach(heading => {
                heading.classList.add('collapsed');
                heading.style.cursor = 'pointer';
                
                const section = document.createElement('div');
                section.className = 'course-section collapsed';
                
                let nextElement = heading.nextElementSibling;
                while (nextElement && nextElement.tagName !== 'H2' && nextElement.tagName !== 'H3') {
                    const elementToMove = nextElement;
                    nextElement = nextElement.nextElementSibling;
                    section.appendChild(elementToMove);
                }
                heading.parentElement.insertBefore(section, heading.nextElementSibling);
                
                heading.addEventListener('click', () => {
                    heading.classList.toggle('collapsed');
                    section.classList.toggle('collapsed');
                });
            });
        }
        function showMenu() { document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden')); document.getElementById('screen-menu').classList.remove('hidden'); window.scrollTo(0, 0); }
        function showCourse(id) {
            // Sauvegarder l'état du jeu s'il y a une partie en cours
            if (currentModId === id && state === 'playing') {
                gameState = {
                    modId: currentModId,
                    currentIdx: currentIdx,
                    score: score,
                    userAnswers: JSON.parse(JSON.stringify(userAnswers))
                };
            }
            
            currentModId = id;
            const mod = modulesData[id];
            const keys = Object.keys(modulesData);
            const idx = keys.indexOf(id);

            document.getElementById('course-header-title').innerText = mod.name;
            document.getElementById('course-main-title').innerText = mod.title;
            document.getElementById('course-body').innerHTML = mod.course;
            document.getElementById('btn-to-practice').onclick = () => gameState && gameState.modId === id ? resumeGame(id) : startGame(id);

            // Gestion des chevrons
            const prevBtn = document.getElementById('btn-prev-mod');
            const nextBtn = document.getElementById('btn-next-mod');

            if (idx > 0) {
                prevBtn.style.visibility = "visible";
                prevBtn.onclick = () => showCourse(keys[idx - 1]);
            } else {
                prevBtn.style.visibility = "hidden";
            }

            if (idx < keys.length - 1) {
                nextBtn.style.visibility = "visible";
                nextBtn.onclick = () => showCourse(keys[idx + 1]);
            } else {
                nextBtn.style.visibility = "hidden";
            }

            document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('screen-course').classList.remove('hidden');
            applyDarkModeStyles();
            initializeAccordion();
            window.scrollTo(0, 0);
        }
        function startGame(id) { currentModId = id; currentIdx = 0; score = 0; userAnswers = []; gameState = null; loadedExerciseIdx = -1; document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden')); document.getElementById('screen-game').classList.remove('hidden'); loadExercise(); }
        function resumeGame(id) { if (gameState && gameState.modId === id) { currentModId = gameState.modId; currentIdx = gameState.currentIdx; score = gameState.score; userAnswers = JSON.parse(JSON.stringify(gameState.userAnswers)); loadedExerciseIdx = currentIdx; } document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden')); document.getElementById('screen-game').classList.remove('hidden'); loadExercise(); }
        function showCourseFromGame() { if (currentModId) showCourse(currentModId); }
        function loadExercise() {
            const mod = modulesData[currentModId], ex = mod.exercises[currentIdx];
            state = 'playing';
            // Réinitialiser userAnswers si c'est un nouvel exercice
            if (loadedExerciseIdx !== currentIdx) {
                userAnswers = new Array(ex.phrase.length).fill(null);
                loadedExerciseIdx = currentIdx;
            }
            document.getElementById('game-mod-title').innerText = mod.title;
            document.getElementById('game-progress').innerText = `DÉFI ${currentIdx + 1} / ${mod.exercises.length}`;
            document.getElementById('game-translation').innerText = ex.translation;
            document.getElementById('game-feedback').classList.add('hidden');
            document.getElementById('game-rule').classList.add('hidden');
            document.getElementById('btn-action').innerText = "VÉRIFIER";
            document.getElementById('btn-action').disabled = true;
            const wordCont = document.getElementById('game-words'); wordCont.innerHTML = '';
            ex.phrase.forEach((w, i) => {
                const div = document.createElement('div'); div.className = "flex-1 flex flex-col items-center gap-4";
                div.innerHTML = `<div class="arabic text-3xl font-bold w-full py-10 rounded-[2.5rem] shadow-sm border text-center" style="background-color: var(--bg-card); border-color: var(--border-color); color: var(--text-main);">${w}</div><div id="slot-${i}" class="drop-zone w-full">Placer ici</div>`;
                wordCont.appendChild(div);
            });
            const labelCont = document.getElementById('game-labels'); labelCont.innerHTML = '';
            ex.opts.forEach((o, idx) => {
                const el = document.createElement('div'); el.innerText = o; el.className = "draggable-label";
                el.onmousedown = (e) => startDrag(e, o, el); el.ontouchstart = (e) => startDrag(e, o, el);
                labelCont.appendChild(el);
            });
            
            // Restaurer l'état visuel des réponses précédentes
            userAnswers.forEach((answer, i) => {
                if (answer) {
                    const slot = document.getElementById(`slot-${i}`);
                    slot.innerText = answer;
                    slot.className = "drop-zone w-full slot-filled";
                    slot.onclick = () => { if (state === 'playing') { userAnswers[i] = null; slot.innerText = "Placer ici"; slot.className = "drop-zone w-full"; document.querySelectorAll('.draggable-label').forEach(l => { if (l.innerText === answer) l.classList.remove('disabled'); }); document.getElementById('btn-action').disabled = true; } };
                    // Désactiver le label correspondant
                    document.querySelectorAll('.draggable-label').forEach(label => {
                        if (label.innerText === answer) label.classList.add('disabled');
                    });
                    // Activer le bouton si tous les slots sont remplis
                    document.getElementById('btn-action').disabled = false;
                }
            });
            
            applyDarkModeStyles();
        }
        function startDrag(e, label, originalEl) {
            if (state !== 'playing') return;
            if (originalEl.classList.contains('disabled')) return;
            if (e.cancelable) e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            dragGhost = document.createElement('div'); dragGhost.innerText = label; dragGhost.className = 'drag-ghost';
            dragGhost.style.width = originalEl.offsetWidth + 'px'; dragGhost.style.height = originalEl.offsetHeight + 'px';
            document.body.appendChild(dragGhost);
            const moveAt = (clientX, clientY) => {
                dragGhost.style.left = clientX - dragGhost.offsetWidth / 2 + 'px';
                dragGhost.style.top = clientY - dragGhost.offsetHeight / 2 + 'px';
            };
            const onMove = (event) => {
                const moveTouch = event.touches ? event.touches[0] : event;
                moveAt(moveTouch.clientX, moveTouch.clientY);
                const elUnder = document.elementFromPoint(moveTouch.clientX, moveTouch.clientY);
                document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
                if (elUnder && elUnder.classList.contains('drop-zone')) elUnder.classList.add('drag-over');
            };
            const onEnd = (event) => {
                const endTouch = event.changedTouches ? event.changedTouches[0] : (event.touches ? event.touches[0] : event);
                const elUnder = document.elementFromPoint(endTouch.clientX, endTouch.clientY);
                if (elUnder && elUnder.classList.contains('drop-zone')) {
                    const slotIdx = parseInt(elUnder.id.split('-')[1]);
                    const prevLabel = userAnswers[slotIdx];
                    userAnswers[slotIdx] = label;
                    const slot = document.getElementById(`slot-${slotIdx}`);
                    slot.innerText = label; slot.className = "drop-zone w-full slot-filled";
                    slot.onclick = () => { if (state === 'playing') { userAnswers[slotIdx] = null; slot.innerText = "Placer ici"; slot.className = "drop-zone w-full"; document.querySelectorAll('.draggable-label').forEach(l => { if (l.innerText === label) l.classList.remove('disabled'); }); document.getElementById('btn-action').disabled = true; } };
                    originalEl.classList.add('disabled');
                    if (prevLabel) document.querySelectorAll('.draggable-label').forEach(l => { if (l.innerText === prevLabel) l.classList.remove('disabled'); });
                }
                document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
                if (dragGhost) { dragGhost.remove(); dragGhost = null; }
                document.getElementById('btn-action').disabled = userAnswers.includes(null);
                document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onEnd);
            };
            moveAt(touch.clientX, touch.clientY);
            document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false }); document.addEventListener('touchend', onEnd);
        }
        function handleAction() {
            if (state === 'playing') {
                const ex = modulesData[currentModId].exercises[currentIdx];
                const isCorrect = userAnswers.every((v, i) => v === ex.correct[i]);
                state = 'checked';
                const fdb = document.getElementById('game-feedback'), fdbT = document.getElementById('game-feedback-text');
                fdb.classList.remove('hidden');
                userAnswers.forEach((v, i) => {
                    const s = document.getElementById(`slot-${i}`);
                    s.className = "drop-zone w-full slot-filled " + (v === ex.correct[i] ? "slot-correct" : "slot-wrong");
                });
                if (isCorrect) { score++; fdb.className = "mb-4 p-5 rounded-2xl flex bg-green-600 text-white shadow-xl"; fdbT.innerText = "Exact !"; }
                else { fdb.className = "mb-4 p-5 rounded-2xl flex bg-red-600 text-white shadow-xl"; fdbT.innerText = "Erreur d'analyse"; }
                document.getElementById('btn-action').innerText = "SUIVANT";
            } else {
                const mod = modulesData[currentModId];
                if (currentIdx < mod.exercises.length - 1) { currentIdx++; loadExercise(); }
                else { document.getElementById('screen-game').classList.add('hidden'); document.getElementById('screen-result').classList.remove('hidden'); document.getElementById('result-title').innerText = `${mod.name}: ${mod.title}`; document.getElementById('result-score').innerText = `${score} / ${mod.exercises.length}`; }
            }
        }
        function toggleRule() { const box = document.getElementById('game-rule'); box.innerText = modulesData[currentModId].exercises[currentIdx].rule; box.classList.toggle('hidden'); }
        window.onload = function () {
            const container = document.getElementById('module-container');
            Object.values(modulesData).forEach((m, index) => {
                const card = document.createElement('div'); card.className = "w-full p-8 flex flex-col gap-6 rounded-3xl shadow-sm"; card.style.background = 'var(--bg-card)';
                card.innerHTML = `<div><p style="font-size: 0.75rem; font-weight: 900; color: #0066cc; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0 0 1rem 0; line-height: 1;">${m.name}</p><p class="font-bold text-lg tracking-tight" style="color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${m.title}</p><p class="text-sm" style="color: var(--text-muted); min-height: 2.5em; line-height: 1.25;">${m.summary}</p></div><div class="grid grid-cols-2 gap-4"><button onclick="showCourse('${m.id}')" class="py-4 border-2 border-blue-100 text-blue-900 text-[10px] font-black rounded-[1.2rem] uppercase tracking-widest transition-all">Cours</button><button onclick="startGame('${m.id}')" class="py-4 bg-blue-900 text-white text-[10px] rounded-[1.2rem] shadow-lg uppercase tracking-widest active:scale-95 transition-all">Exercices</button></div>`;
                container.appendChild(card);
            });
        };
        // --- ENREGISTREMENT SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    // On surveille les mises à jour
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            // Si le nouveau script est installé et prêt
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // On affiche la notification
                                document.getElementById('update-toast').classList.remove('hidden');
                            }
                        });
                    });
                });
            });
        }
        // --- LOGIQUE MODE NUIT ---
        function applyDarkModeStyles() {
            const isDark = document.body.classList.contains('dark-mode');
            
            // Tous les éléments avec style
            document.querySelectorAll('[style]').forEach(el => {
                let style = el.getAttribute('style');
                const originalStyle = style;
                
                if (isDark) {
                    // Remplacer pour le mode dark
                    style = style
                        // COULEURS TEXTE - BLEU
                        .replace(/color:\s*#0066cc/g, 'color: var(--accent-blue)')
                        .replace(/color:\s*#00bfff/g, 'color: var(--accent-blue)')
                        .replace(/color:\s*#004d99/g, 'color: var(--primary-blue)')
                        .replace(/color:\s*#3b82f6/g, 'color: var(--accent-blue)')
                        .replace(/color:\s*#1d4ed8/g, 'color: var(--accent-blue)')
                        // COULEURS TEXTE - VERT
                        .replace(/color:\s*#15803d/g, 'color: #4ade80')
                        // COULEURS TEXTE - GRIS/NOIR
                        .replace(/color:\s*#000/g, 'color: var(--text-main)')
                        .replace(/color:\s*#1e293b/g, 'color: var(--text-main)')
                        .replace(/color:\s*#1a1a1a/g, 'color: var(--text-main)')
                        .replace(/color:\s*#64748b/g, 'color: var(--text-muted)')
                        .replace(/color:\s*#475569/g, 'color: var(--text-muted)')
                        .replace(/color:\s*#555/g, 'color: var(--text-muted)')
                        .replace(/color:\s*#004d99/g, 'color: var(--text-muted)')
                        // BORDURES - Gris
                        .replace(/border:\s*1px solid\s*#cbd5e1/g, 'border: 1px solid var(--border-color)')
                        .replace(/border:\s*1px solid\s*#ddd/g, 'border: 1px solid var(--border-color)')
                        .replace(/border:\s*1px solid\s*#e2e8f0/g, 'border: 1px solid var(--border-color)')
                        .replace(/border:\s*2px solid\s*#cbd5e1/g, 'border: 2px solid var(--border-color)')
                        .replace(/border-color:\s*#cbd5e1/g, 'border-color: var(--border-color)')
                        .replace(/border-color:\s*#ddd/g, 'border-color: var(--border-color)')
                        .replace(/border-color:\s*#e2e8f0/g, 'border-color: var(--border-color)')
                        // BORDURES - Bleu
                        .replace(/border-left:\s*4px solid\s*#0066cc/g, 'border-left: 4px solid var(--accent-blue)')
                        .replace(/border-left:\s*4px solid\s*#004d99/g, 'border-left: 4px solid var(--primary-blue)')
                        .replace(/border-left:\s*4px solid\s*#00bfff/g, 'border-left: 4px solid var(--accent-blue)')
                        // BORDURES - Orange
                        .replace(/border-left:\s*4px solid\s*#ff9800/g, 'border-left: 4px solid #f97316')
                        // BORDURES - Jaune
                        .replace(/border-left:\s*4px solid\s*#fbc02d/g, 'border-left: 4px solid #ca8a04')
                        // BACKGROUNDS - BLEU CLAIR (table headers)
                        .replace(/background:\s*#dbeafe/g, 'background: #1e3a5f')
                        .replace(/background:\s*#eff6ff/g, 'background: #1a2844')
                        // BACKGROUNDS - VERT CLAIR (table)
                        .replace(/background:\s*#dcfce7/g, 'background: #1a3a1a')
                        // BACKGROUNDS - ROSE CLAIR (table)
                        .replace(/background:\s*#fee7f0/g, 'background: #3a1a2a')
                        // BACKGROUNDS - GRIS CLAIR (génériques)
                        .replace(/background:\s*#f1f5f9/g, 'background: var(--bg-card)')
                        .replace(/background:\s*#f8fafc/g, 'background: var(--bg-card)')
                        .replace(/background:\s*#f5f5f5/g, 'background: var(--bg-card)')
                        .replace(/background:\s*#f3f4f6/g, 'background: var(--bg-card)')
                        .replace(/background:\s*#fafafa/g, 'background: var(--bg-card)')
                        // BACKGROUNDS - BLEU CLAIR (génériques)
                        .replace(/background:\s*#e8f4f8/g, 'background: var(--note-bg)')
                        .replace(/background:\s*#e6f7ff/g, 'background: var(--note-bg)')
                        .replace(/background:\s*#f0f9ff/g, 'background: var(--note-bg)')
                        // BACKGROUNDS - ORANGE CLAIR
                        .replace(/background:\s*#fff3e0/g, 'background: #1a1410')
                        .replace(/background:\s*#fffbf0/g, 'background: #1a1410')
                        // BACKGROUNDS - JAUNE CLAIR (avec gradient)
                        .replace(/background:\s*linear-gradient\(135deg,\s*#fff305\s*0%,\s*#ffeb3b\s*100%\)/g, 'background: linear-gradient(135deg, #4a4410 0%, #5a5420 100%)')
                        .replace(/background:\s*#fff305/g, 'background: #4a4410')
                        .replace(/background:\s*#ffeb3b/g, 'background: #5a5420')
                        // BACKGROUNDS - BLANC
                        .replace(/background:\s*white/g, 'background: var(--bg-card)')
                        .replace(/background:\s*#fff/g, 'background: var(--bg-card)')
                        .replace(/background:\s*#ffffff/g, 'background: var(--bg-card)');
                }
                
                if (style !== originalStyle) {
                    el.setAttribute('style', style);
                }
            });
        }
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-btn').innerText = isDark ? '☀️' : '🌙';
            applyDarkModeStyles();
        }
        // Chargement du thème
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-btn').innerText = '☀️';
        }
        // Appliquer les styles dark mode une fois que le DOM est chargé
        document.addEventListener('DOMContentLoaded', () => {
            if (document.body.classList.contains('dark-mode')) {
                applyDarkModeStyles();
            }
        });
        // Aussi appliquer au chargement complet de la page
        window.addEventListener('load', () => {
            if (document.body.classList.contains('dark-mode')) {
                applyDarkModeStyles();
            }
        });
        // --- DONNÉES & NAVIGATION ---
        function showMenu() {
            document.querySelectorAll('body > div').forEach(d => d.id !== 'theme-btn' && d.classList.add('hidden'));
            document.getElementById('screen-menu').classList.remove('hidden');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
