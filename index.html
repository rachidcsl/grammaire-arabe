<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Falah Academy - Arabe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* --- THÈMES --- */
        :root {
            --bg-main: #ffffff;         /* Blanc Pur */
            --bg-card: #ffffff;
            --text-main: #0f172a;       /* Texte très sombre pour contraste max */
            --text-muted: #64748b;
            --primary-blue: #0284c7;    /* Bleu ciel */
            --border-color: #f1f5f9;    /* Bordure très légère */
            --slot-bg: #f8fafc;         /* Fond de zone de dépôt très clair */
        }

        body.dark-mode {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary-blue: #38bdf8;
            --border-color: #334155;
            --slot-bg: #0f172a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            transition: background 0.3s ease;
            overflow: hidden; /* Empêche le rebond élastique sur mobile */
        }

        .arabic { font-family: 'Lateef', serif; direction: rtl; font-size: 2.8rem; line-height: 1.1; }

        /* --- ZONES DE JEU --- */
        .drop-zone { 
            border: 2px dashed var(--border-color); 
            border-radius: 1.25rem; min-height: 5.5rem; 
            display: flex; align-items: center; justify-content: center; 
            background: var(--slot-bg); 
            transition: all 0.2s;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .drop-zone.active-target { border-color: var(--primary-blue); background: white; transform: scale(1.02); }
        
        .slot-filled { 
            border: 2px solid var(--primary-blue); 
            background: var(--bg-card); 
            font-family: 'Lateef'; font-size: 2.2rem; font-weight: bold; color: var(--primary-blue);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .slot-correct { border-color: #22c55e !important; background: #f0fdf4 !important; color: #166534 !important; }
        .slot-wrong { border-color: #ef4444 !important; background: #fef2f2 !important; color: #991b1b !important; }

        .draggable-label { 
            background: var(--bg-card); 
            border: 2px solid var(--border-color); 
            padding: 12px 24px; border-radius: 1rem; 
            cursor: grab; font-family: 'Lateef'; font-size: 1.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            touch-action: none;
            user-select: none;
        }

        .drag-ghost {
            position: fixed; pointer-events: none; z-index: 9999;
            background: var(--bg-card); border: 3px solid var(--primary-blue); 
            color: var(--primary-blue); border-radius: 1.2rem;
            padding: 12px 24px; font-family: 'Lateef'; font-size: 2.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transform: translate(-50%, -130%);
        }

        /* --- ACCORDÉON --- */
        .course-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        .course-section.active { max-height: 10000px; opacity: 1; margin-top: 1rem; }
        
        #settings-drawer { 
            position: fixed; top: 0; left: -100%; width: 300px; height: 100%; 
            background: var(--bg-card); z-index: 1000; transition: 0.4s; padding: 2rem; 
            box-shadow: 10px 0 50px rgba(0,0,0,0.1);
        }
        #settings-drawer.open { left: 0; }
        #drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: none; z-index: 900; backdrop-filter: blur(2px); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="dark-mode"> <div id="drawer-overlay" onclick="UI.toggleDrawer()"></div>
    
    <aside id="settings-drawer" class="dark:bg-slate-900">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-black uppercase italic tracking-tighter">Réglages</h2>
            <button onclick="UI.toggleDrawer()" class="text-3xl opacity-20">✕</button>
        </div>
        <div id="drawer-profile-info" class="mb-10 p-5 bg-blue-50 dark:bg-slate-800 rounded-3xl flex items-center gap-4 border border-blue-100 dark:border-slate-700"></div>
        <div class="space-y-8">
            <div class="flex items-center justify-between">
                <span class="font-bold text-sm">Mode Jour / Nuit</span>
                <button onclick="UI.toggleDark()" id="dark-mode-btn" class="p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">☀️</button>
            </div>
            <div class="flex items-center justify-between opacity-50">
                <span class="font-bold text-sm">Sons et Audio</span>
                <div class="w-10 h-5 bg-blue-500 rounded-full"></div>
            </div>
        </div>
        <button onclick="Profiles.reset()" class="w-full mt-24 py-4 text-slate-400 font-bold text-[10px] uppercase border border-slate-100 dark:border-slate-700 rounded-2xl">Changer de profil</button>
    </aside>

    <section id="screen-profiles" class="fixed inset-0 bg-white dark:bg-slate-950 z-[500] flex flex-col items-center justify-center p-8">
        <div class="w-16 h-16 bg-blue-900 rounded-2xl flex items-center justify-center shadow-2xl mb-8 rotate-3">
            <span class="text-white font-black text-3xl">ف</span>
        </div>
        <h2 class="text-3xl font-black mb-10 text-center dark:text-white uppercase tracking-tighter">Falah Academy</h2>
        <div id="profiles-list" class="grid grid-cols-2 gap-4 w-full max-w-sm mb-10"></div>
        <div class="flex flex-col gap-3 w-full max-w-sm">
            <button onclick="Profiles.add()" class="py-5 bg-blue-900 text-white rounded-3xl font-black uppercase text-[11px] tracking-widest shadow-xl active:scale-95 transition-transform">Créer un profil</button>
            <button onclick="Profiles.skip()" class="py-3 text-slate-400 font-bold uppercase text-[9px] tracking-widest text-center">Mode Invité</button>
        </div>
    </section>

    <main id="screen-menu" class="hidden min-h-screen p-4 max-w-5xl mx-auto overflow-y-auto">
        <header class="flex justify-between items-center py-8 mb-4">
            <button onclick="UI.toggleDrawer()" class="p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-50 dark:border-slate-800 text-xl">☰</button>
            <div class="text-center">
                <h1 id="user-welcome" class="text-xl font-black dark:text-white uppercase italic"></h1>
                <div id="points-val" class="text-[9px] font-bold text-blue-500 uppercase mt-1 tracking-widest">💎 0 Points</div>
            </div>
            <div class="w-10"></div>
        </header>
        <div id="module-container" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 mt-4"></div>
    </main>

    <section id="screen-course" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-40 flex flex-col overflow-y-auto">
        <nav class="p-4 border-b flex justify-between items-center sticky top-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md z-50">
            <button onclick="UI.show('screen-menu')" class="font-black text-blue-900 dark:text-sky-400 text-xs uppercase">← Menu</button>
            <h2 id="course-title" class="text-[10px] font-black uppercase text-slate-400"></h2>
            <button id="btn-course-action" class="bg-blue-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase">Défi</button>
        </nav>
        <div class="p-6 md:p-12 max-w-4xl mx-auto w-full pb-32" id="course-body"></div>
    </section>

    <section id="screen-game" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-50 flex flex-col overflow-hidden">
        <nav class="p-4 border-b dark:border-slate-800 flex justify-between items-center bg-white dark:bg-slate-900">
            <button onclick="UI.show('screen-menu')" class="font-bold text-blue-900 dark:text-sky-400 text-sm">Quitter</button>
            <div id="game-progress-dots" class="flex gap-1.5"></div>
            <div class="w-10"></div>
        </nav>
        <div class="flex-1 p-4 flex flex-col items-center overflow-y-auto">
            <div id="game-translation" class="w-full max-w-md p-8 bg-blue-50 dark:bg-slate-800/50 rounded-[3rem] text-center italic text-blue-900 dark:text-blue-100 mb-10 border border-blue-100 dark:border-slate-700"></div>
            <div id="game-phrase" class="w-full max-w-md flex flex-col gap-6 mb-12"></div>
            <div id="game-options" class="w-full max-w-md flex flex-wrap justify-center gap-3 mt-auto pb-12"></div>
        </div>
        <footer class="p-6 bg-white dark:bg-slate-900 border-t dark:border-slate-800 shadow-xl">
            <div id="game-feedback" class="hidden mb-4 p-5 rounded-[2rem] text-white font-black text-center shadow-lg transition-all"></div>
            <button id="btn-check" onclick="Game.handleAction()" class="w-full py-6 bg-blue-900 dark:bg-sky-500 text-white dark:text-slate-900 rounded-[2.5rem] font-black uppercase tracking-[0.3em] shadow-xl disabled:opacity-20 active:scale-95">VÉRIFIER</button>
        </footer>
    </section>

    <section id="screen-result" class="hidden fixed inset-0 bg-slate-950 z-[200] flex flex-col items-center justify-center p-8 text-white text-center">
        <div class="text-8xl mb-8 animate-bounce">🏆</div>
        <h2 class="text-3xl font-black mb-10 uppercase tracking-tighter italic">Félicitations !</h2>
        <div class="bg-white/10 px-12 py-16 rounded-[4rem] border border-white/20 mb-12 w-full max-w-xs shadow-2xl">
            <div class="text-7xl font-black italic" id="result-score-val">0</div>
            <p class="text-[10px] uppercase font-bold opacity-40 mt-3 tracking-widest">Points récoltés</p>
        </div>
        <button onclick="UI.show('screen-menu')" class="w-full max-w-xs py-6 bg-sky-500 text-slate-900 rounded-full font-black uppercase tracking-widest shadow-xl">Retour au Menu</button>
    </section>

    <script>
        const DATA = {
            modules: {
                'm1': { 
                    id: 'm1', title: "Le Nom (Ism)", summary: "Fondations : les 3 types de mots et les 4 propriétés du Ism.",
                    course: `
                        <h2 class="font-black text-lg mb-4" onclick="UI.toggleAccordion(this)">I. Les 3 types de mots ▸</h2>
                        <div class="course-section space-y-4">
                            <div class="p-5 bg-blue-50 dark:bg-slate-800 rounded-3xl border-l-8 border-blue-400"><b>1. اسم (Ism) :</b> Un mot intemporel (personne, objet...).</div>
                            <div class="p-5 bg-green-50 dark:bg-slate-800 rounded-3xl border-l-8 border-green-400"><b>2. فِعْل (Fi’l) :</b> Action liée au temps.</div>
                            <div class="p-5 bg-red-50 dark:bg-slate-800 rounded-3xl border-l-8 border-red-400"><b>3. حَرْف (Harf) :</b> Particule (dans, vers...).</div>
                        </div>`,
                    exercises: [ 
                        { phrase: ["رَبٌّ"], correct: ["رَفْعٌ"], opts: ["رَفْعٌ", "نَصْبٌ", "جَرٌّ"], translation: "Un Seigneur", rule: "La damma finale indique l'état Raf'." },
                        { phrase: ["عَذَابٍ"], correct: ["جَرٌّ"], opts: ["رَفْعٌ", "جَرٌّ"], translation: "Un châtiment", rule: "La kasra finale indique l'état Jarr." }
                    ]
                }
            }
        };

        const Profiles = {
            current: null,
            getAll() { return JSON.parse(localStorage.getItem('falah_profiles') || '[]'); },
            init() {
                const profiles = this.getAll();
                const lastId = localStorage.getItem('falah_last_profile');
                if (lastId && (lastId === 'guest' || profiles.find(p => p.id === lastId))) this.select(lastId);
                else { this.renderList(); UI.show('screen-profiles'); }
            },
            add() {
                const name = prompt("Prénom de l'élève :");
                if (!name || name.trim() === "") return;
                const profiles = this.getAll();
                const newP = { id: 'p' + Date.now(), name: name.trim(), emoji: '👤' };
                profiles.push(newP);
                localStorage.setItem('falah_profiles', JSON.stringify(profiles));
                this.renderList();
            },
            skip() { this.select('guest'); },
            select(id) {
                if (id === 'guest') this.current = { id: 'guest', name: 'Invité', emoji: '🔓' };
                else this.current = this.getAll().find(p => p.id === id);
                localStorage.setItem('falah_last_profile', id);
                UI.show('screen-menu');
            },
            renderList() {
                const profiles = this.getAll();
                document.getElementById('profiles-list').innerHTML = profiles.map(p => `
                    <div onclick="Profiles.select('${p.id}')" class="bg-white dark:bg-slate-900 p-5 rounded-3xl shadow-lg text-center relative active:scale-95 transition-transform">
                        <div class="text-3xl mb-2">${p.emoji}</div>
                        <p class="font-black text-[10px] truncate uppercase dark:text-white">${p.name}</p>
                    </div>`).join('');
            },
            reset() { localStorage.removeItem('falah_last_profile'); location.reload(); },
            getData() { return JSON.parse(localStorage.getItem(`data_${this.current.id}`) || '{"points":0}'); },
            saveData(d) { localStorage.setItem(`data_${this.current.id}`, JSON.stringify(d)); }
        };

        const UI = {
            show(id) {
                document.querySelectorAll('section, main').forEach(s => s.classList.add('hidden'));
                const target = document.getElementById(id);
                if (target) target.classList.remove('hidden');
                if (id === 'screen-menu') this.renderModules();
                window.scrollTo(0,0);
            },
            toggleDrawer() {
                const d = document.getElementById('settings-drawer');
                const v = d.classList.toggle('open');
                document.getElementById('drawer-overlay').style.display = v ? 'block' : 'none';
                if(v) {
                    document.getElementById('drawer-profile-info').innerHTML = `<div class="text-2xl">${Profiles.current.emoji}</div> <div><p class="font-black text-sm">${Profiles.current.name}</p><p class="text-[8px] uppercase font-bold text-blue-500">Apprenti Falah</p></div>`;
                    document.getElementById('dark-mode-btn').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
                }
            },
            toggleDark() {
                const isDark = document.body.classList.toggle('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.getElementById('dark-mode-btn').innerText = isDark ? '☀️' : '🌙';
            },
            renderModules() {
                if(!Profiles.current) return;
                const d = Profiles.getData();
                document.getElementById('user-welcome').innerText = `Salam, ${Profiles.current.name}`;
                document.getElementById('points-val').innerText = `💎 ${d.points} Points`;
                document.getElementById('module-container').innerHTML = Object.entries(DATA.modules).map(([id, m]) => `
                    <div class="bg-white dark:bg-slate-800 p-8 rounded-[3rem] shadow-sm flex flex-col border border-slate-50 dark:border-slate-700">
                        <h3 class="font-black text-lg mb-6 dark:text-white leading-tight">${m.title}</h3>
                        <div class="flex gap-3 mt-auto">
                            <button onclick="UI.showCourse('${id}')" class="flex-1 py-4 bg-slate-50 dark:bg-slate-700 rounded-2xl font-bold text-[10px] uppercase">Cours</button>
                            <button onclick="Game.start('${id}')" class="flex-1 py-4 bg-blue-900 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg">Défi</button>
                        </div>
                    </div>`).join('');
            },
            showCourse(id) {
                const m = DATA.modules[id];
                document.getElementById('course-title').innerText = m.title;
                document.getElementById('course-body').innerHTML = m.course;
                document.getElementById('btn-course-action').onclick = () => Game.start(id);
                this.show('screen-course');
            },
            toggleAccordion(el) { el.nextElementSibling.classList.toggle('active'); }
        };

        const Game = {
            modId: null, exercises: [], currentIdx: 0, userAnswers: [], score: 0, state: 'playing',
            draggedVal: null, ghost: null,
            start(id) {
                this.modId = id; this.exercises = DATA.modules[id].exercises;
                this.currentIdx = 0; this.score = 0; this.loadExercise();
                UI.show('screen-game');
            },
            loadExercise() {
                const ex = this.exercises[this.currentIdx];
                this.userAnswers = new Array(ex.phrase.length).fill(null);
                this.state = 'playing';
                document.getElementById('game-progress-dots').innerHTML = this.exercises.map((_, i) => `<div class="w-2 h-2 rounded-full ${i <= this.currentIdx ? 'bg-blue-900 dark:bg-sky-400' : 'bg-slate-200 dark:bg-slate-700'}"></div>`).join('');
                document.getElementById('game-translation').innerText = ex.translation;
                document.getElementById('game-phrase').innerHTML = ex.phrase.map((w, i) => `
                    <div class="flex items-center gap-3 w-full">
                        <div class="arabic flex-1 bg-white dark:bg-slate-800 p-4 rounded-3xl border shadow-sm text-center">${w}</div>
                        <div id="slot-${i}" class="drop-zone flex-1">Placer</div>
                    </div>`).join('');
                const optCont = document.getElementById('game-options');
                optCont.innerHTML = '';
                ex.opts.forEach(o => {
                    const btn = document.createElement('div');
                    btn.className = "draggable-label dark:bg-slate-800 dark:border-slate-700 dark:text-white";
                    btn.innerText = o;
                    btn.onmousedown = (e) => this.startDrag(e, o);
                    btn.ontouchstart = (e) => this.startDrag(e, o);
                    optCont.appendChild(btn);
                });
                document.getElementById('game-feedback').classList.add('hidden');
                document.getElementById('btn-check').innerText = "VÉRIFIER";
                document.getElementById('btn-check').disabled = true;
            },
            startDrag(e, val) {
                if (this.state !== 'playing') return;
                this.draggedVal = val;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                this.ghost = document.createElement('div');
                this.ghost.className = 'drag-ghost';
                this.ghost.innerText = val;
                document.body.appendChild(this.ghost);
                this.moveGhost(clientX, clientY);
                const onMove = (ev) => {
                    const x = ev.touches ? ev.touches[0].clientX : ev.clientX;
                    const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
                    this.moveGhost(x, y);
                    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active-target'));
                    const target = document.elementFromPoint(x, y);
                    if (target && target.classList.contains('drop-zone')) target.classList.add('active-target');
                };
                const onEnd = (ev) => {
                    const x = ev.changedTouches ? ev.changedTouches[0].clientX : ev.clientX;
                    const y = ev.changedTouches ? ev.changedTouches[0].clientY : ev.clientY;
                    const target = document.elementFromPoint(x, y);
                    if (target && target.classList.contains('drop-zone')) {
                        const idx = parseInt(target.id.split('-')[1]);
                        this.userAnswers[idx] = this.draggedVal;
                        target.innerText = this.draggedVal;
                        target.className = "drop-zone flex-1 slot-filled";
                        document.getElementById('btn-check').disabled = this.userAnswers.includes(null);
                    }
                    this.ghost.remove();
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onEnd);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onEnd);
                };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchmove', onMove, { passive: false });
                window.addEventListener('touchend', onEnd);
            },
            moveGhost(x, y) { if (this.ghost) { this.ghost.style.left = x + 'px'; this.ghost.style.top = y + 'px'; } },
            handleAction() {
                if(this.state === 'playing') {
                    const win = this.userAnswers.every((a, i) => a === this.exercises[this.currentIdx].correct[i]);
                    this.state = 'checked';
                    const fb = document.getElementById('game-feedback');
                    fb.innerText = win ? "✨ EXCELLENT !" : "❌ RÉESSAYE !";
                    fb.className = `mb-4 p-5 rounded-3xl font-black block shadow-lg ${win?'bg-green-600':'bg-red-600'}`;
                    fb.classList.remove('hidden');
                    this.userAnswers.forEach((a, i) => document.getElementById(`slot-${i}`).classList.add(a === this.exercises[this.currentIdx].correct[i] ? 'slot-correct' : 'slot-wrong'));
                    if(win) { this.score++; confetti({ particleCount: 30, origin:{y:0.8}}); }
                    document.getElementById('btn-check').innerText = "CONTINUER";
                } else {
                    if(++this.currentIdx < this.exercises.length) this.loadExercise(); 
                    else this.finish();
                }
            },
            finish() {
                const d = Profiles.getData(); d.points += (this.score * 10); Profiles.saveData(d);
                document.getElementById('result-score-val').innerText = `+${this.score * 10}`;
                UI.show('screen-result');
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') !== 'light') document.body.classList.add('dark-mode');
            Profiles.init();
        });
    </script>
</body>
</html>
