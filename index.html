<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Grammaire Arabe - Falah Academy Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* --- VARIABLES DE THÈME --- */
        :root {
            --bg-main: #ffffff; --bg-card: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
            --primary-blue: #004d99; --accent-blue: #0066cc; --border-color: #e2e8f0;
            --note-bg: #e6f7ff; --table-header: #004d99; --slot-bg: #f8fafc;
        }

        body.dark-mode {
            --bg-main: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9; --text-muted: #94a3b8;
            --primary-blue: #38bdf8; --accent-blue: #7dd3fc; --border-color: #334155;
            --note-bg: #1e293b; --table-header: #075985; --slot-bg: #0f172a;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: all 0.3s ease; overflow-x: hidden; touch-action: none; }
        .hidden { display: none !important; }

        /* --- VISUEL & TITRES --- */
        .arabic { font-family: 'Lateef', serif; direction: rtl; font-size: 2.8rem; font-weight: 700; color: var(--text-main); }
        .arabic-table { font-family: 'Lateef', serif; font-size: 2rem; font-weight: 700; line-height: 1; }
        h1 { color: var(--primary-blue); font-weight: 900; }
        #course-body h2 { font-size: 1.7rem; color: var(--accent-blue); border-left: 8px solid var(--accent-blue); padding: 15px; margin-top: 3rem; background: var(--bg-card); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); cursor: pointer; }

        /* --- DRAG & DROP GHOST CENTRÉ --- */
        .drop-zone { border: 2px dashed var(--text-muted); border-radius: 15px; height: 5.5rem; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; background: var(--bg-card); transition: all 0.2s; text-transform: uppercase; color: var(--text-muted); }
        .drop-zone.active-target { border-color: var(--accent-blue); background-color: var(--note-bg); transform: scale(1.02); border-style: solid; }
        .slot-filled { border: 3px solid var(--primary-blue); background: var(--note-bg); color: var(--primary-blue); font-family: 'Lateef'; font-size: 2.2rem; font-weight: 700; border-radius: 15px; }
        .slot-correct { border: 4px solid #22c55e !important; background: #f0fdf4 !important; color: #166534 !important; }
        .slot-wrong { border: 4px solid #ef4444 !important; background: #fef2f2 !important; color: #991b1b !important; }

        .draggable-label { font-family: 'Lateef', serif; font-size: 2rem; font-weight: 700; background: var(--bg-card); border: 2px solid var(--primary-blue); border-radius: 20px; padding: 12px 20px; cursor: grab; user-select: none; display: inline-flex; align-items: center; justify-content: center; min-height: 4.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); color: var(--text-main); }
        .drag-ghost { position: fixed; pointer-events: none; z-index: 9999; opacity: 0.95; transform: translate(-50%, -50%); background: var(--bg-card); border: 3px solid var(--primary-blue); border-radius: 20px; padding: 10px 24px; font-family: 'Lateef'; font-size: 2.2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3); color: var(--text-main); }

        /* --- RECHERCHE --- */
        mark.search-highlight { background: #fef08a; color: #854d0e; padding: 0 2px; border-radius: 4px; font-weight: bold; }
        .tag-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 99px; background: var(--note-bg); border: 1px solid var(--border-color); color: var(--text-muted); text-transform: uppercase; font-weight: 700; }

        /* --- TABLEAUX --- */
        .table-container { width: 100%; overflow-x: auto; margin: 25px 0; border: 1px solid var(--primary-blue); border-radius: 12px; background: var(--bg-card); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { color: white; background: var(--table-header); padding: 15px 10px; border: 1px solid var(--border-color); font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 10px; border: 1px solid var(--border-color); text-align: center; font-size: 0.95rem; color: var(--text-main); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="dark-mode">

    <div id="update-toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[2000] w-[90%] max-w-sm bg-blue-900 text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between animate-bounce">
        <div class="text-xs font-bold">Mise à jour prête !</div>
        <button onclick="window.location.reload()" class="bg-white text-blue-900 px-3 py-1 rounded-lg text-[10px] font-black uppercase">Appliquer</button>
    </div>

    <main id="screen-menu" class="min-h-screen p-4 max-w-5xl mx-auto overflow-y-auto pb-24">
        <header class="flex justify-between items-center py-6 mb-4 gap-4 border-b-4 border-blue-900/10">
            <button onclick="UI.toggleDark()" id="theme-btn" class="p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm text-xl border">🌙</button>
            
            <svg width="50" height="60" viewBox="0 0 437 275" fill="none" class="shrink-0">
                <path d="M131 0C120 1 113 15 115 25C117 35 125 40 135 40C145 40 152 32 153 23C150 30 142 32 133 28C123 22 126 6 131 0Z" fill="#B7A12E" />
                <path d="M129.5 48 Q 105 78, 73 97 V189 H189 V97 Q 155 78, 129.5 48 Z" fill="#1F9E75" />
                <text x="5" y="242" font-family="Arial Black" font-size="50" font-weight="900" fill="#B7A12E" textLength="427">FALAH-E-DARAINE</text>
            </svg>

            <div class="text-center flex-1">
                <h1 class="text-lg font-black dark:text-white uppercase italic leading-none border-none">Falah Academy</h1>
                <div id="points-val" class="text-[9px] font-bold text-blue-500 uppercase mt-2 tracking-widest underline">💎 0 Points récoltés</div>
            </div>
            
            <button onclick="UI.show('screen-search')" class="p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm text-xl border">🔍</button>
        </header>
        <div id="module-container" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 mt-4"></div>
    </main>

    <section id="screen-search" class="hidden fixed inset-0 bg-white dark:bg-slate-950 z-[200] flex flex-col p-6 overflow-y-auto">
        <header class="flex items-center gap-4 mb-8">
            <button onclick="UI.show('screen-menu')" class="text-2xl font-bold">←</button>
            <input type="text" id="search-input" oninput="Search.query(this.value)" placeholder="Arabe, français, tag..." class="flex-1 p-5 rounded-3xl bg-slate-50 dark:bg-slate-800 outline-none border">
        </header>
        <div id="search-results" class="flex flex-col gap-4 pb-20"></div>
    </section>

    <section id="screen-course" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-40 flex flex-col overflow-y-auto">
        <nav class="p-4 border-b flex justify-between items-center sticky top-0 bg-white/95 dark:bg-slate-900/95 z-50">
            <button onclick="UI.show('screen-menu')" class="font-black text-blue-900 dark:text-sky-400 text-xs uppercase">← Menu</button>
            <h2 id="course-title-header" class="text-[10px] font-black uppercase text-slate-400"></h2>
            <button id="btn-course-action" class="bg-blue-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase shadow-lg">Défi</button>
        </nav>
        <div class="p-6 md:p-12 max-w-6xl mx-auto w-full pb-32">
            <h1 id="course-title-main" class="text-3xl font-black mb-10 pb-4 border-b-8 border-blue-50 dark:border-slate-800 text-center uppercase tracking-tighter"></h1>
            <div id="course-body"></div>
        </div>
    </section>

    <section id="screen-game" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-50 flex flex-col overflow-hidden">
        <nav class="p-4 border-b dark:border-slate-800 flex justify-between items-center bg-white dark:bg-slate-900">
            <button onclick="UI.show('screen-menu')" class="font-bold text-blue-900 dark:text-sky-400 text-sm uppercase">Quitter</button>
            <div id="game-progress-dots" class="flex gap-1.5"></div>
            <button onclick="SmartTutor.toggle()" class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-xl shadow-lg">🤖</button>
        </nav>
        
        <div class="flex-1 p-4 flex flex-col items-center overflow-y-auto">
            <div id="ai-chat" class="hidden w-full max-w-md p-4 mb-4 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl border border-indigo-100 text-xs italic leading-relaxed"></div>
            <div id="game-translation" class="w-full max-w-md p-8 bg-blue-50 dark:bg-slate-800/50 rounded-[3rem] text-center italic text-blue-900 dark:text-blue-100 mb-8 border shadow-inner"></div>
            <div id="game-phrase" class="w-full max-w-md flex flex-col gap-6 mb-12"></div>
            <div id="game-options" class="w-full max-w-md flex flex-wrap justify-center gap-3 mt-auto pb-24"></div>
        </div>

        <footer class="p-6 bg-white dark:bg-slate-900 border-t shadow-xl">
            <div id="game-feedback" class="hidden mb-4 p-5 rounded-[2rem] text-white font-black text-center shadow-lg transition-all"></div>
            <button id="btn-check" onclick="Game.handleAction()" class="w-full py-6 bg-blue-900 text-white rounded-[2.5rem] font-black uppercase tracking-widest shadow-xl disabled:opacity-20 active:scale-95 transition-transform">VÉRIFIER</button>
        </footer>
    </section>

    <section id="screen-result" class="hidden fixed inset-0 bg-slate-950 z-[200] flex flex-col items-center justify-center p-8 text-white text-center">
        <div class="text-8xl mb-8 animate-bounce">🏆</div>
        <h2 class="text-3xl font-black mb-10 uppercase italic">Félicitations !</h2>
        <div class="bg-blue-900 p-16 rounded-[4rem] mb-12 w-full max-w-xs shadow-2xl">
            <div class="text-7xl font-black italic" id="result-score-val">0</div>
            <p class="text-[10px] font-bold opacity-50 mt-3 uppercase tracking-widest">Points récoltés</p>
        </div>
        <button onclick="UI.show('screen-menu')" class="w-full max-w-xs py-6 bg-sky-500 text-slate-900 rounded-full font-black uppercase tracking-widest shadow-xl">Continuer</button>
    </section>

    <script>
        /** 1. DONNÉES (DATA) **/
        const DATA = {
            modules: {
                'm1': { 
                    id: 'm1', title: "Le Nom (Ism)", summary: "Fondations : les 3 types de mots et les 4 propriétés du Ism.",
                    tags: ["ism", "nom", "grammaire", "propriété"],
                    course: `
                        <h2 onclick="this.nextElementSibling.classList.toggle('active')">I. Les 3 types de mots ▸</h2>
                        <div class="course-section active space-y-4">
                            <div class="note-box"><b>1. اسم (Ism) :</b> Un mot intemporel (personne, objet, adjectif).</div>
                            <div class="note-box" style="border-left-color:#22c55e"><b>2. فعل (Fi'l) :</b> Une action liée au temps.</div>
                            <div class="note-box" style="border-left-color:#ef4444"><b>3. حرف (Harf) :</b> Une particule.</div>
                        </div>
                        <h2 onclick="this.nextElementSibling.classList.toggle('active')">II. Les 4 propriétés ▸</h2>
                        <div class="course-section">
                            <p>État (I'rab), Genre, Nombre, Type.</p>
                        </div>`,
                    exercises: [
                        { phrase: ["رَبٌّ"], correct: ["رَفْعٌ"], opts: ["رَفْعٌ", "نَصْبٌ", "جَرٌّ"], translation: "Un Seigneur", translit: "Rabbun", tags: ["sujet", "damma"], rule: "La damma finale indique l'état Raf'." }
                    ]
                }
            }
        };

        const AppState = {
            points: parseInt(localStorage.getItem('falah_points') || '0'),
            savePoints(p) { this.points += p; localStorage.setItem('falah_points', this.points); }
        };

        /** 2. MOTEUR UI **/
        const UI = {
            show(id) {
                const screens = ['screen-menu', 'screen-search', 'screen-course', 'screen-game', 'screen-result'];
                screens.forEach(s => {
                    const el = document.getElementById(s);
                    if(el) { el.classList.add('hidden'); el.style.display = 'none'; }
                });

                const target = document.getElementById(id);
                if (target) {
                    target.classList.remove('hidden');
                    target.style.display = (id === 'screen-menu') ? 'block' : 'flex';
                    if (id === 'screen-menu') {
                        document.getElementById('points-val').innerText = `💎 ${AppState.points} Points récoltés`;
                        this.renderModules();
                    }
                }
                window.scrollTo(0,0);
                applyDarkModeStyles();
            },
            toggleDark() {
                const isDark = document.body.classList.toggle('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.getElementById('theme-btn').innerText = isDark ? '☀️' : '🌙';
                applyDarkModeStyles();
            },
            renderModules() {
                document.getElementById('module-container').innerHTML = Object.entries(DATA.modules).map(([id, m]) => `
                    <div class="bg-white dark:bg-slate-800 p-8 rounded-[3rem] shadow-sm flex flex-col border border-slate-50 dark:border-slate-700">
                        <h3 class="font-black text-lg mb-6 dark:text-white leading-tight uppercase tracking-tighter">${m.title}</h3>
                        <div class="flex gap-3 mt-auto">
                            <button onclick="UI.showCourse('${id}')" class="flex-1 py-4 bg-slate-50 dark:bg-slate-700 rounded-2xl font-bold text-[10px] uppercase dark:text-white">Cours</button>
                            <button onclick="Game.start('${id}')" class="flex-1 py-4 bg-blue-900 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg">Défi</button>
                        </div>
                    </div>`).join('');
            },
            showCourse(id, q = null) {
                const m = DATA.modules[id];
                document.getElementById('course-title-header').innerText = m.title;
                document.getElementById('course-title-main').innerText = m.title;
                let c = m.course; if(q) c = Search.highlight(c, q);
                document.getElementById('course-body').innerHTML = c;
                document.getElementById('btn-course-action').onclick = () => Game.start(id);
                this.show('screen-course');
            }
        };

        /** 3. JEU (DRAG NATUREL) **/
        const Game = {
            modId: null, exercises: [], currentIdx: 0, userAnswers: [], score: 0, state: 'playing',
            draggedVal: null, ghost: null,
            start(id) { this.modId = id; this.exercises = DATA.modules[id].exercises; this.currentIdx = 0; this.score = 0; this.loadExercise(); UI.show('screen-game'); },
            loadExercise() {
                const ex = this.exercises[this.currentIdx];
                this.userAnswers = new Array(ex.phrase.length).fill(null);
                this.state = 'playing';
                document.getElementById('game-progress-dots').innerHTML = this.exercises.map((_, i) => `<div class="w-2 h-2 rounded-full ${i <= this.currentIdx ? 'bg-blue-900 dark:bg-sky-400' : 'bg-slate-200 dark:bg-slate-700'}"></div>`).join('');
                document.getElementById('game-translation').innerText = ex.translation;
                document.getElementById('game-phrase').innerHTML = ex.phrase.map((w, i) => `
                    <div class="flex items-center gap-3 w-full">
                        <div class="arabic flex-1 bg-white dark:bg-slate-800 p-4 rounded-3xl border shadow-sm text-center">${w}</div>
                        <div id="slot-${i}" class="drop-zone flex-1">Placer</div>
                    </div>`).join('');
                const optCont = document.getElementById('game-options'); optCont.innerHTML = '';
                ex.opts.forEach(o => {
                    const btn = document.createElement('div'); btn.className = "draggable-label dark:bg-slate-800 dark:border-slate-700 dark:text-white"; btn.innerText = o;
                    btn.onmousedown = (e) => this.startDrag(e, o); btn.ontouchstart = (e) => this.startDrag(e, o);
                    optCont.appendChild(btn);
                });
                document.getElementById('game-feedback').classList.add('hidden');
                document.getElementById('btn-check').innerText = "VÉRIFIER"; document.getElementById('btn-check').disabled = true;
            },
            startDrag(e, val) {
                if (this.state !== 'playing') return;
                this.draggedVal = val;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                this.ghost = document.createElement('div'); this.ghost.className = 'drag-ghost'; this.ghost.innerText = val;
                document.body.appendChild(this.ghost); this.moveGhost(clientX, clientY);
                const onMove = (ev) => {
                    const x = ev.touches ? ev.touches[0].clientX : ev.clientX;
                    const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
                    this.moveGhost(x, y);
                    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active-target'));
                    const target = document.elementFromPoint(x, y);
                    if (target && target.classList.contains('drop-zone')) target.classList.add('active-target');
                };
                const onEnd = (ev) => {
                    const x = ev.changedTouches ? ev.changedTouches[0].clientX : ev.clientX;
                    const y = ev.changedTouches ? ev.changedTouches[0].clientY : ev.clientY;
                    const target = document.elementFromPoint(x, y);
                    if (target && target.classList.contains('drop-zone')) {
                        const idx = parseInt(target.id.split('-')[1]);
                        this.userAnswers[idx] = this.draggedVal;
                        target.innerText = this.draggedVal; target.className = "drop-zone flex-1 slot-filled";
                        document.getElementById('btn-check').disabled = this.userAnswers.includes(null);
                    }
                    if(this.ghost) this.ghost.remove();
                    window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onEnd);
                    window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onEnd);
                };
                window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onEnd);
            },
            moveGhost(x, y) { if (this.ghost) { this.ghost.style.left = x + 'px'; this.ghost.style.top = y + 'px'; } },
            handleAction() {
                if(this.state === 'playing') {
                    const win = this.userAnswers.every((a, i) => a === this.exercises[this.currentIdx].correct[i]);
                    this.state = 'checked';
                    const fb = document.getElementById('game-feedback'); fb.classList.remove('hidden');
                    fb.innerText = win ? "✨ EXCELLENT !" : "❌ RÉESSAYE !";
                    fb.className = `mb-4 p-5 rounded-3xl font-black block shadow-lg ${win?'bg-green-600':'bg-red-600'}`;
                    this.userAnswers.forEach((a, i) => document.getElementById(`slot-${i}`).classList.add(a === this.exercises[this.currentIdx].correct[i] ? 'slot-correct' : 'slot-wrong'));
                    if(win) { this.score++; confetti({ particleCount: 30, origin:{y:0.8}}); }
                    document.getElementById('btn-check').innerText = "CONTINUER";
                } else {
                    if(++this.currentIdx < this.exercises.length) this.loadExercise(); 
                    else { AppState.savePoints(this.score * 10); UI.show('screen-result'); document.getElementById('result-score-val').innerText = `+${this.score * 10}`; }
                }
            }
        };

        /** 4. RECHERCHE & IA **/
        const Search = {
            query(q) {
                const res = document.getElementById('search-results');
                if (!q || q.length < 2) { res.innerHTML = ''; return; }
                const val = q.toLowerCase().trim();
                let matches = [];
                Object.values(DATA.modules).forEach(m => {
                    const inArabic = m.exercises.some(ex => ex.phrase.some(w => w.includes(val)));
                    const inTranslit = m.exercises.some(ex => ex.translit && ex.translit.toLowerCase().includes(val));
                    const inTags = m.tags.some(t => t.includes(val)) || m.exercises.some(ex => ex.tags && ex.tags.some(t => t.includes(val)));
                    
                    if (m.title.toLowerCase().includes(val) || inArabic || inTranslit || inTags)
                        matches.push({ type: 'Module', title: m.title, id: m.id, tags: m.tags });
                });
                res.innerHTML = matches.map(m => `<div onclick="UI.showCourse('${m.id}', '${val}')" class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-lg border-l-8 border-blue-500 cursor-pointer font-bold dark:text-white"><div class="flex gap-2 mb-2">${m.tags.map(t => `<span class="tag-badge">${t}</span>`).join('')}</div><p>${this.highlight(m.title, val)}</p></div>`).join('');
            },
            highlight(text, q) { const regex = new RegExp(`(${q})`, 'gi'); return text.replace(regex, '<mark class="search-highlight">$1</mark>'); }
        };

        const SmartTutor = { toggle() { document.getElementById('ai-chat').classList.toggle('hidden'); document.getElementById('ai-chat').innerText = "🤖 Astuce : Regarde la voyelle finale. Damma = Raf', Fatha = Nasb, Kasra = Jarr !"; } };

        /** 5. DARK MODE (VOTRE LOGIQUE HEXA) **/
        function applyDarkModeStyles() {
            const isDark = document.body.classList.contains('dark-mode');
            document.querySelectorAll('[style]').forEach(el => {
                let s = el.getAttribute('style');
                if (isDark && s) s = s.replace(/#0066cc/g, 'var(--accent-blue)').replace(/#004d99/g, 'var(--primary-blue)').replace(/#f5f5f5/g, 'var(--bg-card)').replace(/#e6f7ff/g, 'var(--note-bg)');
                if(s) el.setAttribute('style', s);
            });
        }

        /** 6. SERVICE WORKER **/
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.onupdatefound = () => {
                        const newWorker = reg.installing;
                        newWorker.onstatechange = () => { if (newWorker.state === 'installed' && navigator.serviceWorker.controller) document.getElementById('update-toast').classList.remove('hidden'); };
                    };
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => { 
            if (localStorage.getItem('theme') !== 'light') document.body.classList.add('dark-mode'); 
            UI.show('screen-menu'); 
        });
    </script>
</body>
</html>
