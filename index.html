        //                        GESTION DES EXERCICES / JEU
        // ============================================================================
        
        /**
         * Démarre un nouveau jeu pour un module
         * @param {string} id - Identifiant du module
         */
        function startGame(id) {
            currentModId = id;
            currentIdx = 0;
            score = 0;
            userAnswers = [];
            gameState = null;
            loadedExerciseIdx = -1;
            
            document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('screen-game').classList.remove('hidden');
            loadExercise();
        }

        /**
         * Reprend une partie sauvegardée
         * @param {string} id - Identifiant du module
         */
        function resumeGame(id) {
            if (gameState && gameState.modId === id) {
                currentModId = gameState.modId;
                currentIdx = gameState.currentIdx;
                score = gameState.score;
                userAnswers = JSON.parse(JSON.stringify(gameState.userAnswers));
                loadedExerciseIdx = currentIdx;
            }
            
            document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('screen-game').classList.remove('hidden');
            loadExercise();
        }

        /**
         * Charge et affiche l'exercice courant
         */
        function loadExercise() {
            const mod = modulesData[currentModId];
            const ex = mod.exercises[currentIdx];
            state = 'playing';
            
            // Réinitialiser les réponses si nouvel exercice
            if (loadedExerciseIdx !== currentIdx) {
                userAnswers = new Array(ex.phrase.length).fill(null);
                loadedExerciseIdx = currentIdx;
            }
            
            // Mettre à jour l'affichage
            document.getElementById('game-mod-title').innerText = mod.title;
            document.getElementById('game-progress').innerText = `DÉFI ${currentIdx + 1} / ${mod.exercises.length}`;
            document.getElementById('game-translation').innerText = ex.translation;
            document.getElementById('game-feedback').classList.add('hidden');
            document.getElementById('game-rule').classList.add('hidden');
            document.getElementById('btn-action').innerText = "VÉRIFIER";
            document.getElementById('btn-action').disabled = true;
            
            // Créer les emplacements pour les mots
            const wordCont = document.getElementById('game-words');
            wordCont.innerHTML = '';
            ex.phrase.forEach((w, i) => {
                const div = document.createElement('div');
                div.className = "flex-1 flex flex-col items-center gap-4";
                div.innerHTML = `<div class="arabic text-3xl font-bold w-full py-10 rounded-[2.5rem] shadow-sm border text-center" style="background-color: var(--bg-card); border-color: var(--border-color); color: var(--text-main);">${w}</div><div id="slot-${i}" class="drop-zone w-full">Placer ici</div>`;
                wordCont.appendChild(div);
            });
            
            // Créer les labels glissables
            const labelCont = document.getElementById('game-labels');
            labelCont.innerHTML = '';
            ex.opts.forEach((o, idx) => {
                const el = document.createElement('div');
                el.innerText = o;
                el.className = "draggable-label";
                el.onmousedown = (e) => startDrag(e, o, el);
                el.ontouchstart = (e) => startDrag(e, o, el);
                labelCont.appendChild(el);
            });
            
            // Restaurer l'état des réponses précédentes
            userAnswers.forEach((answer, i) => {
                if (answer) {
                    const slot = document.getElementById(`slot-${i}`);
                    slot.innerText = answer;
                    slot.className = "drop-zone w-full slot-filled";
                    slot.onclick = () => {
                        if (state === 'playing') {
                            userAnswers[i] = null;
                            slot.innerText = "Placer ici";
                            slot.className = "drop-zone w-full";
                            document.querySelectorAll('.draggable-label').forEach(l => {
                                if (l.innerText === answer) l.classList.remove('disabled');
                            });
                            document.getElementById('btn-action').disabled = true;
                        }
                    };
                    // Désactiver le label correspondant
                    document.querySelectorAll('.draggable-label').forEach(label => {
                        if (label.innerText === answer) label.classList.add('disabled');
                    });
                    document.getElementById('btn-action').disabled = false;
                }
            });
            
            applyDarkModeStyles();
        }


        // ============================================================================
        //                        SYSTÈME DRAG-AND-DROP
        // ============================================================================
        
        /**
         * Commence le drag d'une étiquette
         * @param {Event} e - Événement souris/tactile
         * @param {string} label - Texte de l'étiquette
         * @param {HTMLElement} originalEl - Élément original
         */
        function startDrag(e, label, originalEl) {
            if (state !== 'playing') return;
            if (originalEl.classList.contains('disabled')) return;
            if (e.cancelable) e.preventDefault();
            
            const touch = e.touches ? e.touches[0] : e;
            dragGhost = document.createElement('div');
            dragGhost.innerText = label;
            dragGhost.className = 'drag-ghost';
            dragGhost.style.width = originalEl.offsetWidth + 'px';
            dragGhost.style.height = originalEl.offsetHeight + 'px';
            document.body.appendChild(dragGhost);
            
            const moveAt = (clientX, clientY) => {
                dragGhost.style.left = clientX - dragGhost.offsetWidth / 2 + 'px';
                dragGhost.style.top = clientY - dragGhost.offsetHeight / 2 + 'px';
            };
            
            const onMove = (event) => {
                const moveTouch = event.touches ? event.touches[0] : event;
                moveAt(moveTouch.clientX, moveTouch.clientY);
                const elUnder = document.elementFromPoint(moveTouch.clientX, moveTouch.clientY);
                document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
                if (elUnder && elUnder.classList.contains('drop-zone')) {
                    elUnder.classList.add('drag-over');
                }
            };
            
            const onEnd = (event) => {
                const endTouch = event.changedTouches ? event.changedTouches[0] : (event.touches ? event.touches[0] : event);
                const elUnder = document.elementFromPoint(endTouch.clientX, endTouch.clientY);
                
                if (elUnder && elUnder.classList.contains('drop-zone')) {
                    const slotIdx = parseInt(elUnder.id.split('-')[1]);
                    const prevLabel = userAnswers[slotIdx];
                    userAnswers[slotIdx] = label;
                    
                    const slot = document.getElementById(`slot-${slotIdx}`);
                    slot.innerText = label;
                    slot.className = "drop-zone w-full slot-filled";
                    slot.onclick = () => {
                        if (state === 'playing') {
                            userAnswers[slotIdx] = null;
                            slot.innerText = "Placer ici";
                            slot.className = "drop-zone w-full";
                            document.querySelectorAll('.draggable-label').forEach(l => {
                                if (l.innerText === label) l.classList.remove('disabled');
                            });
                            document.getElementById('btn-action').disabled = true;
                        }
                    };
                    
                    originalEl.classList.add('disabled');
                    if (prevLabel) {
                        document.querySelectorAll('.draggable-label').forEach(l => {
                            if (l.innerText === prevLabel) l.classList.remove('disabled');
                        });
                    }
                }
                
                document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
                if (dragGhost) {
                    dragGhost.remove();
                    dragGhost = null;
                }
                document.getElementById('btn-action').disabled = userAnswers.includes(null);
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
            };
            
            moveAt(touch.clientX, touch.clientY);
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
        }


        // ============================================================================
        //                        GESTION DES RÉPONSES ET FEEDBACK
        // ============================================================================
        
        /**
         * Valide la réponse et affiche le feedback ou passe à l'exercice suivant
         */
        function handleAction() {
            const mod = modulesData[currentModId];
            const ex = mod.exercises[currentIdx];

            if (state === 'playing') {
                // --- VÉRIFICATION DE LA RÉPONSE ---
                const isCorrect = userAnswers.every((v, i) => v === ex.correct[i]);
                state = 'checked';
                
                const fdb = document.getElementById('game-feedback');
                const fdbT = document.getElementById('game-feedback-text');
                fdb.classList.remove('hidden');

                // Mettre en couleur les réponses (correctes/incorrectes)
                userAnswers.forEach((v, i) => {
                    const s = document.getElementById(`slot-${i}`);
                    s.className = "drop-zone w-full slot-filled " + (v === ex.correct[i] ? "slot-correct" : "slot-wrong");
                });

                if (isCorrect) {
                    score++;
                    fdb.className = "mb-4 p-5 rounded-2xl flex bg-green-600 text-white shadow-xl";
                    fdbT.innerText = "Exact !";
                } else {
                    fdb.className = "mb-4 p-5 rounded-2xl flex bg-red-600 text-white shadow-xl";
                    fdbT.innerText = "Erreur d'analyse";
                }
                document.getElementById('btn-action').innerText = "SUIVANT";

            } else {
                // --- PROGRESSION OU RÉSULTAT FINAL ---
                if (currentIdx < mod.exercises.length - 1) {
                    // Exercice suivant
                    currentIdx++;
                    loadExercise();
                } else {
                    // Dernier exercice: afficher les résultats
                    saveScoreToHistory(mod.title, score, mod.exercises.length);
                    
                    document.getElementById('screen-game').classList.add('hidden');
                    document.getElementById('screen-result').classList.remove('hidden');
                    
                    document.getElementById('result-title').innerText = `${mod.name}: ${mod.title}`;
                    document.getElementById('result-score').innerText = `${score} / ${mod.exercises.length}`;

                    // Confettis si score parfait
                    if (score === mod.exercises.length) {
                        let count = 0;
                        const interval = setInterval(() => {
                            confetti({ particleCount: 100, spread: 60, origin: { y: 0.6 }, zIndex: 100 });
                            count++;
                            if (count >= 3) clearInterval(interval);
                        }, 300);
                    }
                }
            }
        }

        // ============================================================================
        //                    GESTION DES TABLES DE CONJUGAISON
        // ============================================================================
        
        /**
         * Initialise l'interface des tables et configure les événements
         */
        function initializeTables() {
            const mascTable = document.getElementById('masculineTable');
            const femTable = document.getElementById('feminineTable');
            const wordSelector = document.getElementById('wordSelector');
            
            if (!mascTable || !femTable || !wordSelector) {
                return;
            }
            
            // Enregistrer les templates HTML originaux
            originalMascTableHTML = mascTable.innerHTML;
            originalFemTableHTML = femTable.innerHTML;
            
            // Cloner le sélecteur pour nettoyer les anciens listeners
            const newSelector = wordSelector.cloneNode(true);
            wordSelector.parentNode.replaceChild(newSelector, wordSelector);
            
            // Ajouter le nouveau listener pour changement de mot
            newSelector.addEventListener('change', function(e) {
                wordRadical = this.value;
                updateTerminationTables();
            });
            
            // Ajouter les listeners pour l'état (nakirah/marifah/moudaf)
            const radioButtons = document.querySelectorAll('input[name="wordState"]');
            radioButtons.forEach(radio => {
                radio.addEventListener('change', function() {
                    updateTableVisibility();
                });
            });
            
            // Ajouter les listeners pour le genre (masculin/féminin)
            const genderRadioButtons = document.querySelectorAll('input[name="wordGender"]');
            genderRadioButtons.forEach((radio, idx) => {
                radio.addEventListener('change', function() {
                    updateTableGenderVisibility();
                });
            });
        }

        /**
         * Met à jour les tables en remplaçant le mot racine
         */
        function updateTerminationTables() {
            const mascTable = document.getElementById('masculineTable');
            const femTable = document.getElementById('feminineTable');
            
            if (mascTable && originalMascTableHTML) {
                mascTable.innerHTML = originalMascTableHTML.replace(/مُسْلِم/g, wordRadical);
            }
            
            if (femTable && originalFemTableHTML) {
                femTable.innerHTML = originalFemTableHTML.replace(/مُسْلِم/g, wordRadical);
            }
            
            updateTableVisibility();
        }
        
        /**
         * Affiche/masque les lignes de table selon l'état sélectionné
         */
        function updateTableVisibility() {
            const selectedState = document.querySelector('input[name="wordState"]:checked')?.value || 'nakirah';
            const mascTable = document.getElementById('masculineTable');
            const femTable = document.getElementById('feminineTable');
            
            const updateRows = (table) => {
                if (!table) return;
                const rows = table.querySelectorAll('tbody tr');
                rows.forEach((row, index) => {
                    if (selectedState === 'nakirah') {
                        row.style.display = (index % 3 === 0) ? 'table-row' : 'none';
                    } else if (selectedState === 'marifah') {
                        row.style.display = (index % 3 === 1) ? 'table-row' : 'none';
                    } else if (selectedState === 'moudaf') {
                        row.style.display = (index % 3 === 2) ? 'table-row' : 'none';
                    }
                });
            };
            
            updateRows(mascTable);
            updateRows(femTable);
        }

        /**
         * Affiche/masque les tables selon le genre sélectionné
         */
        function updateTableGenderVisibility() {
            const selectedGender = document.querySelector('input[name="wordGender"]:checked');
            if (!selectedGender) return;
            
            const gender = selectedGender.value;
            const mascContainer = document.getElementById('masculineTableContainer');
            const femContainer = document.getElementById('feminineTableContainer');
            
            if (mascContainer) {
                mascContainer.style.setProperty('display', gender === 'masculine' ? 'block' : 'none', 'important');
            }
            if (femContainer) {
                femContainer.style.setProperty('display', gender === 'feminine' ? 'block' : 'none', 'important');
            }
        }


        // ============================================================================
        //                        SYSTÈME DE RECHERCHE
        // ============================================================================
        
        /**
         * Affiche l'écran de recherche
         */
        function showSearch() {
            document.querySelectorAll('body > div').forEach(d => {
                if (!['theme-btn', 'update-toast'].includes(d.id)) d.classList.add('hidden');
            });
            document.getElementById('screen-search').classList.remove('hidden');
            document.getElementById('search-input').value = '';
            document.getElementById('search-results').innerHTML = '<p class="text-center text-muted italic py-10">Tapez un mot-clé pour trouver une règle.</p>';
            setTimeout(() => document.getElementById('search-input').focus(), 100);
        }

        /**
         * Effectue une recherche dans les cours (titres, résumés et contenu)
         * Supporte la recherche multilingue (français, arabe, translittération)
         */
        function performSearch() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const resultsCont = document.getElementById('search-results');
            
            if (query.length < 2) {
                resultsCont.innerHTML = '<p class="text-center text-muted italic py-10">Tapez au moins 2 lettres...</p>';
                return;
            }

            let matches = [];
            
            // Obtenir tous les équivalents du terme recherché (FR/AR/Translittération)
            const searchTerms = getTermEquivalents(query);

            // Recherche dans les modules
            Object.values(modulesData).forEach(m => {
                // Créer les textes à explorer
                const courseTextPlain = m.course.toLowerCase().replace(/<[^>]*>/g, ' ');
                const titleLower = m.title.toLowerCase();
                const summaryLower = m.summary.toLowerCase();
                
                // Extraire le numéro du module (m1 -> 1, m2 -> 2, etc.)
                const moduleNumber = m.id.replace(/[^\d]/g, '');
                const moduleLabel = `M${moduleNumber}`;
                
                // Chercher tous les équivalents du terme
                const titleMatch = searchTerms.some(term => titleLower.includes(term));
                const summaryMatch = searchTerms.some(term => summaryLower.includes(term));
                const courseMatch = searchTerms.some(term => courseTextPlain.includes(term));
                
                if (titleMatch) {
                    // Si le titre contient le terme, afficher le résumé
                    matches.push({
                        badge: `${moduleLabel} - ${m.title}`,
                        title: '',
                        text: m.summary,
                        action: () => showCourse(m.id, query)
                    });
                } else if (summaryMatch) {
                    // Si le résumé contient le terme, afficher le résumé
                    matches.push({
                        badge: `${moduleLabel} - ${m.title}`,
                        title: '',
                        text: m.summary,
                        action: () => showCourse(m.id, query)
                    });
                } else if (courseMatch) {
                    // Si le cours contient le terme, chercher TOUTES les occurrences
                    // et créer un résultat pour chaque
                    for (const term of searchTerms) {
                        let startIndex = 0;
                        let foundIndex;
                        
                        // Trouver TOUTES les occurrences de ce terme dans le cours
                        while ((foundIndex = courseTextPlain.indexOf(term, startIndex)) !== -1) {
                            const contextStart = Math.max(0, foundIndex - 60);
                            const contextEnd = Math.min(courseTextPlain.length, foundIndex + term.length + 60);
                            const excerpt = '...' + courseTextPlain.substring(contextStart, contextEnd).trim() + '...';
                            
                            // Trouver la section h3 ou h2 qui contient cette occurrence (priorité h3)
                            const sectionName = findSectionName(m.course, foundIndex, courseTextPlain);
                            
                            matches.push({
                                badge: `${moduleLabel} - ${m.title}`,
                                title: sectionName,
                                text: excerpt,
                                action: () => showCourse(m.id, query)
                            });
                            
                            startIndex = foundIndex + 1; // Continuer après cette occurrence
                        }
                    }
                }
            });

            if (matches.length === 0) {
                resultsCont.innerHTML = '<p class="text-center py-10">Aucun résultat trouvé pour "<span class="search-highlight">' + highlightTermEquivalents(query, query) + '</span>"</p>';
                return;
            }

            resultsCont.innerHTML = matches.map((res, index) => `
                <div onclick="executeSearchAction(${index})" class="card p-4 hover:border-blue-500 cursor-pointer transition-all active:scale-95">
                    <div class="mb-3">
                        <span class="text-[9px] font-black uppercase px-2 py-1 rounded bg-blue-100 text-blue-800">${highlightTermEquivalents(res.badge, query)}</span>
                    </div>
                    ${res.title ? `<h3 style="font-weight: 700; font-size: 1rem; margin-bottom: 0.5rem; color: var(--text-main); display: block;">${highlightTermEquivalents(res.title, query)}</h3>` : ''}
                    <p class="text-xs text-muted line-clamp-3">${highlightTermEquivalents(res.text, query)}</p>
                </div>
            `).join('');

            window.currentSearchMatches = matches;
        }

        /**
         * Trouve le nom de la section (h2 ou h3) la plus proche contenant un terme
         * @param {string} htmlContent - Contenu HTML du cours
         * @param {number} position - Position dans le texte plain (sans HTML)
         * @param {string} plainContent - Contenu plain (sans HTML)
         * @returns {string} Nom de la section trouvée ou vide
         */
        function findSectionName(htmlContent, position, plainContent) {
            // Créer un conteneur temporaire pour analyser le DOM
            const tempContainer = document.createElement('div');
            tempContainer.innerHTML = htmlContent;
            
            let lastHeading = '';
            let textCounter = 0;
            
            // Parcourir tous les nœuds de texte
            const walker = document.createTreeWalker(
                tempContainer,
                NodeFilter.SHOW_TEXT,
                null,
                false
            );
            
            let node;
            while (node = walker.nextNode()) {
                const textLength = node.nodeValue.length;
                
                // Si on est arrivé à la position du terme
                if (textCounter + textLength > position) {
                    // Chercher le parent h2 ou h3 le plus proche
                    let parent = node.parentElement;
                    while (parent && parent !== tempContainer) {
                        if (parent.tagName === 'H2' || parent.tagName === 'H3') {
                            lastHeading = parent.textContent.trim();
                            break;
                        }
                        parent = parent.parentElement;
                    }
                    
                    // Si pas de h2/h3 parent, chercher le dernier h2/h3 rencontré
                    if (!lastHeading) {
                        const allHeadings = tempContainer.querySelectorAll('h2, h3');
                        for (let h of allHeadings) {
                            if (h.compareDocumentPosition(node) & Node.DOCUMENT_POSITION_FOLLOWING) {
                                lastHeading = h.textContent.trim();
                            }
                        }
                    }
                    
                    break;
                }
                
                textCounter += textLength;
            }
            
            return lastHeading;
        }

        /**
         * Exécute l'action d'un résultat de recherche
         * @param {number} index - Index du résultat cliqué
         */
        function executeSearchAction(index) {
            const match = window.currentSearchMatches[index];
            if (match && match.action) {
                match.action();
            }
        }

        /**
         * Surligne tous les équivalents (FR/AR/Translittération) d'un terme
         * @param {string} text - Texte à traiter
         * @param {string} query - Terme recherché
         * @returns {string} HTML avec tous les équivalents surlignés
         */
        function highlightTermEquivalents(text, query) {
            if (!query) return text;
            
            // Obtenir tous les équivalents du terme
            const searchTerms = getTermEquivalents(query);
            
            // Créer une regex qui correspond à tous les équivalents
            const escapedTerms = searchTerms.map(term => 
                term.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')
            );
            const regex = new RegExp(`(${escapedTerms.join('|')})`, 'gi');
            
            return text.replace(regex, '<span class="search-highlight">$1</span>');
        }

        /**
         * Surligne le texte d'une requête avec la classe search-highlight
         * @param {string} text - Texte à traiter
         * @param {string} q - Requête à surligner
         * @returns {string} HTML avec texte surligné
         */
        function highlightText(text, q) {
            if (!q) return text;
            const regex = new RegExp(`(${q.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="search-highlight">$1</span>');
        }


        // ============================================================================
        //                    INSTALLATION PWA - BANNIÈRE
        // ============================================================================
        
        /**
         * Vérifie si on doit montrer la bannière d'installation PWA
         * @returns {boolean} true si on peut afficher
         */
        function checkInstallEligibility() {
            const lastDismissed = localStorage.getItem('pwa_install_dismissed');
            if (lastDismissed) {
                const daysSince = (Date.now() - parseInt(lastDismissed)) / (1000 * 60 * 60 * 24);
                if (daysSince < 7) return false;
            }
            return true;
        }

        /**
         * Gère l'événement d'installation PWA
         */
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            if (checkInstallEligibility()) {
                installBanner.classList.remove('hidden');
                installBanner.classList.add('flex');
            }
        });

        /**
         * Masque la bannière d'installation
         */
        function dismissInstallBanner() {
            installBanner.classList.add('hidden');
            installBanner.classList.remove('flex');
            localStorage.setItem('pwa_install_dismissed', Date.now().toString());
        }

        /**
         * Gère le clic sur le bouton d'installation
         */
        document.getElementById('btn-install-app').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBanner.classList.add('hidden');
                } else {
                    dismissInstallBanner();
                }
                deferredPrompt = null;
            }
        });


        // ============================================================================
        //                    SERVICE WORKER - GESTION DES MISES À JOUR
        // ============================================================================
        
        /**
         * Déclenche la mise à jour de l'application
         */
        function updateApp() {
            if (newWorker) {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
            } else {
                window.location.reload();
            }
        }

        /**
         * Enregistre et gère le Service Worker
         */
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                // Vérifie les mises à jour en attente au démarrage
                if (reg.waiting) {
                    newWorker = reg.waiting;
                    document.getElementById('update-toast').classList.remove('hidden');
                }

                // Écoute l'arrivée d'une nouvelle mise à jour
                reg.addEventListener('updatefound', () => {
                    newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            document.getElementById('update-toast').classList.remove('hidden');
                        }
                    });
                });
            });

            // Écoute le remplacement du contrôleur du Service Worker
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }

    </script>
