<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Falah-e-Daraine - Grammaire Arabe</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg-main: #f8fafc; --bg-card: #ffffff; --text-main: #1e293b;
            --primary-blue: #004d99; --accent-blue: #0066cc; --border-color: #e2e8f0;
            --note-bg: #e6f7ff; --revision-orange: #f59e0b;
        }

        .dark-mode {
            --bg-main: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9;
            --primary-blue: #075985; --accent-blue: #7dd3fc; --border-color: #334155;
            --note-bg: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            text-rendering: optimizeLegibility;
            overflow-x: hidden;
        }

        .arabic { 
            font-family: 'Lateef', serif; direction: rtl; 
            font-size: 2.5rem; line-height: 1.1; contain: content; 
        }

        /* Zones de dépôt */
        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 1.25rem;
            min-height: 4.5rem;
            display: flex;
            align-items: center; justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0,0,0,0.01);
        }

        .drop-zone.drag-over {
            background: var(--note-bg);
            border-color: var(--accent-blue);
            transform: scale(1.04);
        }

        .slot-filled {
            border: 2px solid var(--primary-blue);
            background: var(--bg-card);
            font-family: 'Lateef'; font-size: 2rem;
            color: var(--primary-blue); font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Étiquettes */
        .draggable-label {
            background: var(--bg-card);
            border: 2px solid var(--primary-blue);
            padding: 8px 16px;
            border-radius: 1rem;
            cursor: grab;
            user-select: none;
            font-family: 'Lateef'; font-size: 1.8rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .draggable-label.disabled { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; }

        /* Ghost au dessus du doigt */
        .drag-ghost {
            position: fixed; pointer-events: none; z-index: 9999;
            opacity: 0.9; background: var(--bg-card);
            border: 2px solid var(--primary-blue); border-radius: 1rem;
            padding: 10px 20px; font-family: 'Lateef'; font-size: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Boutons Spéciaux */
        .btn-revision {
            background-color: var(--revision-orange);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(245, 158, 11, 0.39);
        }

        /* Accordéon Cours */
        .course-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease-in-out; }
        .course-section.active { max-height: 5000px; opacity: 1; margin-top: 1rem; }
        
        .badge-card { transition: all 0.4s; filter: grayscale(1); opacity: 0.4; }
        .badge-unlocked { filter: grayscale(0); opacity: 1; transform: translateY(-5px); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <main id="screen-menu" class="p-4 max-w-5xl mx-auto">
        <header class="flex justify-between items-center py-6 mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-900 rounded-2xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-black text-xl">ف</span>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-blue-900 dark:text-white leading-none uppercase">Falah</h1>
                    <span class="text-[10px] font-bold text-slate-400">Arabe & Grammaire</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDarkMode()" class="p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm">🌙</button>
                <button onclick="UI.showHistory()" class="p-3 bg-blue-900 text-white rounded-2xl shadow-lg relative">
                    🏆
                    <div id="mistake-count-global" class="hidden absolute -top-1 -right-1 bg-amber-500 text-[8px] px-1.5 py-0.5 rounded-full border-2 border-blue-900">0</div>
                </button>
            </div>
        </header>

        <div id="module-container" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
    </main>

    <section id="screen-game" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-50 flex flex-col">
        <nav class="p-4 flex justify-between items-center border-b dark:border-slate-800">
            <button onclick="UI.show('screen-menu')" class="font-bold text-blue-900">Quitter</button>
            <div class="text-center">
                <p id="game-title" class="text-[9px] font-black uppercase text-slate-400"></p>
                <p id="game-mode-label" class="text-[10px] font-bold text-amber-600 hidden">MODE RÉVISION</p>
                <div id="game-progress-bar" class="w-20 h-1 bg-slate-100 mt-1 rounded-full overflow-hidden">
                    <div id="game-progress-fill" class="h-full bg-blue-900 transition-all duration-300"></div>
                </div>
            </div>
            <div class="w-10"></div>
        </nav>

        <div class="flex-1 overflow-y-auto p-4 flex flex-col items-center">
            <div id="game-translation" class="w-full max-w-md p-6 bg-blue-50 dark:bg-slate-800 rounded-[2.5rem] text-center italic text-blue-900 dark:text-blue-100 mb-8 border border-blue-100"></div>
            <div id="game-phrase" class="w-full max-w-md flex flex-col gap-5 mb-12"></div>
            <div id="game-options" class="w-full max-w-md flex flex-wrap justify-center gap-2 mt-auto pb-10"></div>
        </div>

        <footer class="p-6 bg-white dark:bg-slate-900 border-t dark:border-slate-800">
            <div id="game-feedback" class="hidden mb-4 p-4 rounded-2xl text-white font-black text-center shadow-lg"></div>
            <button id="btn-check" onclick="Game.handleAction()" class="w-full py-5 bg-blue-900 text-white rounded-2xl font-black uppercase tracking-[0.2em] shadow-xl disabled:opacity-20 transition-all">Vérifier</button>
        </footer>
    </section>

    <section id="screen-history" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-40 overflow-y-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <button onclick="UI.show('screen-menu')" class="font-black text-blue-900">← RETOUR</button>
            <h2 class="text-xl font-black">Mon Progrès</h2>
            <div class="w-10"></div>
        </header>

        <div id="badges-grid" class="grid grid-cols-3 gap-3 mb-10"></div>
        
        <h3 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Derniers Scores</h3>
        <div id="history-list" class="flex flex-col gap-3 pb-20"></div>
    </section>

    <div id="screen-result" class="hidden fixed inset-0 bg-slate-900 flex flex-col items-center justify-center p-6 text-white z-[100] text-center">
        <div id="result-emoji" class="text-7xl mb-6">🎉</div>
        <h2 class="text-2xl font-black mb-2 uppercase italic">Mission Accomplie</h2>
        <p id="result-mod-title" class="text-blue-400 text-sm font-bold mb-10"></p>
        <div class="bg-white/10 px-12 py-16 rounded-[4rem] border border-white/20 mb-12">
            <div class="text-7xl font-black italic" id="result-score-val">0 / 0</div>
        </div>
        <button onclick="UI.show('screen-menu')" class="w-full max-w-xs py-6 bg-blue-600 rounded-full font-black uppercase tracking-widest shadow-2xl">Continuer</button>
    </div>

    <script>
        /**
         * 1. DONNÉES DES MODULES
         * Remplace les exercices vides par tes données réelles (M1 à M9)
         */
        const DATA = {
            modules: {
                'm1': { id: 'm1', title: "Le Nom (Ism)", exercises: [] },
                'm2': { id: 'm2', title: "Groupes de Mots", exercises: [] },
                'm3': { id: 'm3', title: "Phrase Nominale", exercises: [] },
                'm4': { id: 'm4', title: "Verbe au Passé", exercises: [] },
                'm5': { id: 'm5', title: "Verbe au Présent", exercises: [] },
                'm6': { id: 'm6', title: "Phrase Nominale (2)", exercises: [] },
                'm7': { id: 'm7', title: "Dérivés du Présent", exercises: [] },
                'm8': { id: 'm8', title: "Impératif", exercises: [] },
                'm9': { id: 'm9', title: "Passif & Relatifs", exercises: [] },
            },
            badges: [
                { id: 'start', icon: '🌱', name: 'Débutant', desc: '1 module fini', check: (h) => h.length >= 1 },
                { id: 'perfect', icon: '💎', name: 'Expert', desc: 'Un score de 100%', check: (h) => h.some(s => s.score === s.total) },
                { id: 'consistent', icon: '🔥', name: 'Assidu', desc: '5 modules finis', check: (h) => new Set(h.map(s=>s.modId)).size >= 5 },
                { id: 'master', icon: '👑', name: 'Maître', desc: 'Les 9 modules finis', check: (h) => new Set(h.map(s=>s.modId)).size >= 9 }
            ]
        };

        /**
         * 2. GESTION DES ERREURS (MISTAKE TRACKER)
         */
        const Mistakes = {
            get() { return JSON.parse(localStorage.getItem('falah_mistakes') || '{}'); },
            add(modId, exIdx) {
                const m = this.get();
                if (!m[modId]) m[modId] = [];
                if (!m[modId].includes(exIdx)) m[modId].push(exIdx);
                localStorage.setItem('falah_mistakes', JSON.stringify(m));
            },
            remove(modId, exIdx) {
                const m = this.get();
                if (m[modId]) {
                    m[modId] = m[modId].filter(i => i !== exIdx);
                    if (m[modId].length === 0) delete m[modId];
                }
                localStorage.setItem('falah_mistakes', JSON.stringify(m));
            },
            count(modId) { return (this.get()[modId] || []).length; }
        };

        /**
         * 3. GAME ENGINE
         */
        const Game = {
            modId: null,
            exercises: [],
            currentIdx: 0,
            userAnswers: [],
            score: 0,
            isRevision: false,
            state: 'playing',

            start(modId, revision = false) {
                this.modId = modId;
                this.isRevision = revision;
                const fullMod = DATA.modules[modId];
                
                if (revision) {
                    const errorIndices = Mistakes.get()[modId] || [];
                    this.exercises = fullMod.exercises.filter((_, idx) => errorIndices.includes(idx));
                    this.originalIndices = errorIndices; // Garder trace de l'index réel
                } else {
                    this.exercises = fullMod.exercises;
                }

                if (this.exercises.length === 0) return alert("Rien à réviser ici !");

                this.currentIdx = 0;
                this.score = 0;
                this.loadExercise();
                UI.show('screen-game');
            },

            loadExercise() {
                const ex = this.exercises[this.currentIdx];
                this.userAnswers = new Array(ex.phrase.length).fill(null);
                this.state = 'playing';

                // UI Setup
                document.getElementById('game-title').innerText = DATA.modules[this.modId].title;
                document.getElementById('game-mode-label').classList.toggle('hidden', !this.isRevision);
                document.getElementById('game-translation').innerText = ex.translation;
                document.getElementById('game-progress-fill').style.width = `${((this.currentIdx) / this.exercises.length) * 100}%`;
                
                const phraseCont = document.getElementById('game-phrase');
                phraseCont.innerHTML = ex.phrase.map((w, i) => `
                    <div class="flex items-center gap-3">
                        <div class="arabic flex-1 bg-white dark:bg-slate-800 p-4 rounded-3xl border shadow-sm text-center">${w}</div>
                        <div id="slot-${i}" class="drop-zone flex-1" ondragover="event.preventDefault()" ondrop="Game.onDrop(event, ${i})">Déposer</div>
                    </div>
                `).join('');

                const optCont = document.getElementById('game-options');
                optCont.innerHTML = ex.opts.map(o => `
                    <div class="draggable-label" draggable="true" ondragstart="Game.onDrag(event, '${o}')">${o}</div>
                `).join('');

                document.getElementById('game-feedback').classList.add('hidden');
                document.getElementById('btn-check').innerText = "Vérifier";
                document.getElementById('btn-check').disabled = true;
            },

            onDrag(e, val) {
                e.dataTransfer.setData("text", val);
                if(window.navigator.vibrate) window.navigator.vibrate(5);
            },

            onDrop(e, idx) {
                e.preventDefault();
                const val = e.dataTransfer.getData("text");
                this.userAnswers[idx] = val;
                const slot = document.getElementById(`slot-${idx}`);
                slot.innerText = val;
                slot.className = "drop-zone flex-1 slot-filled";
                slot.onclick = () => { if(this.state==='playing') { this.userAnswers[idx]=null; slot.innerText="Déposer"; slot.className="drop-zone flex-1"; this.updateCheckBtn(); }};
                this.updateCheckBtn();
            },

            updateCheckBtn() {
                document.getElementById('btn-check').disabled = this.userAnswers.includes(null);
            },

            handleAction() {
                if (this.state === 'playing') this.check();
                else this.next();
            },

            check() {
                const ex = this.exercises[this.currentIdx];
                const isCorrect = this.userAnswers.every((a, i) => a === ex.correct[i]);
                const realExIdx = this.isRevision ? this.originalIndices[this.currentIdx] : this.currentIdx;

                this.state = 'checked';
                const fb = document.getElementById('game-feedback');
                fb.classList.remove('hidden');
                fb.innerText = isCorrect ? "✨ Parfait !" : "⚠️ Essaie encore";
                fb.className = `mb-4 p-5 rounded-2xl text-white font-black text-center shadow-lg ${isCorrect?'bg-green-500':'bg-red-500'}`;

                // Colorer les slots
                this.userAnswers.forEach((a, i) => {
                    document.getElementById(`slot-${i}`).classList.add(a === ex.correct[i] ? 'slot-correct' : 'slot-wrong');
                });

                if (isCorrect) {
                    this.score++;
                    confetti({ particleCount: 40, spread: 50, origin: { y: 0.8 } });
                    if (this.isRevision) Mistakes.remove(this.modId, realExIdx); // Retirer si réussi en révision
                } else {
                    Mistakes.add(this.modId, realExIdx); // Ajouter aux erreurs si raté
                }

                document.getElementById('btn-check').innerText = "Suivant";
            },

            next() {
                this.currentIdx++;
                if (this.currentIdx < this.exercises.length) this.loadExercise();
                else this.finish();
            },

            finish() {
                const h = JSON.parse(localStorage.getItem('falah_history') || '[]');
                h.unshift({ modId: this.modId, score: this.score, total: this.exercises.length, date: new Date().toLocaleDateString() });
                localStorage.setItem('falah_history', JSON.stringify(h.slice(0, 20)));

                UI.showResult(this.score, this.exercises.length);
            }
        };

        /**
         * 4. UI ENGINE
         */
        const UI = {
            init() {
                this.renderModules();
                if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            },

            renderModules() {
                const container = document.getElementById('module-container');
                const mistakes = Mistakes.get();
                
                container.innerHTML = Object.entries(DATA.modules).map(([id, m]) => {
                    const errCount = (mistakes[id] || []).length;
                    return `
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-[2.5rem] shadow-sm border border-transparent flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[9px] font-black uppercase text-blue-900 dark:text-blue-300">Module ${id.replace('m','')}</span>
                            ${errCount > 0 ? `<span class="bg-amber-100 text-amber-700 text-[8px] font-bold px-2 py-0.5 rounded-full">${errCount} erreur${errCount>1?'s':''}</span>` : ''}
                        </div>
                        <h3 class="font-black text-lg mb-6 leading-tight dark:text-white">${m.title}</h3>
                        <div class="flex gap-2 mt-auto">
                            <button onclick="Game.start('${id}')" class="flex-1 py-4 bg-blue-900 text-white rounded-2xl font-bold text-[10px] uppercase shadow-md active:scale-95 transition-all">Défi</button>
                            ${errCount > 0 ? `<button onclick="Game.start('${id}', true)" class="btn-revision flex-1 py-4 rounded-2xl font-bold text-[10px] uppercase active:scale-95 transition-all">Réviser</button>` : ''}
                        </div>
                    </div>`;
                }).join('');
            },

            show(id) {
                document.querySelectorAll('section, main, div[id^="screen-"]').forEach(s => s.classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
                if(id === 'screen-menu') this.renderModules();
            },

            showHistory() {
                this.show('screen-history');
                const h = JSON.parse(localStorage.getItem('falah_history') || '[]');
                
                // Badges
                document.getElementById('badges-grid').innerHTML = DATA.badges.map(b => `
                    <div class="badge-card ${b.check(h)?'badge-unlocked':''} bg-white dark:bg-slate-800 p-4 rounded-3xl text-center border">
                        <div class="text-3xl mb-1">${b.icon}</div>
                        <p class="text-[8px] font-black uppercase">${b.name}</p>
                    </div>
                `).join('');

                // Liste
                document.getElementById('history-list').innerHTML = h.map(s => `
                    <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                        <div class="text-left"><p class="text-[8px] font-bold text-slate-400">${s.date}</p><p class="font-bold text-xs">${DATA.modules[s.modId].title}</p></div>
                        <div class="font-black text-blue-900 dark:text-blue-300">${s.score}/${s.total}</div>
                    </div>
                `).join('') || '<p class="text-center py-10 italic opacity-50">Aucun défi terminé.</p>';
            },

            showResult(s, tot) {
                this.show('screen-result');
                document.getElementById('result-mod-title').innerText = DATA.modules[Game.modId].title;
                document.getElementById('result-score-val').innerText = `${s} / ${tot}`;
            }
        };

        /**
         * 5. CORE FUNCTIONS
         */
        function toggleDarkMode() { 
            document.body.classList.toggle('dark-mode'); 
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            document.getElementById('theme-btn').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

        function toggleRule() { 
            const box = document.getElementById('game-rule');
            box.innerText = Game.exercises[Game.currentIdx].rule;
            box.classList.toggle('hidden');
        }

        function clearHistory() { 
            if(confirm("Effacer tes progrès ?")) { 
                localStorage.removeItem('falah_history'); 
                localStorage.removeItem('falah_mistakes');
                UI.showHistory(); 
            } 
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => UI.init());

    </script>
</body>
</html>
