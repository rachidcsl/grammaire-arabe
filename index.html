<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- Définir l'encodage UTF-8 pour supporter les caractères arabes et spéciaux -->
    <meta charset="UTF-8">

    <!-- Configuration responsive : adapte la mise en page à tous les écrans et appareils mobiles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">

    <!-- Titre de la page affiché dans l'onglet du navigateur -->
    <title>Grammaire Arabe - Falah-e-Daraine</title>

    <!-- Fichier manifest PWA permettant l'installation comme application native -->
    <link rel="manifest" href="manifest.json">

    <!-- Couleur du thème affichée dans la barre d'adresse et l'interface du navigateur -->
    <meta name="theme-color" content="#1e40af">

    <!-- Polices Google : Lateef (arabe) et Inter (latin/interface) -->
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Bibliothèque Canvas Confetti pour les effets visuels de célébration/confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Framework CSS Tailwind : utilitaires pour mise en page et styling responsive -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* ====================================================================== */
        /* SECTION 1: VARIABLES CSS & CONFIGURATION DE THÈME                      */
        /* ====================================================================== */
        /* Variables centrales pour le contrôle des couleurs et designs */

        :root {
            /* Couleurs de base pour le mode clair */
            --bg-main: #f8fafc;           /* Fond principal de la page */
            --bg-card: #ffffff;           /* Fond des cartes et conteneurs */
            --text-main: #1e293b;         /* Couleur texte principale */
            --text-muted: #64748b;        /* Couleur texte secondaire/muted */
            --primary-blue: #004d99;      /* Couleur primaire bleue */
            --accent-blue: #0066cc;       /* Couleur accent bleue */
            --border-color: #e2e8f0;      /* Couleur des bordures */
            --note-bg: #e6f7ff;           /* Arrière-plan des notes/info-box */
            --table-header: #004d99;      /* Couleur en-têtes de tableau */
        }

        body.dark-mode {
            /* Variables remplacées en mode sombre */
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary-blue: #075985;
            --accent-blue: #7dd3fc;
            --border-color: #334155;
            --note-bg: #1e293b;
            --table-header: #075985;
        }


        /* ====================================================================== */
        /* SECTION 2: POLICE DE CARACTÈRES & TYPOGRAPHIE BASES                    */
        /* ====================================================================== */
        /* Configuration des polices d'affichage pour arabe et européen */

        /* ====================================================================== */
        /* SECTION 3: STYLES GÉNÉRAUX & ÉLÉMENT BODY                              */
        /* ====================================================================== */
        /* Configuration générale de l'application */

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            transition: all 0.3s ease;
        }


        /* ====================================================================== */
        /* SECTION 4: TYPOGRAPHIE DES EN-TÊTES (H1 - H4)                          */
        /* ====================================================================== */
        /* Styles pour tous les niveaux d'en-têtes */

        h1 {
            color: var(--primary-blue);
            border-bottom: 4px solid var(--primary-blue);
            text-align: center;
            font-weight: 900;
        }

        h2 {
            font-size: 1.7rem;
            color: var(--accent-blue);
            border-left: 8px solid var(--accent-blue);
            padding-left: 15px;
            margin-top: 3rem;
            background: var(--bg-card);
            padding-top: 15px;
            padding-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h3 {
            font-size: 1.4rem;
            color: var(--primary-blue);
            margin-top: 2.5rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            font-weight: 700;
        }

        h4 {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-muted);
            margin-top: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }


        /* ====================================================================== */
        /* SECTION 5: TABLEAUX & STYLES TABLEAU                                   */
        /* ====================================================================== */
        /* Styles pour affichage haute résolution des tableaux de conjugaison */

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin: 25px 0;
            border: 1px solid var(--primary-blue);
            border-radius: 12px;
            background: var(--bg-card);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
            min-width: 800px;
            border: 1px solid var(--border-color);
        }

        th {
            color: white;
            background: var(--table-header);
            padding: 15px 10px;
            border: 1px solid var(--border-color) !important;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        td {
            padding: 12px 10px;
            border: 1px solid var(--border-color) !important;
            text-align: center;
            font-size: 0.95rem;
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .bg-blue-light {
            background-color: var(--note-bg);
        }

        .bg-gray-light {
            background-color: var(--bg-main);
        }

        .bg-header-sub {
            background-color: var(--border-color);
            font-weight: 800;
            color: var(--primary-blue);
            font-size: 0.75rem;
        }

        /* Initialiser la visibilité des tableaux par genre */
        #masculineTableContainer {
            display: block !important;
        }

        #feminineTableContainer {
            display: none !important;
        }


        /* ====================================================================== */
        /* SECTION 6: SYSTÈME DRAG & DROP                                         */
        /* ====================================================================== */
        /* Styles pour l'atelier interactif de glisser-déposer */

        .drop-zone {
            border: 2px dashed var(--text-muted);
            background: var(--bg-card);
            color: var(--text-muted);
            border-radius: 15px;
            height: 5.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.2s;
            position: relative;
            width: 100%;
            text-transform: uppercase;
        }

        .drop-zone.drag-over {
            background-color: var(--note-bg);
            border-color: var(--accent-blue);
            border-style: solid;
            transform: scale(1.02);
        }

        .draggable-label {
            font-family: 'Lateef', serif;
            font-size: 2rem;
            font-weight: 700;
            background: var(--bg-card);
            border: 2px solid var(--primary-blue);
            border-radius: 20px;
            padding: 12px 20px;
            cursor: grab;
            user-select: none;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 4.5rem;
            touch-action: none;
            z-index: 10;
            color: var(--text-main);
        }

        .draggable-label.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.95;
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            background: var(--bg-card);
            border: 3px solid var(--primary-blue);
            border-radius: 20px;
            font-family: 'Lateef', serif;
            font-size: 2rem;
            font-weight: 700;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .slot-filled {
            border: 3px solid var(--primary-blue);
            background: var(--note-bg);
            color: var(--primary-blue);
            font-weight: 700;
            border-radius: 15px;
            font-family: 'Lateef', serif;
            font-size: 2rem;
            cursor: pointer;
        }

        .slot-correct {
            border: 4px solid #22c55e;
            background: #f0fdf4;
            color: #166534;
        }

        .slot-wrong {
            border: 4px solid #ef4444;
            background: #fef2f2;
            color: #991b1b;
        }


        /* ====================================================================== */
        /* SECTION 7: BOUTONS & BOXES                                             */
        /* ====================================================================== */
        /* Styles pour les boutons d'action et les boîtes de contenu */

        .btn-action {
            background-color: var(--primary-blue);
            color: white;
            padding: 22px;
            border-radius: 20px;
            font-weight: 900;
            width: 100%;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            box-shadow: 0 10px 15px -3px rgba(0, 77, 153, 0.3);
        }

        .btn-action:disabled {
            opacity: 0.3;
            box-shadow: none;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }

        .note-box {
            background-color: var(--note-bg);
            border-left: 6px solid var(--accent-blue);
            padding: 25px;
            font-size: 1.05rem;
            margin: 25px 0;
            border-radius: 0 15px 15px 0;
            color: var(--text-main);
        }

        /* ====================================================================== */
        /* SECTION 8: ACCORDÉON & SECTIONS PLIABLES                               */
        /* ====================================================================== */
        /* Styles pour les cours avec accordéon pliable/dépliable */

        #course-body h2, #course-body h3 {
            cursor: pointer;
            user-select: none;
            padding: 0.5rem 0 !important;
        }

        #course-body h2::before, #course-body h3::before {
            content: "▼ ";
            display: inline-block;
            margin-right: 0.5rem;
            transition: transform 0.3s ease;
        }

        #course-body h2.collapsed::before, #course-body h3.collapsed::before {
            content: "▶ ";
            transform: rotate(0deg);
        }

        .course-section {
            display: block;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            overflow: hidden;
        }

        .course-section.collapsed {
            max-height: 0;
            opacity: 0;
        }

        #course-main-title {
            text-align: center !important;
            direction: rtl;
        }


        /* ====================================================================== */
        /* SECTION 9: COMPOSANTS DE L'INTERFACE UTILISATEUR                        */
        /* ====================================================================== */
        /* Styles pour les contrôles et éléments d'UI spécifiques */

        .theme-toggle {
            margin-left: auto;
            padding: 0.5rem 0.8rem;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid var(--primary-blue);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }


        /* ====================================================================== */
        /* SECTION 10: CLASSES UTILITAIRES & RÉUTILISABLES                        */
        /* ====================================================================== */
        /* Classes génériques pour mise en page et typographie */

        .heading-primary {
            margin: 1rem 0 1rem 0;
            color: #0066cc;
            font-family: 'Poppins';
            font-size: 1.3rem;
            font-weight: 700;
        }

        .heading-secondary {
            margin: 0.5rem 0 0.5rem 0;
            color: #0066cc;
            font-family: 'Poppins';
            font-size: 1.1rem;
            font-weight: 700;
        }

        .paragraph-main {
            margin: 0.8rem 0;
            font-size: 0.95rem;
            line-height: 1;
        }

        /* Classes utilitaires pour texte Lateef (arabe) */
        .text-lateef-1-6rem {
            font-family: 'Lateef';
            font-size: 1.6rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .text-lateef-1-6rem-blue {
            font-family: 'Lateef';
            font-size: 1.6rem;
            color: #0066cc;
            font-weight: 700;
            white-space: nowrap;
        }

        .text-lateef-1-8rem {
            font-family: 'Lateef';
            font-size: 1.8rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .text-lateef-1-8rem-blue {
            font-family: 'Lateef';
            font-size: 1.8rem;
            color: #0066cc;
            font-weight: 700;
            white-space: nowrap;
        }

        .text-lateef-2rem {
            font-family: 'Lateef';
            font-size: 2rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .text-lateef-2rem-blue {
            font-family: 'Lateef';
            font-size: 2rem;
            color: #0066cc;
            white-space: nowrap;
        }

        .text-lateef-2rem-green {
            font-family: 'Lateef';
            font-size: 2rem;
            color: #008000;
            white-space: nowrap;
        }

        .text-lateef-2rem-red {
            font-family: 'Lateef';
            font-size: 2rem;
            color: #ff0000;
            white-space: nowrap;
        }

        /* Classes responsives pour adaptation des tailles de police */
        .fit-ar {
            font-size: clamp(0.6rem, 3.5vw, 2rem);
            line-height: 1.3;
            font-family: 'Lateef', serif;
        }

        .ar-fit {
            font-size: clamp(0.85rem, 4vw, 2rem);
            line-height: 1.4;
            font-family: 'Lateef', serif;
        }

        .txt-fit {
            font-size: clamp(0.75rem, 2.2vw, 0.95rem);
            line-height: 1.4;
            font-family: 'Inter', sans-serif;
        }

        .fit-pad {
            padding: clamp(0.15rem, 1vw, 0.5rem);
        }

        .fit-pad-small {
            padding: clamp(0.1rem, 0.8vw, 0.4rem);
        }

        .sub-text {
            font-size: clamp(0.5rem, 1.5vw, 0.75rem);
            color: #666;
            font-family: 'Inter', sans-serif;
            display: block;
            margin-top: 2px;
        }

        /* Surlignage pour les résultats de recherche */
        .search-highlight {
            background-color: #ffeb3b;
            padding: 0.1rem 0.3rem;
            border-radius: 0.2rem;
            font-weight: 700;
            color: #333;
        }

        body.dark-mode .search-highlight {
            background-color: #8b7f00;
            color: #ffeb3b;
        }

        body.dark-mode #screen-search {
            background: var(--bg-main) !important;
        }


        /* ====================================================================== */
        /* SECTION 11: THÈME SOMBRE - ADAPTATIONS COLOR MODE DARK                 */
        /* ====================================================================== */
        /* Corrections et ajustements spécifiques en mode sombre */

        body.dark-mode .heading-primary {
            color: #7dd3fc;
        }

        body.dark-mode .heading-secondary {
            color: #7dd3fc;
        }

        body.dark-mode .text-lateef-1-6rem-blue {
            color: #7dd3fc;
        }

        body.dark-mode .text-lateef-1-8rem-blue {
            color: #7dd3fc;
        }

        body.dark-mode .text-lateef-2rem-blue {
            color: #7dd3fc;
        }

        body.dark-mode .text-lateef-2rem-green {
            color: #00ff00;
        }

        /* Corrections Tailwind en mode dark - classes génériques */
        body.dark-mode .text-blue-800 {
            color: var(--accent-blue) !important;
        }

        body.dark-mode .text-blue-900 {
            color: var(--accent-blue) !important;
        }

        body.dark-mode .text-slate-500,
        body.dark-mode .text-slate-400 {
            color: var(--text-muted) !important;
        }

        body.dark-mode .bg-blue-50 {
            background-color: var(--note-bg) !important;
        }

        body.dark-mode .border-blue-50 {
            border-color: var(--border-color) !important;
        }

        body.dark-mode .border-blue-900\/10 {
            border-color: var(--border-color) !important;
        }

        body.dark-mode .bg-blue-800 {
            background-color: var(--primary-blue) !important;
        }

        /* Select en mode dark */
        body.dark-mode select {
            background-color: var(--bg-card) !important;
            color: var(--text-main) !important;
            border-color: var(--border-color) !important;
        }

        body.dark-mode select option {
            background-color: var(--bg-card);
            color: var(--text-main);
        }


        /* ====================================================================== */
        /* SECTION 12: DESIGN RÉACTIF - ÉCRAN GRAND (> 900px)                     */
        /* ====================================================================== */
        /* Adaptations pour écrans larges et mode paysage */

        @media (min-width: 901px) {
            #game-words {
                flex-wrap: wrap-reverse !important;
                flex-direction: row !important;
            }

            #game-words > div {
                flex: 1 !important;
                width: auto !important;
            }
        }

        @media (orientation: landscape) {
            #module-container {
                grid-template-columns: repeat(3, 1fr) !important;
            }

            .max-w-6xl {
                max-width: 95% !important;
            }

            #game-words {
                flex-direction: row !important;
                flex-wrap: wrap;
                gap: 15px;
            }

            .arabic-table {
                font-size: 1.8rem !important;
            }

            header svg {
                width: 100px;
                height: 60px;
            }
        }

        /* ====================================================================== */
        /* SECTION 13: DESIGN RÉACTIF - ÉCRAN MOYEN (≤ 900px)                     */
        /* ====================================================================== */
        /* Adaptations pour tablettes et petits écrans */

        @media (max-width: 900px) {
            /* Responsive tables */
            div[style*="overflow-x: auto"] {
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch !important;
                overflow-y: visible !important;
                max-width: 100% !important;
                width: 100% !important;
                display: block !important;
            }

            table {
                width: 100% !important;
                table-layout: auto !important;
                border: 1px solid #cbd5e1;
                border-spacing: 0;
                border-collapse: collapse;
            }

            div[style*="overflow: hidden"] {
                overflow-x: auto !important;
                overflow-y: hidden !important;
                -webkit-overflow-scrolling: touch;
            }

            th {
                background: #004d99;
                color: white !important;
                word-wrap: break-word;
                overflow-wrap: break-word;
                border: 0.1px solid #cbd5e1 !important;
                width: auto !important;
                min-width: 0 !important;
            }

            td {
                word-wrap: break-word;
                overflow-wrap: break-word;
                border: 0.1px solid #cbd5e1 !important;
                width: auto !important;
                min-width: 0 !important;
            }

            /* Empêcher rupture des mots arabes et français */
            td.fit-ar, td.fit-lab, span[style*="font-family: 'Lateef'"] {
                word-break: keep-all !important;
                overflow-wrap: normal !important;
                white-space: nowrap !important;
            }

            /* Réduire taille titre pour petits écrans */
            h1 {
                font-size: 1.25rem !important;
            }

            span[style*="font-family: 'Lateef'"] {
                font-size: 2.5rem !important;
                word-wrap: break-word;
                overflow-wrap: break-word;
                margin: 0 !important;
                font-weight: 500 !important;
                width: 100%;
            }

            span[style*="display: block"][style*="line-height: 1"] {
                line-height: 0.8 !important;
            }

            /* Réduire padding pour plus d'espace au texte */
            td.fit-ar {
                padding: 0.05rem !important;
            }

            /* Supprimer padding colonne labels et ajuster largeurs */
            th:first-child {
                width: 12% !important;
            }

            th:nth-child(2),
            th:nth-child(3),
            th:nth-child(4) {
                width: 29.33% !important;
            }

            /* Fix Arabic text alignment - start from top */
            #game-words {
                flex-wrap: wrap-reverse !important;
                justify-content: center !important;
                direction: ltr !important;
            }

            #game-words > div {
                flex: none !important;
                width: calc(33.333% - 11px) !important;
                max-width: 100% !important;
            }

            #course-main-title {
                font-size: 1.25rem !important;
                text-align: center !important;
                direction: rtl;
            }

            #course-body h2 {
                font-size: 1.15rem !important;
            }
        }

        /* ====================================================================== */
        /* SECTION 14: DESIGN RÉACTIF - ÉCRAN TABLETTE (≤ 768px)                  */
        /* ====================================================================== */
        /* Adaptations pour tablettes et écrans de taille moyenne */

        @media (max-width: 768px) {
            /* Conteneur principal des sélections */
            div[style*="margin: 1rem 0; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;"] {
                flex-wrap: wrap !important;
                gap: 0.75rem !important;
            }

            /* Conteneur des boutons radio (genre et état) */
            div[style*="display: flex; align-items: center; gap: 2rem; height: 3.8rem;"] {
                flex-wrap: wrap !important;
                gap: 1rem !important;
                height: auto !important;
                margin-left: 0 !important;
                width: 100% !important;
            }

            /* Encadrements des boutons radio */
            div[style*="display: flex; align-items: center; gap: 1.5rem; border: 2px solid"],
            div[style*="display: flex; align-items: center; gap: 1.5rem; margin-left: auto; border: 2px solid"] {
                height: auto !important;
                flex: 1 1 calc(50% - 0.5rem) !important;
                min-width: 200px !important;
                padding: 0.75rem 1rem !important;
                margin-left: 0 !important;
            }

            /* Select */
            #wordSelector {
                flex: 1 1 100% !important;
                min-width: 100% !important;
            }

            /* Labels dans les encadrements */
            label[style*="display: flex; align-items: center; gap: 0.5rem; font-weight: 500;"] {
                flex-wrap: nowrap !important;
                gap: 0.3rem !important;
            }

            label[style*="display: flex; align-items: center; gap: 0.5rem; font-weight: 500;"] span {
                font-size: 1.5rem !important;
            }
        }

        /* ====================================================================== */
        /* SECTION 15: DESIGN RÉACTIF - PETIT TÉLÉPHONE (≤ 480px)                 */
        /* ====================================================================== */
        /* Adaptations pour très petits écrans de téléphone */

        @media (max-width: 480px) {
            /* Très petits écrans - une colonne */
            div[style*="display: flex; align-items: center; gap: 2rem; height: 3.8rem;"] {
                flex-wrap: wrap !important;
                gap: 0.5rem !important;
            }

            /* Encadrements un par un */
            div[style*="display: flex; align-items: center; gap: 1.5rem; border: 2px solid"],
            div[style*="display: flex; align-items: center; gap: 1.5rem; margin-left: auto; border: 2px solid"] {
                flex: 1 1 100% !important;
                padding: 0.5rem 1rem !important;
            }

            label[style*="display: flex; align-items: center; gap: 0.5rem; font-weight: 500;"] span {
                font-size: 1.3rem !important;
            }
        }

        /* ====================================================================== */
        /* SECTION 16: STYLES ÉCRANS - INTÉGRÉS DEPUIS STYLES INLINE              */
        /* ====================================================================== */
        /* Styles pour les différents écrans de l'application */

        body {
            transition: background-color 0.3s ease;
        }

        #screen-course {
            background-color: var(--bg-main);
        }

        #screen-course > .border-b {
            background-color: var(--bg-main);
            border-color: var(--border-color);
        }

        #screen-game {

                    <!-- ═══════════════════════════════════════════════════════════════ -->

                    <!-- ═══════════════════════════════════════════════════════════════ -->

                    <!-- PROPRIÉTÉ 2 : LE GENRE (الجنس) - Distingue masculin et féminin -->
                    <h3 class="heading-secondary">2. Le Genre - <strong class="text-lateef-2rem">الْجِنْسُ</strong></h3>
                    <div  class="info-box">
                        <p style="margin: 0; font-size: 0.9rem; line-height: 1;">Indique si le mot est masculin (<strong class="text-lateef-1-8rem-blue">مُذَكَّرٌ</strong>) ou
                            féminin (<strong class="text-lateef-1-8rem-blue">مُؤَنَّثٌ</strong>).</p>
                    </div>
                    
                    <div class="alert-box">
                        <strong class="alert-subtitle">⚠️ Règle d'or :</strong>
                        <p>Un mot est <strong>masculin par défaut</strong>, sauf s'il appartient à l'une des catégories du féminin.</p>
                    </div>
                    <div class="warning-box">
                        <strong class="box-title">Les 3 catégories du Féminin :</strong>

                        <ol class="ol-spaced">
                            <li class="list-item-tight">
                                <strong>Féminin Réel :</strong> Biologiquement 
                                <strong class="text-lateef-1-8rem-blue">أُمٌّ</strong> (mère).
                            </li>
                            <li class="list-item-tight-top">
                                <strong>Féminin de Signe :</strong> Termine par un marqueur spécifique
                                <ul class="ul-sublist">
                                    <li class="list-item">Ta Marbuta 
                                        (<strong class="text-lateef-1-8rem-blue">ة</strong>) : 
                                        <strong class="text-lateef-1-8rem-blue">جَنَّةٌ</strong>
                                    </li>
                                    <li class="list-item">Alif Mamduda 
                                        (<strong class="text-lateef-1-8rem-blue">اء</strong>) : 
                                        <strong class="text-lateef-1-8rem-blue">سَمَاءٌ</strong>
                                    </li>
                                    <li class="list-item">Alif Maqsura 
                                        (<strong class="text-lateef-1-8rem-blue">ى</strong>) : 
                                        <strong class="text-lateef-1-8rem-blue">كُبْرَى</strong>
                                    </li> 
                                </ul>
                            </li>
                            <li class="list-item-tight-top">
                                <strong>Féminin par Décision :</strong>
                                <ul class="ul-sublist">
                                    <li class="list-item">Noms des vents, du feu, des villes/pays.</li>
                                    <li class="list-item">Parties du corps par paires (main, œil...).</li>
                                    <li class="list-item">Mots spécifiques : 
                                        <strong class="text-lateef-1-8rem-blue">شَمْسٌ</strong> (soleil), 
                                        <strong class="text-lateef-1-8rem-blue">أَرْضٌ</strong> (terre), 
                                        <strong class="text-lateef-1-8rem-blue">نَفْسٌ</strong> (âme).
                                    </li>
                                </ul>
                            </li>
                        </ol>
                    </div>

                    <!-- PROPRIÉTÉ 3 : LE NOMBRE (العدد) - Exprime singulier/duel/pluriel -->
                    <h3 class="heading-secondary">3. Le Nombre - <span class="text-lateef-2rem-blue">العدد</span></h3>
                    <div class="info-box">
                        Indique la quantité du ism.
                        <ul class="list-dense">
                            <li class="list-item">
                                <strong class="text-lateef-1-6rem-blue">وَاحِدٌ</strong>
                                    : Singulier (correspond à 1 unité).
                            </li>
                            <li class="list-item">
                                <strong class="text-lateef-1-6rem-blue">مُثَنَّى</strong>
                                    : Duel (correspond à 2 unités).
                            </li>
                            <li class="list-item">
                                <strong class="text-lateef-1-6rem-blue">جَمْعٌ</strong>
                                    : Pluriel (correspond à 3+ unités).
                            </li>
                        </ul>
                    </div>

                    <div class="alert-box">
                        <strong class="alert-subtitle">⚠️ Règle importante :</strong>
                        <ol class="list-dense">
                            <li class="list-item">
                                <strong>Les pluriels non-doués de raison</strong> (objets, animaux) sont traités grammaticalement comme du <strong>Féminin Singulier</strong>.
                            </li>
                            <li class="list-item">
                                <strong>Le pluriel Brisé (Taksir)</strong> opère un changement interne du mot
                                (<strong class="text-lateef-1-8rem-blue">كُتُبٌ → كِتَابٌ</strong>).
                            </li>
                        </ol>                            
                    </div>

                    <!-- PROPRIÉTÉ 4 : LE TYPE (القسم) - Défini (معرفة) ou Indéfini (نكرة) -->
                    <h3 class="heading-secondary">4. Le Type - <strong class="text-lateef-2rem">الْقِسْمُ</strong></h3>
                    <div class="info-box">
                        Indique si le mot est défini (connu) ou indéfini (inconnu).
                        <ul class="list-dense">
                            <li class="list-item">
                                <strong class="text-lateef-1-6rem-blue">نَكِرَةٌ</strong> : Indéfini, c'est le cas par défaut.
                            </li>
                            <li class="list-item">
                                <strong class="text-lateef-1-6rem-blue">مَعْرِفَةٌ</strong> : Défini, si le mot appartient à l'une des 7 catégories.
                            </li>
                        </ul>
                    </div>

                    <div class="warning-box">
                        <strong class="box-title">Les 7 catégories de Défini :</strong>
                        <ol class="list-dense">
                            <li class="list-item">
                                Commence par <strong class="text-lateef-1-6rem-blue">ال</strong>.
                            </li>
                            <li class="list-item">
                                Est un <strong>Nom Propre</strong>.
                            </li>
                            <li class="list-item">
                                Est un <strong>Pronom Personnel</strong>.
                            </li>
                            <li class="list-item">
                                Est un <strong>Pronom Démonstratif</strong>.
                            </li>
                            <li class="list-item">
                                Est un <strong>Pronom Relatif</strong>.
                            </li>
                            <li class="list-item">
                                Est précédé d'une <strong>interpellation</strong>
                                (<strong class="text-lateef-1-6rem-blue" style="vertical-align: middle; line-height: 0;">يَـ</strong>)
                            </li>
                            <li class="list-item">
                                Est <strong>annexé</strong>
                                (<strong class="text-lateef-1-6rem-blue" style="vertical-align: middle; line-height: 0;">مُضَافٌ</strong>)
                                à un mot défini.
                            </li>
                        </ol>
                    </div>

                    <!-- SECTION 2 : LES 4 TYPES DE GROUPES DE MOTS -->
                    <h2 class="heading-primary">1. <strong class="text-lateef-1-6rem">مَوْصُوفٌ وَصِفَةٌ</strong></h2>
                    <div class="info-box">
                        <p class="p-content">C'est l'association d'un nom et de son adjectif qualificatif.</p>
                        <ul class="list-dense">
                            <li class="list-item"><strong class="text-lateef-1-6rem-blue">الْمَوْصُوفُ</strong> : Nom décrit, celui qu'on qualifie.</li>
                            <li class="list-item"><strong class="text-lateef-1-6rem-blue">الصِّفَةُ</strong> : Adjectif, celui qui qualifie.</li>
                        </ul>
                        <p class="p-content"><em>Ex :</em> <strong class="text-lateef-1-6rem-blue">الرَّسُولُ الْكَرِيمُ</strong> (Le noble messager)</p>

                            <li>Le verbe doit être conjugué à la <strong style="color:  #ef4444;">3ème personne du singulier :</strong> (Masculin <strong class="text-lateef-1-6rem-blue">هُوَ</strong> ou 
                                Féminin <strong class="text-lateef-1-6rem-blue">هِيَ</strong>).</li>
                            <li>Le sujet vient <strong>APRÈS</strong> le verbe.</li>

                    <h2 class="heading-primary">4. <strong class="text-lateef-1-6rem-blue">الْجُمْلَةُ الْفِعْلِيَّةُ</strong></h2>
                    <div class="info-box">
                        <p class="p-intro">Une phrase verbale est une phrase qui commence par un verbe conjugué. Elle peut être simple (Verbe + Sujet) ou complexe (Verbe + Sujet + Objet + Complément).</p>
                        <p style="margin: 0 0 0.8rem 0; font-size: 0.9rem; color: #0066cc; font-weight: 600;">Caractéristiques d'une phrase verbale :</p>
                        <ul style="list-style-type: disc; margin: 0; padding-left: 1.8rem; font-size: 0.95rem; line-height: 1.2;">
                            <li>Elle commence par un verbe conjugué (Présent ou Passé).</li>
                            <li>Le sujet peut être interne (Raf') ou externe (Raf' après le verbe).</li>
                            <li>Elle peut contenir un objet (Nasb) et des compléments (Raf' ou Nasb).</li>
                        </ul>
                    </div>
                    <div class="warning-box">
                        <strong style="color: #e67e22; font-size: 1rem; display: block; margin-bottom: 0.4rem;">Règle d'identification du sujet :</strong>
                        <p class="p-intro"><strong></strong> Si le verbe est à la 3ème personne du singulier et qu'il est suivi d'un nom à l'état Raf', alors ce nom est le sujet (Sujet Externe).</p>
                    </div>

                course: `
                    <!-- ═══════════════════════════════════════════════════════════════ -->
                    <!-- SECTION 1: RAPPEL DE LA PHRASE NOMINALE (MUBTADA/KHABAR)       -->
                    <!-- ═══════════════════════════════════════════════════════════════ -->
                    <h2 class="heading-primary">Rappel : <strong class="text-lateef-1-6rem-blue">الْجُمْلَةُ الْاِسْمِيَّةُ</strong></h2>
                    <div class="info-box">
                        <p style="margin: 0 0 0.8rem 0; font-size: 0.95rem; line-height: 1.6;">C'est une phrase qui commence par un Nom (<em>Ism</em>). Elle est composée de :</p>
                        <ol style="list-style-type: disc; margin: 0.5rem 0; padding-left: 1.8rem; font-size: 0.95rem; line-height: 1.5;">
                            <li><strong><span class="text-lateef-2rem-blue">مُبْتَدَأٌ</span></strong> : Le sujet (Raf' / Défini)</li>
                            <li><strong><span class="text-lateef-2rem-blue">خَبَرٌ</span></strong> : L'information (Raf' / Indéfini)</li>
                        </ol>
                        <p style="margin: 0.8rem 0 0 0; font-size: 0.95rem;">Dans ce module, nous étudions de nouvelles méthodes d'intensification et l'introduction des verbes d'état (Kana).</p>
                    </div>

                    <h2 class="heading-primary">1. Méthodes d'intensification (2/2)</h2>

                    <h3 class="heading-secondary">Méthode 4 : <strong class="text-lateef-1-6rem-blue">ضَمِيرُ مُنْفَصِلٌ</strong></h3>
                    <p style="margin: 0.8rem 0; font-size: 0.9rem; line-height: 1.6;">On insère un pronom personnel (lui, toi, nous...) entre le Moubtada et le Khabar. Cela donne un sens d'exclusivité ("C'est lui le...").</p>
                    <div class="warning-box">
                        <strong style="color: #e67e22; font-size: 0.9rem; display: block; margin-bottom: 0.8rem;">Conséquence :</strong>
                        <p style="margin: 0; font-size: 0.9rem;">Le Khabar devient <strong>Ma'rifah</strong> en ajoutant (<strong class="text-lateef-1-6rem-blue">الـ</strong>).</p>
                    </div>
                    <p style="direction: rtl; margin: 0.9rem 0; font-size: 0.9rem; font-weight: 600; text-align: center; padding: 0.9rem; background: #f5f5f5; border-radius: 0.4rem;">Moubtada + <strong class="text-lateef-1-8rem-blue">ضَمِيرٌ مُنْفَصِلٌ</strong> + <strong class="text-lateef-1-8rem-blue">الـ</strong> avec Khabar</p>
                    <div style="background: #f5f5f5; border: 1px solid #ddd; padding: 1rem; border-radius: 0.4rem; margin: 1.2rem 0;">
                        <p style="text-align: center; margin: 0; font-size: 0.9rem;"><strong class="text-lateef-1-8rem-blue">مُحَمَّدٌ هُوَ الرَّسُولُ</strong><br><em class="text-dark-gray">Muhammad, c'est lui le messager.</em></p>
                    </div>

                    <h3 class="heading-secondary">Méthode 5 : <strong class="text-lateef-1-6rem-blue">لَامُ الِابْتِدَاءِ</strong></h3>
                    <p style="margin: 0.8rem 0; font-size: 0.95rem; line-height: 1.6;">On ajoute la lettre <strong>La</strong> (<strong class="text-lateef-1-6rem-blue">لَـ</strong>) devant le Moubtada pour insister (Vraiment/Certes).</p>
                    <div style="background: #f5f5f5; border: 1px solid #ddd; padding: 1rem; border-radius: 0.4rem; margin: 1.2rem 0;">
                        <p style="text-align: center; margin: 0; font-size: 0.95rem;"><strong class="text-lateef-1-6rem-blue">لَمُحَمَّدٌ رَسُولٌ</strong><br><em class="text-dark-gray">Muhammad est vraiment un messager.</em></p>
                    </div>

                    <div class="warning-box">
                        <strong style="color: #e67e22; font-size: 0.9rem; display: block; margin-bottom: 0.8rem;">Le Lam glissant (اللَّامُ الْمُزَحْلَقَةُ) :</strong>
                        <p style="margin: 0 0 0.8rem 0; font-size: 0.9rem;">Si on utilise <strong><span class="text-lateef-1-8rem-blue">إِنَّ</span></strong> (Inna) au début de la phrase, le "Lam" ne peut pas rester sur le Moubtada. Il "glisse" et s'accroche au <strong>Khabar</strong>.</p>
                        <p style="margin: 0; font-size: 0.9rem;">Ex. : <span class="text-lateef-1-8rem-blue">إِنَّ مُحَمَّدًا لَرَسُولٌ</span> (Certes, Muhammad est vraiment un messager)</p>
                    </div>

                    <h3 class="heading-secondary">Méthode 6 : <strong class="text-lateef-1-6rem-blue">التَّقْدِيمُ وَالتَّأْخِيرُ</strong></h3>
                    <p style="margin: 0.8rem 0; font-size: 0.95rem; line-height: 1.6;">On inverse l'ordre standard : le Khabar passe devant le Moubtada.</p>
                    <div class="warning-box">
                        <strong style="color: #e67e22; font-size: 0.9rem; display: block; margin-bottom: 0.8rem;">Conditions :</strong>
                        <ul style="margin: 0; padding-left: 1.8rem; font-size: 0.9rem; line-height: 1.7;">
                            <li>Le Moubtada devient <strong>Indéfini (Nakirah)</strong></li>
                            <li>Le verbe "être" est souvent remplacé par le sens "il y a" ou "avoir"</li>
                        </ul>
                    </div>
                    <div style="text-align: center; background: #f5f5f5; border: 1px solid #ddd; padding: 1.2rem; border-radius: 0.4rem; margin: 1.5rem 0;">
                        <p class="margin-bottom-text"><span class="text-lateef-2rem-blue">فِي الْمَسْجِدِ مُسْلِمٌ</span><br><em class="text-dark-gray">Dans la mosquée, il y a un musulman.</em></p>
                        <p class="margin-0-text"><span class="text-lateef-2rem-blue">لَهُ بَيْتٌ</span><br><em class="text-dark-gray">À lui appartient une maison / Il a une maison.</em></p>
                    </div>

                    <!-- SECTION 2: LES VERBES D'ÉTAT KANA ET SŒURS (AFAL NAQISA)      -->
                    <!-- ═══════════════════════════════════════════════════════════════ -->
                    <h2 class="heading-primary">2. Kana et ses soeurs (<strong class="text-lateef-1-6rem-blue">كَانَ وَأَخَوَاتُهَا</strong>)</h2>
                    <div class="info-box">
                        <p style="margin: 0; font-size: 0.95rem; line-height: 1.1;">Ce sont des verbes qui entrent dans la phrase nominale et changent l'état du Khabar. On les appelle <strong class="text-lateef-2rem-blue">أَفْعَالٌ نَاقِصَةٌ</strong> (Af'al Naqisa) ou verbes "incomplets/déficients" car ils décrivent un état et non une action complète.</p>
                    </div>

                    <h3 class="heading-secondary">La transformation grammaticale</h3>
                    <p style="margin: 0.8rem 0; font-size: 0.95rem; line-height: 1.6;">Lorsqu'on ajoute <em>Kana</em> :</p>
                    <ul style="list-style-type: disc; margin: 0.5rem 0; padding-left: 1.8rem; font-size: 0.95rem; line-height: 1.7;">
                        <li>Le <strong>Moubtada</strong> reste <strong class="span-blue-color">Raf'</strong> (devient <em>Ism Kana</em>)</li>
                        <li>Le <strong>Khabar</strong> devient <strong style="color: #c0392b;">Nasb</strong> (devient <em>Khabar Kana</em>)</li>
                    </ul>
                    <p style="margin: 1rem 0; font-size: 0.95rem; font-weight: 600; text-align: center; padding: 1rem; background: #f5f5f5; border-radius: 0.4rem;"><span class="text-lateef-2rem">كَانَ</span> + <span class="text-lateef-2rem-blue">اِسْمٌ مَرْفُوعٌ</span> + <span class="text-lateef-2rem-red">خَبَرٌ مَنْصُوبٌ</span></p>
                    <div style="text-align: center; background: #f5f5f5; border: 1px solid #ddd; padding: 1.2rem; border-radius: 0.4rem; margin: 1.5rem 0;">
                        <p class="margin-0-text"><span class="text-lateef-2rem-blue">كَانَ اللهُ غَفُورًا</span><br><em class="text-dark-gray">Allah était/est Pardonneur.</em></p>
                    </div>

                    <h3 class="heading-secondary">Les soeurs de Kana (Les plus fréquentes)</h3>

                    <h2 class="heading-primary">3. L'Impératif / Ordre</h2>
                    <div class="info-box">
                        <p class="margin-v-lg-text">La construction de l'impératif positif ("Fais !") suit une procédure stricte en 4 étapes.</p>
                    </div>

                    <div
                        style="background: #f5f5f5; border: 2px solid #0066cc; border-radius: 0.4rem; padding: 1.2rem; margin: 1rem 0;">
                        <span
                            style="background: #0066cc; color: white; width: 2rem; height: 2rem; border-radius: 50%; text-align: center; line-height: 2rem; font-weight: bold; display: inline-block; margin-right: 0.8rem;">1</span>
                        <strong class="span-blue-color">Mettre au Majzoum :</strong> le verbe au présent (Moudari') à l'état
                        <em>Majzoum</em>.<br>
                        <span style="font-size: 0.9rem; margin-left: 2.8rem; display: inline-block;">Ex: <span
                                class="text-lateef-2rem-blue">تَذْهَبْ</span></span>
                    </div>

                    <div
                        style="background: #f5f5f5; border: 2px solid #0066cc; border-radius: 0.4rem; padding: 1.2rem; margin: 1rem 0;">
                        <span
                            style="background: #0066cc; color: white; width: 2rem; height: 2rem; border-radius: 50%; text-align: center; line-height: 2rem; font-weight: bold; display: inline-block; margin-right: 0.8rem;">2</span>
                        <strong class="span-blue-color">Supprimer le préfixe :</strong> On enlève la lettre du présent ("Ta") au
                        début.<br>
                        <span style="font-size: 0.9rem; margin-left: 2.8rem; display: inline-block;">Ex: <span
                                class="text-lateef-2rem-blue">ذْهَبْ</span></span>
                    </div>

                    <div
                        style="background: #f5f5f5; border: 2px solid #0066cc; border-radius: 0.4rem; padding: 1.2rem; margin: 1rem 0;">
                        <span
                            style="background: #0066cc; color: white; width: 2rem; height: 2rem; border-radius: 50%; text-align: center; line-height: 2rem; font-weight: bold; display: inline-block; margin-right: 0.8rem;">3</span>
                        <strong class="span-blue-color">Vérifier la 1ère lettre :</strong>
                        <ul style="margin: 0.5rem 0; padding-left: 1.5rem; font-size: 0.95rem;">
                            <li>Si la 1ère lettre a une voyelle : C'est fini ! (Ex: <span
                                    class="text-lateef-2rem-blue">تُعَلِّمُ</span> → <span
                                    class="text-lateef-2rem-blue">عَلِّمْ</span>).</li>
                            <li>Si la 1ère lettre a un <strong>Soukoun</strong> : Ajouter une <em>Hamzatul Wasl</em> (Alif) au
                                début.</li>
                        </ul>
                    </div>

                    <div

                        <strong class="span-blue-color">Vocaliser la Hamza :</strong> On regarde la troisième lettre :
                        <ul style="margin: 0.5rem 0; padding-left: 1.5rem; font-size: 0.95rem;">

                                    class="text-lateef-2rem-blue">تَنْصُرُ</span> → <span
                                    class="text-lateef-2rem-blue">أُنْصُرْ</span> (Aide !)</li>
                            <li><strong>Fatha/Kasra</strong> → Hamza Kasra (<span
                                    class="text-lateef-2rem-blue">اِ</span>). Ex: <span
                                    class="text-lateef-2rem-blue">تَضْرِبُ</span> → <span
                                    class="text-lateef-2rem-blue">اِضْرِبْ</span> (Frappe !)</li>
                        </ul>
                    </div>

                    <h2 class="heading-primary">1. <strong class="text-lateef-1-6rem;">Introduction au Passif</strong></h2>

                        <p class="p-intro">Le verbe est classé en deux catégories selon que le sujet est

                            </li>
                            <li class="li-m2"><strong class="text-lateef-1-6rem-blue">المَجْهُول</strong> : La forme

                    <h2 class="heading-primary">2. <strong class="text-lateef-1-6rem;">Le Substitut du Sujet</strong></h2>
                    <div class="info-box">
                        <p class="p-content">C'est la transformation grammaticale majeure du passif. Puisque le
                            vrai sujet (<strong class="text-lateef-2rem-blue">فَاعِل</strong>) disparaît,
                            l'objet qui subissait l'action (<strong class="text-lateef-2rem-blue">مَفْعُول
                                بِهِ</strong>) prend sa place.</p>
                    </div>

                    <div class="warning-box">
                        <strong class="alert-subtitle-orange">La Transformation :</strong>
                        <ul style="margin: 0; padding-left: 1.5rem; font-size: 0.9rem; line-height: 1.2;">

                                    class="text-lateef-2rem-blue">مَفْعُول بِهِ</strong> initialement

                                <strong class="text-lateef-2rem-blue">نَائِبُ الفَاعِلِ</strong> à
                                l’etat <strong class="text-lateef-2rem-blue"> رَفْع</strong>.</li>
                            <li class="li-m2">Il prend le statut grammatical du sujet par substitution.</li>
                        </ul>
                    </div>

                    <h2 class="heading-primary">5.
                        <strong class="text-lateef-1-6rem">L'Interjection - Le Nidâ - النِّدَاء </strong></h2>
                    <div class="info-box">
                        <p class="p-content">La particule <strong class="text-lateef-1-6rem-blue">يَا</strong> (<em>harf n-nidâ</em>) est utilisée pour interpeler une personne ou un groupe.
                            <br>Elle est systématiquement suivie du <strong class="text-lateef-1-6rem-blue">مُنَادَى</strong>, qui désigne l'entité interpelée.
                            <br>Il existe 3 règles spécifiques pour la déclinaison du nom après "Yâ", selon sa nature (défini, indéfini, propre, etc.).</p>
                    </div>

                    <h3 class="heading-secondary"">1. Le nom commençant par <span class="text-lateef-2rem">ال</span></h3>
                    <div class="info-box">
                        <p>Pour les noms définis par l'article, on intercale une particule spécifique entre "Yâ" et le nom :</p>
                        <ol style="list-style-type: disc; margin: 0.5rem 0; padding-left: 1.5rem; font-size: 0.9rem; line-height: 1.2;">
                            <li><strong>Masculin (<span class="text-lateef-2rem">مُذَكَّر</span>) :</strong> On ajoute <span class="text-lateef-2rem-red">أَيُّهَا</span> devant le nom.
                                <ul class="text-lateef-2rem" style="list-style-type: disc; margin: 1rem 0; padding-left: 1.8rem;">
                                    <li>يَا<span class="span-red-color"> أَيُّهَا</span> الرَّسُولُ </li>
                                    <li>يَا<span class="span-red-color"> أَيُّهَا</span> النَّاسُ </li>
                                    <li>يَا<span class="span-red-color"> أَيُّهَا</span> الكَافِرُونَ </li>
                                </ul>
                            </li>
                            <li><strong>Féminin (<span class="text-lateef-2rem">مُؤَنَّتْ</span>) :</strong> On ajoute <span class="text-lateef-2rem-red">أَيَّتُهَا</span> devant le nom.
                                <ul class="text-lateef-2rem" style="list-style-type: disc; margin: 1rem 0; padding-left: 1.8rem;">
                                    <li>يَا <span class="span-red-color">أَيَّتُهَا</span> النَّفْسُ </li>
                                </ul>
                            </li>
                        </ol>
                    </div>
                    <h3 class="heading-secondary"">2. Le Nom Propre (<span class="text-lateef-2rem">العلم</span>)</h3>
                    <div class="info-box">
                        <p class="p-intro">Le prénom devient "mabnî" (invariable dans cette position) sur la damma (<span class="text-lateef-2rem">ضَمَّةٌ</span>).</p>                     
                        <ol style="margin: 0.5rem 0; padding-left: 1.5rem; font-size: 0.9rem; line-height: 1.2;">
                            <li><strong>Exemples:</strong>
                                <ul class="text-lateef-2rem" style="list-style-type: disc; margin: 1rem 0; padding-left: 1.8rem;">
                                    <li><span class="span-red-color"> يَا</span> زَيْدُ </li>
                                    <li><span class="span-red-color"> يَا</span> شُعَيْبٌ </li>
                                </ul>
                            </li>
                        </ol>
                    </div>
                    <h3 class="heading-secondary"">3. La possession (<span class="text-lateef-2rem">مضاف / مضاف إليه</span>)</h3>
                    <div class="info-box">
                        <p class="p-intro">Le premier terme (mudâf) doit être à l'état de cas direct ou "nasb" (<span class="text-lateef-2rem">نصب</span>).</p>
                        <ol style="margin: 0.5rem 0; padding-left: 1.5rem; font-size: 0.9rem; line-height: 1.2; white-space: nowrap;">
                            <li><strong>Exemples:</strong>
                                <ul class="text-lateef-2rem" style="list-style-type: disc; margin: 1rem 0; padding-left: 1.8rem;">
                                    <li>يَا أَهْ<span class="span-red-color">لَ</span> الْكِتَابِ </li>
                                    <li>يَا بَنِ<span class="span-red-color">ي</span> إِسْرَائِيلَ </li>
                                    <li>يَا رَ<span class="span-red-color">بَّ</span> العَالَمِينَ </li>
                                </ul>
                            </li>
                        </ol>
                    </div>
                    <h2 class="heading-primary">6.
                        <strong class="text-lateef-1-6rem">Les Mots de Liaison</strong></h2>
                    <div
                        class="info-box">
                        <p class="p-intro">Ce sont les pronoms relatifs (qui, que, dont, lequel...). Ils servent
                            à relier un nom à une phrase descriptive appelée <strong class="span-blue-color">Silat al-Mawsul</strong>
                            <strong class="text-lateef-1-6rem">(صِلَةُ الْمَوْصُول)</strong>.</p>

                    <h3 class="heading-secondary"">B. Les Pronoms Invariables (Neutres)</h3>

                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.5rem 0; max-width: 100%;">

        // Fonction pour obtenir tous les équivalents d'un terme
        function getTermEquivalents(term) {
            const lowTerm = term.toLowerCase().trim();
            for (const [key, equivalents] of Object.entries(termEquivalents)) {
                if (equivalents.some(eq => eq.toLowerCase().includes(lowTerm) || lowTerm.includes(eq.toLowerCase()))) {
                    return equivalents;
                }
            }
            return [lowTerm];
        }

        /**

         * @param {string} modTitle - Titre du module
         * @param {number} score - Points obtenus
         * @param {number} total - Nombre total de questions
         */
        function saveScoreToHistory(modTitle, score, total) {
            const history = JSON.parse(localStorage.getItem('grammar_history') || '[]');
            const newEntry = {
                date: new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }),
                title: modTitle,
                score: score,
                total: total
            };
            history.unshift(newEntry);
            localStorage.setItem('grammar_history', JSON.stringify(history.slice(0, 50)));
        }

        /**
         * Affiche l'écran historique avec la liste des défis complétés
         */
        function showHistory() {
            const history = JSON.parse(localStorage.getItem('grammar_history') || '[]');
            const listCont = document.getElementById('history-list');
            listCont.innerHTML = '';

            if (history.length === 0) {
                listCont.innerHTML = '<p class="text-center text-muted py-10 italic">Aucun défi terminé.</p>';
            } else {
                history.forEach(entry => {
                    const item = document.createElement('div');
                    item.className = "card p-4 flex justify-between items-center mb-2";
                    const percent = Math.round((entry.score / entry.total) * 100);
                    const color = percent >= 80 ? 'text-green-600' : (percent >= 50 ? 'text-orange-500' : 'text-red-500');
                    item.innerHTML = `
                        <div>
                            <p class="text-[10px] font-bold text-muted uppercase">${entry.date}</p>
                            <p class="font-bold text-sm">${entry.title}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-lg ${color}">${entry.score} / ${entry.total}</p>
                        </div>`;
                    listCont.appendChild(item);
                });
            }
            
            document.querySelectorAll('body > div').forEach(d => {
                if (!['theme-btn', 'update-toast'].includes(d.id)) d.classList.add('hidden');
            });
            document.getElementById('screen-history').classList.remove('hidden');
        }

        /**
         * Surligne une requête et tous ses équivalents (FR/AR/Translittération) 
         * dans les nœuds de texte du DOM sans casser le HTML
         * @param {HTMLElement} element - Élément racine à traiter
         * @param {string} query - Texte à surligner
         */
        function highlightInDOM(element, query) {
            if (!query) return;
            
            // Obtenir tous les équivalents du terme
            const searchTerms = getTermEquivalents(query);
            const escapedTerms = searchTerms.map(term => 
                term.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')
            );
            // Utiliser un regex SANS le flag 'g' pour le test afin d'éviter les bugs de .lastIndex
            const testRegex = new RegExp(`(${escapedTerms.join('|')})`, 'i');
            const replaceRegex = new RegExp(`(${escapedTerms.join('|')})`, 'gi');
            
            const walk = document.createTreeWalker(
                element,
                NodeFilter.SHOW_TEXT,
                null,
                false
            );
            
            let node;
            const nodesToReplace = [];
            
            // Collecter TOUS les nœuds de texte qui contiennent le terme
            while (node = walk.nextNode()) {
                if (testRegex.test(node.nodeValue)) {
                    nodesToReplace.push(node);
                }
            }
            
            // Remplacer les nœuds avec du HTML surligné - TOUTES les occurrences
            nodesToReplace.forEach(node => {
                const span = document.createElement('span');
                span.innerHTML = node.nodeValue.replace(
                    replaceRegex,
                    '<span class="search-highlight">$1</span>'
                );
                node.parentNode.replaceChild(span, node);
            });
        }

         * Affiche le cours d'un module
         * @param {string} id - Identifiant du module
         * @param {string|null} queryToOpen - Requête de recherche pour ouvrir une section
         */
        function showCourse(id, queryToOpen = null) {
            // Sauvegarder l'état du jeu s'il y a une partie en cours
            if (currentModId === id && state === 'playing') {
                gameState = {
                    modId: currentModId,
                    currentIdx: currentIdx,
                    score: score,
                    userAnswers: JSON.parse(JSON.stringify(userAnswers))
                };
            }
            
            currentModId = id;
            const mod = modulesData[id];
            const keys = Object.keys(modulesData);
            const idx = keys.indexOf(id);

            // Mettre à jour le contenu du cours
            document.getElementById('course-header-title').innerText = mod.name;
            document.getElementById('course-main-title').innerText = mod.title;
            document.getElementById('course-body').innerHTML = mod.course;
            document.getElementById('btn-to-practice').onclick = () => gameState && gameState.modId === id ? resumeGame(id) : startGame(id);

            // Gérer les boutons de navigation précédent/suivant
            const prevBtn = document.getElementById('btn-prev-mod');
            const nextBtn = document.getElementById('btn-next-mod');

            if (idx > 0) {
                prevBtn.style.visibility = "visible";
                prevBtn.onclick = () => showCourse(keys[idx - 1]);
            } else {
                prevBtn.style.visibility = "hidden";
            }

            if (idx < keys.length - 1) {
                nextBtn.style.visibility = "visible";
                nextBtn.onclick = () => showCourse(keys[idx + 1]);
            } else {
                nextBtn.style.visibility = "hidden";
            }

            // Afficher l'écran de cours et initialiser
            document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('screen-course').classList.remove('hidden');

            // ORDRE CRUCIAL: créer HTML → préparer tableaux → déplier si recherche
            initializeAccordion();
            initializeTables();

            if (queryToOpen) {
                // Surligner la requête dans le contenu du cours
                highlightInDOM(document.getElementById('course-body'), queryToOpen);
                
                setTimeout(() => {
                    // Récupérer tous les termes équivalents (FR/AR/translittération)
                    const searchTerms = getTermEquivalents(queryToOpen);
                    const sections = document.querySelectorAll('.course-section');
                    sections.forEach(s => {
                        // Vérifier si AU MOINS UN terme équivalent est dans la section
                        if (searchTerms.some(term => s.innerText.toLowerCase().includes(term.toLowerCase()))) {
                            s.classList.remove('collapsed');
                            s.previousElementSibling.classList.remove('collapsed');
                            s.previousElementSibling.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    });
                }, 300);
            } else {
                window.scrollTo(0, 0);
            }
        
            applyDarkModeStyles();
            updateTableVisibility();
            updateTableGenderVisibility();
        }

        /**
         * Initialise le système d'accordéon pour les cours (H2 et H3 collapsibles)
         */
        function initializeAccordion() {
            const courseBody = document.getElementById('course-body');
            if (!courseBody) return;
            
            // Créer les sections pour les H2
            const h2Headings = courseBody.querySelectorAll('h2');
            h2Headings.forEach(heading => {
                heading.classList.add('collapsed');
                heading.style.cursor = 'pointer';
                
                const section = document.createElement('div');
                section.className = 'course-section collapsed';
                
                let nextElement = heading.nextElementSibling;
                while (nextElement && nextElement.tagName !== 'H2') {
                    const elementToMove = nextElement;
                    nextElement = nextElement.nextElementSibling;
                    section.appendChild(elementToMove);
                }
                heading.parentElement.insertBefore(section, heading.nextElementSibling);
                
                heading.addEventListener('click', () => {
                    heading.classList.toggle('collapsed');
                    section.classList.toggle('collapsed');
                });
            });
            
            // Créer les sections pour les H3
            const h3Headings = courseBody.querySelectorAll('h3');
            h3Headings.forEach(heading => {
                heading.classList.add('collapsed');
                heading.style.cursor = 'pointer';
                
                const section = document.createElement('div');
                section.className = 'course-section collapsed';
                
                let nextElement = heading.nextElementSibling;
                while (nextElement && nextElement.tagName !== 'H2' && nextElement.tagName !== 'H3') {
                    const elementToMove = nextElement;
                    nextElement = nextElement.nextElementSibling;
                    section.appendChild(elementToMove);
                }
                heading.parentElement.insertBefore(section, heading.nextElementSibling);
                
                heading.addEventListener('click', () => {
                    heading.classList.toggle('collapsed');
                    section.classList.toggle('collapsed');
                });
            });
        }
